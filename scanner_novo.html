<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Marcadores</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
}
canvas{
  width:100%;
  max-width:650px;
}
#status{
  font-size:24px;
}
</style>
</head>

<body>

<h2>Scanner com Marcadores</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Carregando...</div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto = false
let framesOK = 0

cv.onRuntimeInitialized = ()=>{
  pronto = true
  iniciarCamera()
}

function iniciarCamera(){
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  })
  .then(stream=>{
    video.srcObject = stream
    video.onloadedmetadata = ()=>{
      video.play()
      loop()
    }
  })
}

/* ========================= */
function loop(){

  if(!pronto){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let src = cv.imread(canvas)
  let gray = new cv.Mat()
  let thresh = new cv.Mat()

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)
  cv.threshold(gray, thresh, 100, 255, cv.THRESH_BINARY_INV)

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(thresh, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let quadrados = []

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)
    let area = cv.contourArea(cnt)

    if(area < 500) continue

    let peri = cv.arcLength(cnt,true)
    let approx = new cv.Mat()

    cv.approxPolyDP(cnt, approx, 0.02*peri, true)

    if(approx.rows === 4){

      let rect = cv.boundingRect(approx)

      let ratio = rect.width / rect.height

      if(ratio > 0.6 && ratio < 1.4){
        quadrados.push(rect)
      }
    }
  }

  // desenhar
  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x, r.y, r.width, r.height)
  })

  if(quadrados.length === 4){

    framesOK++

    document.getElementById("status").innerText =
      "✔ 4 marcadores detectados ("+framesOK+")"

    if(framesOK > 10){
      capturar()
    }

  }else{

    framesOK = 0

    document.getElementById("status").innerText =
      "🔴 Enquadre os 4 marcadores ("+quadrados.length+")"
  }

  src.delete()
  gray.delete()
  thresh.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

/* ========================= */
function capturar(){
  document.getElementById("status").innerText =
    "🟢 Captura liberada"
}

</script>

</body>
</html>
