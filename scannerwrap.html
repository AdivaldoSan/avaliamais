<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Inteligente - Leitura Paramétrica</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:100%;
  max-width:650px;
}
button{
  padding:12px 20px;
  margin:10px;
}
</style>
</head>

<body>

<h2>Scanner Inteligente</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Iniciando...</div>
<div id="respostas" style="margin-top:10px;font-size:18px;"></div>
<button onclick="refazer()">Refazer</button>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
let capturado=false
let framesOK=0

const TEMPLATE = {
  colunas: [0.3051, 0.4486, 0.5913, 0.7344],
  topo: 0.2122,
  base: 0.8072,
  questoes: 10
}

cv.onRuntimeInitialized=()=>{
  pronto=true
  iniciar()
}

function iniciar(){

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById("status").innerText =
      "❌ getUserMedia não suportado"
    return
  }

  navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{ ideal:"environment" }
    }
  })
  .then(stream=>{
    video.srcObject = stream

    video.onloadedmetadata = ()=>{
      video.play()
      document.getElementById("status").innerText = "📷 Câmera ativa"
      loop()
    }
  })
  .catch(err=>{
    console.error(err)

    document.getElementById("status").innerText =
      "❌ Erro câmera: " + err.name
  })
}
// ==============================
function loop(){

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){

    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)

    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()

    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      let r=cv.boundingRect(approx)
      quadrados.push(r)
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length===4){
    framesOK++

    if(framesOK>6){
      capturarFrame(quadrados)
    }

  }else{
    framesOK=0
  }

  src.delete()
  gray.delete()
  bin.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

// ==============================
function capturarFrame(quadrados){

  capturado=true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  lerRespostas(dst)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"
}

// ==============================
// 🔥 NOVA FUNÇÃO (AUTO TOPO/BASE)
function detectarTopoBase(mat){

  let gray = new cv.Mat()
  let bin = new cv.Mat()

  cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY)

  cv.threshold(gray, bin, 0,255,
    cv.THRESH_BINARY_INV + cv.THRESH_OTSU)

  let alturas = []

  for(let y=0;y<bin.rows;y++){
    let soma = 0
    for(let x=0;x<bin.cols;x+=5){
      if(bin.ucharPtr(y,x)[0] > 0) soma++
    }
    alturas.push(soma)
  }

  let limite = Math.max(...alturas) * 0.3

  let inicio = alturas.findIndex(v=>v > limite)
  let fim = alturas.length - 1 - [...alturas].reverse().findIndex(v=>v > limite)

  gray.delete()
  bin.delete()

  if(inicio < 0 || fim < 0){
    return null
  }

  return {
    topo: inicio / mat.rows,
    base: fim / mat.rows
  }
}

// ==============================
function lerRespostas(mat){

  let respostas = []

  // 🔥 USO INTELIGENTE (com fallback)
  let ajuste = detectarTopoBase(mat)

  let topo = ajuste ? ajuste.topo : TEMPLATE.topo
  let base = ajuste ? ajuste.base : TEMPLATE.base

  let passo = 0

  if(TEMPLATE.questoes > 1){
    passo = (base - topo) / (TEMPLATE.questoes - 1)
  }

  for(let i=0;i<TEMPLATE.questoes;i++){

    let y

    if(TEMPLATE.questoes === 1){
      y = (topo + base) / 2
    }else{
      y = topo + i * passo
    }

    let valores = []

    for(let j=0;j<4;j++){

      let x = TEMPLATE.colunas[j]

      let px = Math.floor(x * mat.cols)
      let py = Math.floor(y * mat.rows)

      let size = 18

      let x0 = Math.max(px - size, 0)
      let y0 = Math.max(py - size, 0)

      let w = Math.min(size*2, mat.cols - x0)
      let h = Math.min(size*2, mat.rows - y0)

      let roi = mat.roi(new cv.Rect(x0,y0,w,h))

      let gray = new cv.Mat()
      cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY)

      let t = new cv.Mat()
      cv.threshold(gray, t, 0,255,
        cv.THRESH_BINARY_INV + cv.THRESH_OTSU)

      let total = w*h
      let pretos = cv.countNonZero(t)

      let intensidade = pretos / total

      valores.push(intensidade)

      gray.delete()
      t.delete()
      roi.delete()
    }

    let max = Math.max(...valores)
    let index = valores.indexOf(max)

    let resposta = "-"

    let ordenado = [...valores].sort((a,b)=>b-a)

    if(max > 0.25 && (ordenado[0]-ordenado[1]) > 0.08){
      resposta = ["A","B","C","D"][index]

      let cx = TEMPLATE.colunas[index] * mat.cols
      let cy = y * mat.rows

      ctx.beginPath()
      ctx.arc(cx, cy, 12, 0, Math.PI * 2)
      ctx.lineWidth = 3
      ctx.strokeStyle = "lime"
      ctx.stroke()
    }

    respostas.push(resposta)
  }

  document.getElementById("respostas").innerText =
    "Respostas: " + respostas.join(" ")

  console.log("RESPOSTAS:", respostas.join(" "))
}

// ==============================
function ordenar(q){

  q.sort((a,b)=>a.y-b.y)

  let top=q.slice(0,2)
  let bottom=q.slice(2,4)

  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)

  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

// ==============================
function refazer(){
  capturado=false
  framesOK=0
  document.getElementById("status").innerText = "Reiniciando..."
}

</script>

</body>
</html>
