<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Impressão - Avalia+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	
<link rel="stylesheet" href="styles.css">

<style>
/* ================= BASE ================= */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#e5e7eb;
}

/* ================= LAYOUT ================= */
.layout{
  display:flex;
}

/* ================= PAINEL ================= */
.painel{
  width:360px;
  background:#f3f4f6;
  padding:15px;
  box-sizing:border-box;
  border-right:1px solid #ccc;
  height:100vh;
  overflow:auto;
}

.painel h3{
  margin-top:0;
}

.painel input,
.painel select,
.painel textarea{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  box-sizing:border-box;
  font-size:13px;
}

.painel label{
  display:block;
  margin-top:8px;
  margin-bottom:3px;
  font-size:13px;
}

/* ================= PREVIEW ================= */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  overflow:auto;
  padding:20px;
}

/* ================= PÁGINA A4 (ÚNICA VERDADE) ================= */
.pagina{
  width:210mm;
  height:297mm; 
  overflow:hidden;

  background:white;
  padding:12mm;
  box-sizing:border-box;

  margin-bottom:20px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
}

/* ================= CABEÇALHO ================= */
.cabecalho{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #000;
  padding-bottom:6px;
  margin-bottom:10px;
  font-size:12px;
}

/* ================= BLOCO ÓTICO ================= */
.bloco-otico{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:10px 0 20px 0;
  position:relative;
}

.lado-esquerdo{
  display:flex;
  justify-content:center;
  padding-right:150px;
}

.lado-direito{
  position:absolute;
  top:49px;
  right:0;
}

.box-nota{
  border:1px solid #000;
  width:90px;
  height:90px;
  display:flex;
  flex-direction:column;
  font-size:12px;
}

.box-nota div:first-child{
  text-align:center;
  padding:4px;
}

.campo-nota{
  flex:1;
}

.imgGabarito{
  width:500px;
  height:auto;
}

/* ================= INSTRUÇÕES ================= */
.instrucoes{
  font-size:12px;
  margin:8px 0;
  line-height:1.4;
}

/* ================= QUESTÕES (GRID CONTROLADO) ================= */
.questoes{
  display:flex;
  gap:30px;
}

.coluna{
  flex:1;
}

.questao{
  break-inside:avoid;
  margin-bottom:12px;
  font-size:12px;
}

.enunciado{
  margin-bottom:4px;
}

.alternativas div{
  margin-left:10px;
}

/* ================= IMAGEM ================= */
.img-container{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.img-container img{
  max-width:70%;
}

/* ================= BOTÕES ================= */
button{
  width:100%;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
}

/* ================= PRINT ================= */
@media print{
  .painel{ display:none; }

  .pagina{
    margin:0;
    box-shadow:none;
    page-break-after:always;
  }

  .pagina:last-child{
    page-break-after:auto;
  }
}

</style>
</head>

<body>

<div class="layout">

  <!-- ===== PAINEL ===== -->
  <div class="painel">

    <h3>Configuração</h3>
	<div id="msgErro" class="alerta" style="display:none;"></div>	

	  
	<label>Nome da Prova:</label>
	<input id="nomeProva" placeholder="Ex: Simulado SAERO 1">

    <label>Escola:</label>
    <input id="escola" value="EEEFM Migrantes">

    <label>Disciplina:</label>
    <input id="disciplina" value="Matemática">

    <label>Turma:</label>
	<select id="turmaSelect"></select>
	
	<label>Quantidade:</label>
    <input id="qtd" type="number" value="1" min="1" max="100">	
	  
	<label>Extras:</label>
	<input id="extras" type="number" value="0" min="0" max="5">

	<label>Instruções:</label>
    <textarea id="instrucoes" rows="4" placeholder="Ex: Resolva as questões com atenção..."></textarea>  

    <button onclick="gerarPreview()">Atualizar Preview</button>
	  
    <button id="btnPDF" onclick="gerarPDF()" style="display:none;">Gerar PDF</button>
  </div>

  <!-- ===== PREVIEW ===== -->
  <div class="preview">
    <div id="folhas">
   
   <div class="pagina mensagem-inicial">
		<div class="msg-centro">
		  Preencha os dados à esquerda e clique em "Atualizar Preview"
		</div>
  </div>
</div>
  </div>

</div>


<script>
const prova = JSON.parse(localStorage.getItem("provaGerada"))
// 🔥 controle de travamento do nome
if(!prova.nomeTravado){
  prova.nomeTravado = false
}

function carregarPainel(){

  if(!prova) return

  document.getElementById("disciplina").value = prova.disciplina

  const select = document.getElementById("turmaSelect")
select.innerHTML = ""

prova.turmas.forEach((t, i) => {

  const option = document.createElement("option")
  option.value = t
  option.textContent = t

  if(i === 0) option.selected = true

  select.appendChild(option)
})
	// 🔥 mantém nome travado ao recarregar
  if(prova.nomeTravado){
  document.getElementById("nomeProva").disabled = true
}
}	

/* ================= CONFIG LAB (INALTERADO) ================= */

const config = {
  qrOffsetX: 166,
  qrOffsetY: -29,
  gabaritoOffsetX: 189,
  gabaritoOffsetY: 0,
  marcadorOffsetX: 343,
  marcadorOffsetY: -4,
  dy: 35,
  topoLetras: -24
}

const qrSize = 160

/* ================= GERAÇÃO DO CANVAS REAL ================= */

function gerarCanvasReal(canvas, q, qrData){

  //const q = 10

  const ctx = canvas.getContext("2d")
  ctx.translate(-100, 0)

  canvas.width = 900
  canvas.height = 300 + config.dy*q

  ctx.fillStyle="white"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  let inicioX = 400 + config.gabaritoOffsetX
  let inicioY = 200 + config.gabaritoOffsetY

  let dx = 40
  let raio = 8

  ctx.fillStyle="black"
  ctx.font="12px Arial"
  ctx.textAlign="center"
  ctx.textBaseline="middle"

  let letras=["A","B","C","D"]

  for(let c=0;c<4;c++){
    let x = inicioX + c*dx
    ctx.fillText(letras[c], x, inicioY + config.topoLetras)
  }

  for(let i=0;i<q;i++){

    let y = inicioY + i*config.dy

    ctx.textAlign="right"
    ctx.fillText((i+1)+"   ", inicioX-10, y+2)

    ctx.textAlign="center"

    for(let c=0;c<4;c++){
      let x = inicioX + c*dx

      ctx.beginPath()
      ctx.setLineDash([2,2])
      ctx.arc(x,y,raio,0,Math.PI*2)
      ctx.stroke()
      ctx.setLineDash([])
    }
  }

  /* MARCADORES */

  let marcador = 30

  const TLx = 160 + config.marcadorOffsetX
  const TRx = TLx + 250

  ctx.fillRect(TLx, 90 + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, 90 + config.marcadorOffsetY, marcador, marcador)

  let baseY = inicioY + config.dy*q + 40

  ctx.fillRect(TLx, baseY + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, baseY + config.marcadorOffsetY, marcador, marcador)

  /* QR */

  const qrDiv = document.createElement("div")

new QRCode(qrDiv,{
  text: qrData,
  width: qrSize,
  height: qrSize
})

function renderQR(){

  const qrCanvas = qrDiv.querySelector("canvas")

  if(!qrCanvas){
    requestAnimationFrame(renderQR)
    return
  }

  const img = new Image()
  img.src = qrCanvas.toDataURL()

  img.onload = ()=>{

    const topo = inicioY + config.topoLetras - 20
    const base = inicioY + config.dy*q + 60
    const centro = (topo + base)/2

    ctx.drawImage(
      img,
      config.qrOffsetX,
      centro - qrSize/2 + config.qrOffsetY,
      qrSize,
      qrSize
    )
  }
}

renderQR()
}
	
function gerarImagemGabarito(imgEl, q, qrData){

  const canvas = document.createElement("canvas")

  // reutiliza sua função atual
  gerarCanvasReal(canvas, q, qrData)

  // 🔥 espera o QR desenhar
  setTimeout(() => {
    imgEl.src = canvas.toDataURL("image/png")
  }, 500)
}

	
//========Gerar Versoes=======
function gerarVersoes(questoes, qtdVersoes = 4){

  const versoes = [];

  for(let v = 1; v <= qtdVersoes; v++){

    // 🔀 embaralha ordem das questões
    const questoesEmbaralhadas = [...questoes]
      .sort(() => Math.random() - 0.5);

    const questoesProcessadas = [];

    questoesEmbaralhadas.forEach(q => {

      const alternativas = [
        { letra: "A", texto: q.ALT_A },
        { letra: "B", texto: q.ALT_B },
        { letra: "C", texto: q.ALT_C },
        { letra: "D", texto: q.ALT_D }
      ];

      // identifica correta original
      const corretaOriginal = String(q.GABARITO).trim().toUpperCase();

      // marca correta
      alternativas.forEach(alt => {
        alt.correta = (alt.letra === corretaOriginal);
      });

      // 🔀 embaralha alternativas
      const embaralhadas = [...alternativas]
        .sort(() => Math.random() - 0.5);

      // redefine letras (A,B,C,D)
      const letras = ["A","B","C","D"];

      embaralhadas.forEach((alt, i) => {
        alt.novaLetra = letras[i];
      });

      // encontra nova correta
      const novaCorreta = embaralhadas.find(a => a.correta).novaLetra;

      questoesProcessadas.push({
        ID: q.ID,
        ENUNCIADO: q.ENUNCIADO,
        IMAGEM: q.IMAGEM,
        PESO: q.PESO,

        alternativas: embaralhadas,
        resposta: novaCorreta
      });

    });

    // monta gabarito da versão
    const gabarito = questoesProcessadas
      .map(q => q.resposta)
      .join("");

    versoes.push({
      v,
      questoes: questoesProcessadas,
      gabarito
    });
  }

  return versoes;
}

/* ================= GERAR PREVIEW ================= */
function gerarPreview(){

  const msgBox = document.getElementById("msgErro")

  msgBox.style.display = "none"
  msgBox.innerHTML = ""

  const nomeProva = document.getElementById("nomeProva")
  const escolaInput = document.getElementById("escola")
  const qtdInput = document.getElementById("qtd")

  let erros = []

  if(!nomeProva.value.trim()){
    erros.push("Nome da prova é obrigatório")
  }

  if(!escolaInput.value.trim()){
    erros.push("Escola é obrigatória")
  }

  let qtd = parseInt(qtdInput.value)

  if(isNaN(qtd) || qtd < 1){
    qtd = 1
  }

  if(qtd > 100){
    qtd = 100
  }

  qtdInput.value = qtd

  if(erros.length > 0){
    msgBox.innerHTML = erros.join("<br>")
    msgBox.style.display = "block"
    return
  }

  const escola = escolaInput.value
  const disciplina = document.getElementById("disciplina").value
  const turma = document.getElementById("turmaSelect").value

  // 🔥 ID fixo da prova
  if(!prova.id){
    prova.id = "PRV_" + Date.now();
  }

  prova.nome = nomeProva.value

  // 🔥 mapa de turmas
  if(!prova.mapaTurmas){
    const turmasOrdenadas = [...prova.turmas].sort()
    prova.mapaTurmas = {}

    turmasOrdenadas.forEach((t, i)=>{
      prova.mapaTurmas[t] = i + 1
    })
  }

  const turmaCodigo = prova.mapaTurmas[turma]

  // 🔥 gera versões
  prova.versoes = gerarVersoes(prova.questoes, 4)

  const extrasInput = document.getElementById("extras")
  let extras = parseInt(extrasInput.value)

  if(isNaN(extras) || extras < 0){
    extras = 0
  }

  if(extras > 5){
    extras = 5
  }

  extrasInput.value = extras

  const total = qtd + extras

  const folhas = document.getElementById("folhas")
  folhas.innerHTML = ""

  const textoInstrucoes = document.getElementById("instrucoes").value.trim()

  let instrucoesHTML = ""

  if(textoInstrucoes){
    const linhas = textoInstrucoes.split("\n").filter(l => l.trim() !== "")

    instrucoesHTML = `
      <div class="instrucoes">
        <strong>Instruções:</strong>
        ${linhas.map(l => `<div>${l}</div>`).join("")}
      </div>
      <div class="linha-divisoria"></div>
    `
  }

  // 🔥 LOOP DAS PROVAS
  for(let i=1;i<=total;i++){

    const versaoAtual = prova.versoes[(i-1) % prova.versoes.length];
    const questoesVersao = versaoAtual.questoes;

    let pagina = document.createElement("div")
    pagina.className = "pagina"

    pagina.innerHTML = `
      <div class="cabecalho">
        <div>
          <strong>${escola}</strong><br>
          ${disciplina}<br>
          Turma: ${turma}
        </div>

        <div style="text-align:right">
          Nº: ${i}<br>
          Nome: ________________________
        </div>
      </div>

      <div class="bloco-otico">
        <div class="lado-esquerdo">
          <img class="imgGabarito">
        </div>

        <div class="lado-direito">
          <div class="box-nota">
            <div>Nota</div>
            <div class="campo-nota"></div>
          </div>
        </div>
      </div>

      <div class="linha-divisoria"></div>

      ${instrucoesHTML}

      <div class="questoes">
        <div class="coluna col-esq"></div>
        <div class="coluna col-dir"></div>
      </div>
    `

    folhas.appendChild(pagina)

    // 🔥 QR
    const img = pagina.querySelector(".imgGabarito")
    const qrData = `ID=${prova.id}|T=${turmaCodigo}|V=${versaoAtual.v}|F=${i}`;
    gerarImagemGabarito(img, questoesVersao.length, qrData);

    // 🔥 COLUNAS
    let colEsq = pagina.querySelector(".col-esq")
    let colDir = pagina.querySelector(".col-dir")
	let areaQuestoes = pagina.querySelector(".questoes")

    let lado = "esq"

    questoesVersao.forEach((q, index) => {

      const questao = criarQuestaoHTML(q, index)

      if(lado === "esq"){
        colEsq.appendChild(questao)

        const LIMITE = pagina.clientHeight - areaQuestoes.offsetTop - 40
		if(areaQuestoes.scrollHeight > LIMITE){
          colEsq.removeChild(questao)
          lado = "dir"
        }
      }

      const LIMITE = pagina.clientHeight - areaQuestoes.offsetTop - 40
	   if(areaQuestoes.scrollHeight > LIMITE){
        colDir.appendChild(questao)

        if(pagina.scrollHeight > pagina.clientHeight){

          colDir.removeChild(questao)

          let novaPagina = document.createElement("div")
          novaPagina.className = "pagina"

          novaPagina.innerHTML = `
		    <div class="linha-divisoria"></div>
            <div class="questoes">
              <div class="coluna col-esq"></div>
              <div class="coluna col-dir"></div>
            </div>
          `

          folhas.appendChild(novaPagina)

          pagina = novaPagina
          colEsq = pagina.querySelector(".col-esq")
          colDir = pagina.querySelector(".col-dir")
		  areaQuestoes = pagina.querySelector(".questoes")

          lado = "esq"

          colEsq.appendChild(questao)
        }
      }

    })
  }

  localStorage.setItem("provaGerada", JSON.stringify(prova))
  document.getElementById("btnPDF").style.display = "block"
}


/*=====Criar Questoes no  HTML =====*/
function criarQuestaoHTML(q, i){

  const div = document.createElement("div")
  div.className = "questao"

  const temImagem = q.IMAGEM && q.IMAGEM.trim() !== ""

  div.innerHTML = `
    <div class="enunciado">
      <strong>Q${i+1} - Peso ${Number(q.PESO || 1).toFixed(1)}</strong> - ${q.ENUNCIADO}
    </div>

    ${temImagem ? `
      <div class="img-container">
        <img src="${q.IMAGEM}">
      </div>
    ` : ""}

    <div class="alternativas">
      ${q.alternativas.map(a => `
        <div>${a.novaLetra}) ${a.texto}</div>
      `).join("")}
    </div>
  `

  return div
}	

/* ===== RESIZE IMAGEM ===== */

function ativarResize(){

  document.querySelectorAll(".resizer").forEach(resizer => {

    const img = resizer.previousElementSibling

    let startX, startWidth

    // ===== MOUSE =====
    resizer.onmousedown = (e)=>{
      startX = e.clientX
      startWidth = img.offsetWidth

      document.onmousemove = (e)=>{
        let newWidth = startWidth + (e.clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.onmouseup = ()=>{
        document.onmousemove = null
      }
    }

    // ===== TOUCH (CELULAR) =====
    resizer.ontouchstart = (e)=>{
      startX = e.touches[0].clientX
      startWidth = img.offsetWidth

      document.ontouchmove = (e)=>{
        let newWidth = startWidth + (e.touches[0].clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.ontouchend = ()=>{
        document.ontouchmove = null
      }
    }

  })
}

async function gerarPDF(){
	// 🔥 esconder resizers antes do capture
const resizers = document.querySelectorAll(".resizer")
resizers.forEach(r => r.style.display = "none")
	
  // 🔥 remove páginas vazias antes de gerar PDF
     document.querySelectorAll(".pagina").forEach(p => {
      if(p.innerText.trim().length < 10){
      p.remove()
  }
})

  const btn = document.getElementById("btnPDF")

  btn.disabled = true
  btn.innerText = "Gerando PDF..."

  const { jsPDF } = window.jspdf
  const paginas = document.querySelectorAll(".pagina")

  if(paginas.length === 0){
    btn.disabled = false
    btn.innerText = "Gerar PDF"
    alert("Nada para gerar")
    return
  }

  const pdf = new jsPDF("p", "mm", "a4")

  for(let i = 0; i < paginas.length; i++){

    btn.innerText = `Gerando ${i+1}/${paginas.length}...`

    const el = paginas[i]

    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true
    })

    const imgData = canvas.toDataURL("image/jpeg", 0.8)


	const imgWidth = 210
    const pageHeight = 297

    let imgHeight = (canvas.height * imgWidth) / canvas.width

      

    if(i > 0){
    const isBlank = paginas[i].innerText.trim().length < 10
    if(!isBlank){
    pdf.addPage()
    }else{
    continue
  }
}

    pdf.addImage(imgData, "JPEG", 0, 0, imgWidth, imgHeight)
  }

  btn.innerText = "Finalizando..."

  await new Promise(r => setTimeout(r, 300))

  pdf.save("prova.pdf")

 // 🔥 trava nome após primeiro PDF
if(!prova.nomeTravado){
  document.getElementById("nomeProva").disabled = true
  prova.nomeTravado = true
  localStorage.setItem("provaGerada", JSON.stringify(prova))
}

  // 🔥 restaurar resizers depois do PDF
  resizers.forEach(r => r.style.display = "block")

  btn.disabled = false
  btn.innerText = "Gerar PDF"
  
}

/* INIT */
//gerarPreview()
//window.onload = carregarPainel
window.onload = () => {
  carregarPainel()

  document.getElementById("turmaSelect").addEventListener("change", () => {
    document.getElementById("btnPDF").style.display = "none"
  })
}

</script>

</body>
</html>
