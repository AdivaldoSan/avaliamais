<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:100%;
  max-width:650px;
  margin-top:10px;
  background:#000;
}

#status{
  font-size:28px;
  margin-top:10px;
}

#debug{
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<h2>Scanner Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando...</div>
<div id="debug"></div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let framesEstaveis = 0
let rodando = true

/* =========================
CAMERA
========================= */
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
  video.onloadedmetadata = ()=>{
    video.play()
    loop()
  }
})
.catch(err=>{
  document.getElementById("status").innerText =
    "Erro câmera: " + err.message
})

/* =========================
LOOP
========================= */
function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

  // threshold
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 80 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  let ret = detectarRetangulo(frame)

  if(ret){

    desenharRetangulo(ret)

    framesEstaveis++
    document.getElementById("status").innerText =
      "🟡 Detectado - estabilizando " + framesEstaveis

    if(framesEstaveis > 10){
      capturar(frame, ret)
      return
    }

  }else{
    framesEstaveis = 0
    document.getElementById("status").innerText =
      "🔴 Posicione o gabarito"
  }

  requestAnimationFrame(loop)
}

/* =========================
DETECÇÃO POR BORDA
========================= */
function detectarRetangulo(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let minX=99999,maxX=0,minY=99999,maxY=0
  let count = 0

  for(let y=1;y<h-1;y+=2){
    for(let x=1;x<w-1;x+=2){

      let i = (y*w+x)*4

      let atual = data[i]
      let direita = data[i+4]
      let baixo = data[i+w*4]

      if(Math.abs(atual - direita) > 120 ||
         Math.abs(atual - baixo) > 120){

        count++

        if(x<minX) minX=x
        if(x>maxX) maxX=x
        if(y<minY) minY=y
        if(y>maxY) maxY=y
      }
    }
  }

  document.getElementById("debug").innerText =
    "Pontos borda: " + count

  if(count < 500) return null

  let largura = maxX - minX
  let altura = maxY - minY

  if(largura < w*0.3 || altura < h*0.3) return null

  return {
    TL:{x:minX,y:minY},
    TR:{x:maxX,y:minY},
    BL:{x:minX,y:maxY},
    BR:{x:maxX,y:maxY}
  }
}

/* =========================
DESENHO VISUAL
========================= */
function desenharRetangulo(r){

  ctx.strokeStyle = "lime"
  ctx.lineWidth = 4

  ctx.beginPath()
  ctx.moveTo(r.TL.x, r.TL.y)
  ctx.lineTo(r.TR.x, r.TR.y)
  ctx.lineTo(r.BR.x, r.BR.y)
  ctx.lineTo(r.BL.x, r.BL.y)
  ctx.closePath()
  ctx.stroke()
}

/* =========================
CAPTURA
========================= */
function capturar(frame, r){

  rodando = false

  ctx.strokeStyle = "yellow"
  ctx.lineWidth = 6

  ctx.beginPath()
  ctx.moveTo(r.TL.x, r.TL.y)
  ctx.lineTo(r.TR.x, r.TR.y)
  ctx.lineTo(r.BR.x, r.BR.y)
  ctx.lineTo(r.BL.x, r.BL.y)
  ctx.closePath()
  ctx.stroke()

  document.getElementById("status").innerText =
    "🟢 Capturado"
}

</script>

</body>
</html>
