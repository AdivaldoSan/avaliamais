<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner | Avalia+</title>
<link rel="stylesheet" href="styles.css">

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:90vw;        /* ocupa 90% da largura da tela */
  height:auto;
  display:block;
  margin:0 auto;     /* centraliza */
}

#status{
display:none;
}

button{
  padding:10px 16px;
  margin:5px;
}

#qtdBox{
  font-size:22px;
  margin:10px;
}

#botoes{
  width:90vw;              /* igual ao canvas */
  margin:15px auto;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;                  /* cada botão ocupa 1/3 */
  padding:18px 10px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

/* cores específicas */
.btn{
  background:#444;
}

.btn.confirmar{
  background:#28a745; /* verde */
}

.btn.refazer{
  background:#dc3545; /* vermelho */
}

/* efeito clique */
.btn:active{
  transform:scale(0.96);
}

#titulo{
  font-size:28px;
  font-weight:bold;
  margin:10px 0;

  background:linear-gradient(90deg,#00ffcc,#00aaff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#resultado{
  width:90vw;
  margin:10px auto;
  font-size:16px;
  line-height:1.4;
}

.resultadoBox{
  width:90vw;
  margin:10px auto;
  padding:15px;
  background:#1a1a1a;
  border-radius:12px;
}

.tituloResultado{
  display:none;
}

.bolinhas{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:10px;
}

.acertos{
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

.bolinha{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  width:44px;
  height:44px;
  border-radius:50%;

  margin:6px;

  font-size:24px;
  font-weight:bold;
  color:#fff;

  /* 🔥 efeito 3D + brilho */
  box-shadow:
    inset -4px -6px 10px rgba(0,0,0,0.8),
    inset 4px 4px 8px rgba(255,255,255,0.35),
    0 4px 12px rgba(0,0,0,0.9),
    0 0 8px rgba(255,255,255,0.2);
}

/* verde (acerto) */
.bolinha.correta{
  background:linear-gradient(145deg,#00ffcc,#00997a);
}

/* vermelho (erro) */
.bolinha.errada{
  background:linear-gradient(145deg,#ff5a5a,#990000);
}

.quiz-header{
  text-align:left;
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:90vw;
  margin:10px auto;
}

.quiz-titulo{
  font-size:22px;
  font-weight:bold;
}

.quiz-info{
  font-size:14px;
  opacity:0.7;
}

.quiz-logo-direita{
  height:40px;
}
</style>
</head>

<body>

<div class="quiz-header">
    <div>
        <div class="quiz-titulo">
            Scanner Avalia+
        </div>
        <div class="quiz-info">
            Leitura automática de gabarito
        </div>
    </div>

    <img src="favicon.svg" class="quiz-logo-direita" alt="Avalia+">
</div>

<div id="qtdBox" style="display:none;">
  <span id="qtdLabel">--</span>
</div>

<br>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<video id="video" autoplay playsinline style="display:none;"></video>
<audio id="somQR" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<div id="cameraBox" style="position:relative; display:inline-block;">
  <canvas id="canvas"></canvas>

  <div id="qrBox" style="
  position:absolute;
  width:60%;
  aspect-ratio:1/1;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
">

  <div style="position:absolute; inset:0;">

    <div style="
      position:absolute;
      width:40px;
      height:40px;
      border-top:5px solid white;
      border-left:5px solid white;
      top:0;
      left:0;
    "></div>

    <div style="
      position:absolute;
      width:40px;
      height:40px;
      border-top:5px solid white;
      border-right:5px solid white;
      top:0;
      right:0;
    "></div>

    <div style="
      position:absolute;
      width:40px;
      height:40px;
      border-bottom:5px solid white;
      border-left:5px solid white;
      bottom:0;
      left:0;
    "></div>

    <div style="
      position:absolute;
      width:40px;
      height:40px;
      border-bottom:5px solid white;
      border-right:5px solid white;
      bottom:0;
      right:0;
    "></div>

  </div>
  </div>

  <div id="msgGabarito" style="
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:#00ffcc;
  padding:30px 50px;
  font-size:28px;
  font-weight:bold;
  border-radius:12px;
  min-width:250px;
  max-width:80%;
  text-align:center;
  box-shadow:0 0 20px #00ffcc;
  display:none;
  z-index:20;
">
  Aponte para o gabarito
  </div>
</div>
    

<div id="status">Aguardando QR...</div>
  
<div id="uiLeitura" style="display:none;">

  <div id="respostas" style="margin-top:10px;"></div>

  <div id="botoes">
  <button class="btn" onclick="lerNovamente()">Ler novamente</button>
  <button class="btn confirmar" onclick="confirmar()">Confirmar</button>
  <button class="btn refazer" onclick="refazer()">Refazer</button>
  </div>

  <div id="resultado"></div>

</div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

// ==============================
// VARIÁVEIS GLOBAIS
// ==============================
let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
cv.onRuntimeInitialized = () => {
  pronto = true
  iniciar()
}

  
let capturado=false
let framesOK=0
let ultimaImagem=null
let respostasLidas=[]
let qrProcessado = false

// 🔥 NOVO CONTROLE
let modo = "qr"
let gabaritoQR = null
let qtdQR = 0
let qrFramesOK = 0
let qrLido = false
  
let DEBUG = false
let logBuffer = []

function tocarSomQR(){
  const audio = document.getElementById("somQR")
  audio.currentTime = 0
  audio.play().catch(()=>{})
}  
  
function log(msg){
  if(!DEBUG) return

  logBuffer.push(msg)

  if(logBuffer.length > 8){
    logBuffer.shift()
  }

  document.getElementById("status").innerText = logBuffer.join("\n")
}

// ==============================
const TEMPLATE = {
  colunas: [0.30, 0.45, 0.58, 0.73],
  questoes: 10
}

// ==============================
function getTopoBase(qtd){

  const pontos = [
    {q:1, topo:0.5307, base:0.5307},
    {q:5, topo:0.3248, base:0.7137},
    {q:6, topo:0.2908, base:0.7396},
    {q:8, topo:0.2508, base:0.7811},
    {q:10, topo:0.2158, base:0.8090},
    {q:15, topo:0.1607, base:0.8563}
  ]

  let exato = pontos.find(p => p.q === qtd)
  if(exato) return exato

  for(let i=0;i<pontos.length-1;i++){
    let p1 = pontos[i]
    let p2 = pontos[i+1]

    if(qtd > p1.q && qtd < p2.q){
      let t = (qtd - p1.q) / (p2.q - p1.q)
      return {
        topo: p1.topo + t*(p2.topo - p1.topo),
        base: p1.base + t*(p2.base - p1.base)
      }
    }
  }

  return pontos[pontos.length-1]
}
  
function atualizarUI(){

  const ui = document.getElementById("uiLeitura")
  const qrBox = document.getElementById("qrBox")

  if(modo === "qr"){
    ui.style.display = "none"
    qrBox.style.display = "block"
  }
  else if(modo === "espera"){
    ui.style.display = "none"
    qrBox.style.display = "none"
  }
  else if(modo === "leitura" && capturado){
    ui.style.display = "block"
    qrBox.style.display = "none"
  }
  else{
    ui.style.display = "none"
  }
     }

// ==============================
function iniciar(){
  log("Solicitando câmera...")

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(stream=>{
    log("Câmera liberada ✔")

    video.srcObject=stream

    video.onloadedmetadata=()=>{
      log("Metadata carregado ✔")

      video.play()
      loop()
    }
  })
  .catch(err=>{
    log("ERRO câmera: " + err.message)
  })
}

// ==============================
// 🔥 LEITOR QR (ANTES DE TUDO)
// ==============================

  function detectarQR(){

  const box = document.getElementById("qrBox")
  const rect = box.getBoundingClientRect()
  const canvasRect = canvas.getBoundingClientRect()

  const scaleX = canvas.width / canvasRect.width
  const scaleY = canvas.height / canvasRect.height

  const x = (rect.left - canvasRect.left) * scaleX
  const y = (rect.top - canvasRect.top) * scaleY
  const w = rect.width * scaleX
  const h = rect.height * scaleY

  log("area leitura: "+Math.floor(x)+","+Math.floor(y)+" "+Math.floor(w)+"x"+Math.floor(h))

  let imageData = ctx.getImageData(x, y, w, h)

  let code = jsQR(
    imageData.data,
    imageData.width,
    imageData.height
  )

  if(!code){
    log("❌ QR NÃO detectado")
    qrFramesOK = 0
    return
  }

  log("✅ QR detectado")

  let texto = code.data

  if(!texto.includes("AVALIA+")){
    log("QR inválido")
    qrFramesOK = 0
    return
  }

  qrFramesOK++

  if(qrFramesOK > 2 && !qrLido){
    tocarSomQR()

    qrLido = true
    

    let partes = texto.split("|")

    qtdQR = parseInt(partes[1].split("=")[1])
    gabaritoQR = partes[2].split("=")[1]

    TEMPLATE.questoes = qtdQR
    document.getElementById("qtdLabel").innerText = qtdQR

    modo = "espera"
    atualizarUI()
    
    document.getElementById("msgGabarito").style.display = "block"

    log("QR OK → indo pra leitura")
  }
  }

// ==============================
function loop(){

  log("Loop ativo | modo: " + modo + 
    " | video: " + video.videoWidth + "x" + video.videoHeight)

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  // 🔥 BLOQUEIO DO OPENCV
  if(modo === "qr"){
    detectarQR()
    requestAnimationFrame(loop)
    return
  }
  if(modo === "espera"){

  // verifica se QR ainda está visível
  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)

  let code = jsQR(
    imageData.data,
    imageData.width,
    imageData.height
  )

  if(!code){
    modo = "leitura"
    atualizarUI()
    log("QR saiu → iniciando leitura")
  }

  requestAnimationFrame(loop)
  return
  }

  // ==============================
  // 🔥 DAQUI PRA BAIXO NÃO FOI ALTERADO
  // ==============================

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){
    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)
    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()
    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      quadrados.push(cv.boundingRect(approx))
    }
  }

  if(quadrados.length===4){
    framesOK++
    if(framesOK>6){
      capturarFrame(quadrados)
    }
  }else{
    framesOK=0
  }

  src.delete(); gray.delete(); bin.delete()
  contours.delete(); hierarchy.delete()

  requestAnimationFrame(loop)
}

// ==============================
function capturarFrame(quadrados){

  capturado=true
  atualizarUI()
  
  document.getElementById("msgGabarito").style.display = "none"

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  ultimaImagem = dst.clone()

  lerRespostas(dst)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"
}

// ==============================
function lerRespostas(mat){

  let qtd = TEMPLATE.questoes
  let tb = getTopoBase(qtd)

  let topo = tb.topo
  let base = tb.base
  let passo = qtd>1 ? (base-topo)/(qtd-1) : 0

  respostasLidas=[]

  for(let i=0;i<qtd;i++){

    let y = (qtd===1)? topo : topo + i*passo

    let valores=[]

    for(let j=0;j<4;j++){

      let x=TEMPLATE.colunas[j]
      let px=Math.floor(x*mat.cols)
      let py=Math.floor(y*mat.rows)

      let roi = mat.roi(new cv.Rect(px-15,py-15,30,30))

      let gray=new cv.Mat()
      cv.cvtColor(roi,gray,cv.COLOR_RGBA2GRAY)

      let t=new cv.Mat()
      cv.threshold(gray,t,0,255,
        cv.THRESH_BINARY_INV+cv.THRESH_OTSU)

      valores.push(cv.countNonZero(t)/(30*30))

      gray.delete(); t.delete(); roi.delete()
    }

    let max=Math.max(...valores)
    let idx=valores.indexOf(max)

    let resp="-"

    let ordenado=[...valores].sort((a,b)=>b-a)

    if(max>0.25 && (ordenado[0]-ordenado[1])>0.08){
      resp=["A","B","C","D"][idx]

      // ✅ DESENHAR BOLHA VERDE
  let cx = TEMPLATE.colunas[idx] * mat.cols
  let cy = y * mat.rows

  ctx.beginPath()
  ctx.arc(cx, cy, 12, 0, Math.PI * 2)
  ctx.lineWidth = 3
  ctx.strokeStyle = "lime"
  ctx.stroke()
    }

    respostasLidas.push(resp)
  }

  //document.getElementById("respostas").innerText =
    //"Aluno: "+respostasLidas.join(" ")
}

// ==============================
function confirmar(){

  let gabarito = gabaritoQR.split("")

  let html = `
  <div class="resultadoBox">
    <div class="tituloResultado">Resultado</div>
    <div class="bolinhas">
`

  let acertos=0

  for(let i=0;i<gabarito.length;i++){

  let correta = respostasLidas[i]===gabarito[i]

  if(correta) acertos++

  html += `
  <div class="bolinha ${correta ? 'correta' : 'errada'}">
    ${i+1}
  </div>
`
    }
  html += `
  </div>
</div>
`

  document.getElementById("resultado").innerHTML=html
}

// ==============================
function ordenar(q){
  q.sort((a,b)=>a.y-b.y)
  let top=q.slice(0,2)
  let bottom=q.slice(2,4)
  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)
  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

// ==============================
function refazer(){
  capturado=false
  framesOK=0
  respostasLidas=[]
  document.getElementById("resultado").innerHTML=""

  modo = "qr"
  gabaritoQR = null
  atualizarUI()

  document.getElementById("status").innerText = "Aguardando QR..."

  qrLido = false
  qrFramesOK = 0   // ✅ faltava isso
}

function lerNovamente(){

  capturado = false
  framesOK = 0

  respostasLidas = []
  document.getElementById("resultado").innerHTML = ""
  document.getElementById("respostas").innerText = ""

  modo = "leitura"
  atualizarUI()
}

document.addEventListener("DOMContentLoaded", atualizarUI)  

</script>

</body>
</html>
