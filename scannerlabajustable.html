<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAB Calibração Gabarito</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:900px;
  max-width:95vw;
  margin-top:10px;
  background:#000;
}

.controls{
  margin:10px;
}
</style>
</head>

<body>

<h2>LAB Calibração (1–20 questões)</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">

<br><br>

Questões:
<select id="qtd"></select>

<br><br>

Threshold:
<input type="range" id="threshold" min="30" max="150" value="60">
<span id="tVal">60</span>

<br><br>

Topo <input type="range" id="topo" min="0" max="1" step="0.01" value="0.18">
Base <input type="range" id="base" min="0" max="1" step="0.01" value="0.88">

<br><br>

Esq <input type="range" id="esq" min="0" max="1" step="0.01" value="0.22">
Dir <input type="range" id="dir" min="0" max="1" step="0.01" value="0.83">

<br><br>

<button onclick="processar()">Atualizar</button>
<button onclick="salvar()">Salvar Parâmetros</button>

<pre id="saida"></pre>

<canvas id="canvas"></canvas>

<script>

// preencher select
let sel = document.getElementById("qtd")
for(let i=1;i<=20;i++){
  let op = document.createElement("option")
  op.value = i
  op.text = i
  sel.appendChild(op)
}
sel.value = 10

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

let img = null

function carregarImagem(e){
  const file = e.target.files[0]
  img = new Image()
  img.onload = ()=>{
    canvas.width = img.width
    canvas.height = img.height
    processar()
  }
  img.src = URL.createObjectURL(file)
}

function processar(){

if(!img) return

ctx.drawImage(img,0,0)

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

let THRESHOLD = parseInt(document.getElementById("threshold").value)

// binariza
for(let i=0;i<data.length;i+=4){
  let brilho = (data[i]+data[i+1]+data[i+2])/3
  let cor = brilho < THRESHOLD ? 0 : 255
  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

// flood fill (igual seu)
let w=canvas.width,h=canvas.height
let visitado=new Uint8Array(w*h)
let blobs=[]

function flood(x,y){
  let stack=[[x,y]]
  let minX=x,maxX=x,minY=y,maxY=y,area=0

  while(stack.length){
    let [px,py]=stack.pop()
    let idx=py*w+px
    if(visitado[idx])continue
    visitado[idx]=1
    let i=idx*4
    if(frame.data[i]!=0)continue
    area++
    minX=Math.min(minX,px)
    maxX=Math.max(maxX,px)
    minY=Math.min(minY,py)
    maxY=Math.max(maxY,py)

    for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx, ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h) stack.push([nx,ny])
      }
    }
  }

  return {area,minX,maxX,minY,maxY}
}

for(let y=0;y<h;y+=2){
  for(let x=0;x<w;x+=2){
    let idx=y*w+x
    if(visitado[idx])continue
    let i=idx*4
    if(frame.data[i]==0){
      let b=flood(x,y)
      if(b.area>200)blobs.push(b)
    }
  }
}

// marcadores
let m = blobs.sort((a,b)=>b.area-a.area).slice(0,4)
if(m.length<4)return

let c = m.map(b=>({
  x:(b.minX+b.maxX)/2,
  y:(b.minY+b.maxY)/2
}))

c.sort((a,b)=>a.y-b.y)

let top=c.slice(0,2).sort((a,b)=>a.x-b.x)
let bot=c.slice(2,4).sort((a,b)=>a.x-b.x)

let TL=top[0], TR=top[1], BL=bot[0], BR=bot[1]

// função perspectiva
function p(u,v){
  return {
    x:(1-u)*(1-v)*TL.x + u*(1-v)*TR.x + (1-u)*v*BL.x + u*v*BR.x,
    y:(1-u)*(1-v)*TL.y + u*(1-v)*TR.y + (1-u)*v*BL.y + u*v*BR.y
  }
}

// sliders
let topo=parseFloat(document.getElementById("topo").value)
let base=parseFloat(document.getElementById("base").value)
let esq=parseFloat(document.getElementById("esq").value)
let dir=parseFloat(document.getElementById("dir").value)

let linhas=parseInt(sel.value)
let colunas=4

ctx.strokeStyle="lime"

// grade
for(let i=0;i<=linhas;i++){
  let v=topo+(i/linhas)*(base-topo)
  let a=p(esq,v)
  let b=p(dir,v)
  ctx.beginPath()
  ctx.moveTo(a.x,a.y)
  ctx.lineTo(b.x,b.y)
  ctx.stroke()
}

for(let j=0;j<=colunas;j++){
  let u=esq+(j/colunas)*(dir-esq)
  let a=p(u,topo)
  let b=p(u,base)
  ctx.beginPath()
  ctx.moveTo(a.x,a.y)
  ctx.lineTo(b.x,b.y)
  ctx.stroke()
}

}

function salvar(){

let dados = {
  q: parseInt(sel.value),
  topo: parseFloat(document.getElementById("topo").value),
  base: parseFloat(document.getElementById("base").value),
  esq: parseFloat(document.getElementById("esq").value),
  dir: parseFloat(document.getElementById("dir").value)
}

document.getElementById("saida").innerText =
JSON.stringify(dados, null, 2)
}

</script>

</body>
</html>
