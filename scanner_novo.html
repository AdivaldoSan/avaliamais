<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Híbrido</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:125vw;
  max-width:650px;
  margin-top:10px;
  background:#000;
}

button{
  padding:28px 40px;
  margin:10px;
  font-size:24px;
  border:none;
  border-radius:8px;
}

#confirmar{background:#2ecc71;}
#refazer{background:#e74c3c;}

#gabarito{
  margin-top:15px;
  font-size:18px;
  color:#00ffcc;
}

#status{
  font-size: 46px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Scanner Híbrido (QR + Detecção)---</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando...</div>

<div id="botoes" style="display:none;">
  <button id="confirmar" onclick="confirmar()">✔ Confirmar</button>
  <button id="refazer" onclick="refazer()">❌ Refazer</button>
</div>

  <div id="debug" style="font-size:16px;color:#ccc;margin-top:10px;"></div>

<div id="gabarito"></div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let rodando = true
let framesEstaveis = 0
let ultimoCentro = null

/* =========================
SIMULAÇÃO QR (SUBSTITUIR DEPOIS)
========================= */
let qr = {
  questoes: 10,
  colunas: 4
}

/* =========================
CAMERA
========================= */
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:{ ideal:"environment" } }
})
.then(stream=>{
  video.srcObject = stream
  video.onloadedmetadata = () => {
    video.play()
    loop()
  }
})
.catch(err=>{
  document.getElementById("status").innerText =
    "❌ Erro câmera: " + err.message
})

/* =========================
LOOP
========================= */
function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

  // threshold
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 50 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)
  let marcadores = null
  let marcadores = detectarMarcadores(frame)

  document.getElementById("debug").innerText =
  `Blobs: ${window._blobs || 0} | Candidatos: ${window._candidatos || 0}`

  if(marcadores){

    let centro = centroMedio(marcadores)

    if(ultimoCentro){
      let dist = Math.hypot(
        centro.x-ultimoCentro.x,
        centro.y-ultimoCentro.y
      )
      framesEstaveis = dist < 2 ? framesEstaveis+1 : 0
    }

    ultimoCentro = centro

    document.getElementById("status").innerText =
      `🟡 Estabilizando (${framesEstaveis})`

    if(framesEstaveis > 8){
      capturar(frame, marcadores)
      return
    }

  }else{
    document.getElementById("status").innerText =
      "🔴 Posicione o gabarito"
  }

  requestAnimationFrame(loop)
}

/* =========================
CAPTURA
========================= */
function capturar(frame, marcadores){

  rodando = false

  ctx.putImageData(frame,0,0)

  processarImagem(frame, marcadores)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"

  document.getElementById("botoes").style.display="block"
}

/* =========================
REFazer
========================= */
function refazer(){
  rodando = true
  framesEstaveis = 0
  ultimoCentro = null
  document.getElementById("botoes").style.display="none"
  document.getElementById("gabarito").innerText=""
  loop()
}

/* =========================
DETECTAR MARCADORES
========================= */
function detectarMarcadores(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function floodFill(x,y){

    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
        for(let dy=-1;dy<=1;dy++){
          let nx=px+dx
          let ny=py+dy
          if(nx>=0&&ny>=0&&nx<w&&ny<h){
            stack.push([nx,ny])
          }
        }
      }
    }

    return {area,minX,maxX,minY,maxY}
  }

  // varrer imagem
  for(let y=0;y<h;y+=4){
    for(let x=0;x<w;x+=4){

      let idx=y*w+x
      if(visitado[idx]) continue

      let i=idx*4

      if(data[i]===0){
        let b=floodFill(x,y)
        if(b.area>500) blobs.push(b)
      }
    }
  }

  // debug
  window._blobs = blobs.length

  // =========================
  // FILTRAR MARCADORES NOS CANTOS
  // =========================
  let candidatos = blobs.filter(b=>{

    let cx = (b.minX + b.maxX)/2
    let cy = (b.minY + b.maxY)/2

    let margemX = w * 0.25
    let margemY = h * 0.25

    let canto =
      (cx < margemX && cy < margemY) || // TL
      (cx > w - margemX && cy < margemY) || // TR
      (cx < margemX && cy > h - margemY) || // BL
      (cx > w - margemX && cy > h - margemY) // BR

    return canto && b.area > 1500
  })

  // debug
  window._candidatos = candidatos.length

  // ordenar por tamanho
  candidatos.sort((a,b)=>b.area-a.area)

  if(candidatos.length < 4) return null

  let maiores = candidatos.slice(0,4)

  return maiores.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))
}
/* =========================
CENTRO
========================= */
function centroMedio(cs){
  let x=0,y=0
  cs.forEach(c=>{x+=c.x;y+=c.y})
  return {x:x/cs.length,y:y/cs.length}
}

/* =========================
PROCESSAMENTO HÍBRIDO
========================= */
function processarImagem(frame, marcadores){

  // =========================
  // DEFINIR CANTOS CORRETOS
  // =========================

  let TL = marcadores.reduce((p,c)=> (c.x + c.y < p.x + p.y ? c : p))
  let BR = marcadores.reduce((p,c)=> (c.x + c.y > p.x + p.y ? c : p))
  let TR = marcadores.reduce((p,c)=> (c.x - c.y > p.x - p.y ? c : p))
  let BL = marcadores.reduce((p,c)=> (c.x - c.y < p.x - p.y ? c : p))

  // canvas temporário
  let tempCanvas = document.createElement("canvas")
  tempCanvas.width = canvas.width
  tempCanvas.height = canvas.height

  let tctx = tempCanvas.getContext("2d")
  tctx.putImageData(frame,0,0)

  // warp
  let warp = warpImagem(tempCanvas, TL, TR, BL, BR)

  ctx.drawImage(warp,0,0)

  let warpCtx = warp.getContext("2d")
  let imageData = warpCtx.getImageData(0,0,warp.width,warp.height)

  let data = imageData.data
  let w = warp.width
  let h = warp.height

  let TOTAL_LINHAS = qr.questoes
  let TOTAL_COLUNAS = qr.colunas

  let raio = Math.min(w/TOTAL_COLUNAS, h/TOTAL_LINHAS) * 0.25
  let densThreshold = 0.20

  let respostas = []

  for(let i=0;i<TOTAL_LINHAS;i++){

    respostas[i] = []

    for(let j=0;j<TOTAL_COLUNAS;j++){

      let x = (j + 0.5) * (w / TOTAL_COLUNAS)
      let y = (i + 0.5) * (h / TOTAL_LINHAS)

      let soma = 0
      let cont = 0

      for(let dx=-raio; dx<=raio; dx++){
      for(let dy=-raio; dy<=raio; dy++){

        if(dx*dx+dy*dy > raio*raio*0.6) continue

        let px = Math.floor(x+dx)
        let py = Math.floor(y+dy)

        if(px<0||py<0||px>=w||py>=h) continue

        let idx = (py*w+px)*4
        cont++

        if(data[idx]===0) soma++
      }}

      let dens = soma / cont

      if(dens > densThreshold){

        respostas[i].push(j)

        ctx.fillStyle="rgba(0,255,0,0.5)"
        ctx.beginPath()
        ctx.arc(x,y,raio,0,Math.PI*2)
        ctx.fill()
      }

      ctx.fillStyle="red"
      ctx.fillRect(x-2,y-2,4,4)
    }
  }

  let letras=["A","B","C","D"]

  let txt = respostas.map((r,i)=>{
    if(!r.length) return `${i+1}: -`
    return `${i+1}: ${r.map(j=>letras[j]).join(",")}`
  })

  document.getElementById("gabarito").innerText =
    txt.join(" | ")
}

function confirmar(){
  alert("Leitura confirmada")
}

function interpolar(u, v, TL, TR, BL, BR){

  let x =
    (1-u)*(1-v)*TL.x +
    u*(1-v)*TR.x +
    (1-u)*v*BL.x +
    u*v*BR.x

  let y =
    (1-u)*(1-v)*TL.y +
    u*(1-v)*TR.y +
    (1-u)*v*BL.y +
    u*v*BR.y

  return {x,y}
} 

function calibrarProporcoes(frame, TL, TR, BL, BR, TOTAL_LINHAS, TOTAL_COLUNAS){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  function interp(u,v){
    return {
      x:
        (1-u)*(1-v)*TL.x +
        u*(1-v)*TR.x +
        (1-u)*v*BL.x +
        u*v*BR.x,
      y:
        (1-u)*(1-v)*TL.y +
        u*(1-v)*TR.y +
        (1-u)*v*BL.y +
        u*v*BR.y
    }
  }

  function densidade(u,v,raio=8){
    let p = interp(u,v)
    let soma=0, cont=0

     for(let dx=-raio;dx<=raio;dx+=2){
     for(let dy=-raio;dy<=raio;dy+=2){

      if(dx*dx+dy*dy > raio*raio) continue

      let x = Math.floor(p.x+dx)
      let y = Math.floor(p.y+dy)

      if(x<0||y<0||x>=w||y>=h) continue

      let idx=(y*w+x)*4
      cont++

      if(data[idx]===0) soma++
    }}

    return soma/cont
  }

  // busca vertical (topo/base)
  let topo = 0.05
  let base = 0.95

  for(let v=0.05; v<0.5; v+=0.03){
    if(densidade(0.5,v) > 0.02){
      topo = v - 0.02
      break
    }
  }

  for(let v=0.95; v>0.5; v-=0.01){
    if(densidade(0.5,v) > 0.02){
      base = v + 0.02
      break
    }
  }

  // busca horizontal (esquerda/direita)
  let esquerda = 0.05
  let direita = 0.95

  for(let u=0.1; u<0.5; u+=0.03){
    if(densidade(u,0.5) > 0.02){
      esquerda = u - 0.02
      break
    }
  }

  for(let u=0.95; u>0.5; u-=0.01){
    if(densidade(u,0.5) > 0.02){
      direita = u + 0.02
      break
    }
  }

  return {
    topo: Math.max(0, topo),
    base: Math.min(1, base),
    esquerda: Math.max(0, esquerda),
    direita: Math.min(1, direita)
  }
}  

function warpImagem(srcCanvas, TL, TR, BL, BR, W=800, H=1200){

  let dstCanvas = document.createElement("canvas")
  dstCanvas.width = W
  dstCanvas.height = H
  let dctx = dstCanvas.getContext("2d")

  // transformação aproximada (bilinear)
  let img = srcCanvas

  let src = srcCanvas.getContext("2d").getImageData(0,0,srcCanvas.width,srcCanvas.height)
  let dst = dctx.createImageData(W,H)

  function interp(u,v){
    return {
      x:
        (1-u)*(1-v)*TL.x +
        u*(1-v)*TR.x +
        (1-u)*v*BL.x +
        u*v*BR.x,
      y:
        (1-u)*(1-v)*TL.y +
        u*(1-v)*TR.y +
        (1-u)*v*BL.y +
        u*v*BR.y
    }
  }

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){

      let u = x / W
      let v = y / H

      let p = interp(u,v)

      let sx = Math.floor(p.x)
      let sy = Math.floor(p.y)

      if(sx<0||sy<0||sx>=srcCanvas.width||sy>=srcCanvas.height) continue

      let sidx = (sy*srcCanvas.width + sx)*4
      let didx = (y*W + x)*4

      dst.data[didx]   = src.data[sidx]
      dst.data[didx+1] = src.data[sidx+1]
      dst.data[didx+2] = src.data[sidx+2]
      dst.data[didx+3] = 255
    }
  }

  dctx.putImageData(dst,0,0)

  return dstCanvas
}
  
</script>

</body>
</html>
