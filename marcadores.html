<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner - Teste Marcadores</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  margin-top:10px;
  max-width:95vw;
  background:#000;
}
</style>
</head>

<body>

<h2>Scanner - Teste de Marcadores...</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">

<br><br>

<button onclick="processarImagem()">1 - Processar</button>
<button onclick="detectar()">2 - Detectar Marcadores</button>

<br>

<canvas id="canvas"></canvas>

<script>

let imagemCarregada = null

/* =========================
CARREGAR IMAGEM
========================= */

function carregarImagem(event){

const file = event.target.files[0]
const img = new Image()

img.onload = () => {
  imagemCarregada = img
  alert("Imagem carregada. Agora clique em PROCESSAR.")
}

img.src = URL.createObjectURL(file)

}

/* =========================
PASSO 1 - PROCESSAR
========================= */

function processarImagem(){

if(!imagemCarregada) return alert("Carregue uma imagem primeiro")

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = imagemCarregada.width
canvas.height = imagemCarregada.height

ctx.drawImage(imagemCarregada,0,0)

let imgData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imgData.data

let gray = []

// converter para cinza
for(let i=0;i<data.length;i+=4){
  let g = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11
  gray.push(g)
}

// normalizar iluminação
let media = gray.reduce((a,b)=>a+b,0) / gray.length

for(let i=0;i<gray.length;i++){
  gray[i] = gray[i] * (128 / media)
}

// threshold fixo
const THRESHOLD = 112

for(let i=0;i<gray.length;i++){

  let cor = gray[i] < THRESHOLD ? 0 : 255

  let idx = i*4

  data[idx] = data[idx+1] = data[idx+2] = cor
}

ctx.putImageData(imgData,0,0)

alert("Processamento concluído. Agora clique em DETECTAR.")

}

/* =========================
PASSO 2 - DETECTAR
========================= */

function detectar(){

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let imgData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imgData.data

let blocos = []

for(let y=0; y<canvas.height; y+=6){
  for(let x=0; x<canvas.width; x+=6){

    let i = (y * canvas.width + x) * 4

    if(data[i] === 0){

      let largura = 0
      let altura = 0

      while(x+largura < canvas.width){
        let idx = (y * canvas.width + (x+largura)) * 4
        if(data[idx] !== 0) break
        largura++
      }

      while(y+altura < canvas.height){
        let idx = ((y+altura) * canvas.width + x) * 4
        if(data[idx] !== 0) break
        altura++
      }

      if(largura > 25 && altura > 25 && Math.abs(largura-altura) < 10){
        blocos.push({x,y,largura,altura})
      }
    }
  }
}

// ordenar pelos maiores
blocos.sort((a,b)=> (b.largura*b.altura) - (a.largura*a.altura))

let marcadores = blocos.slice(0,4)

// desenhar resultado
ctx.strokeStyle = "red"
ctx.lineWidth = 4

marcadores.forEach(m => {
  ctx.strokeRect(m.x, m.y, m.largura, m.altura)
})

console.log("Marcadores detectados:", marcadores)

alert("Detecção concluída. Veja os quadrados vermelhos.")

}

</script>

</body>
</html>
