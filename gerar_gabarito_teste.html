<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerador de Gabarito</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

h2{
  margin-top:15px;
}

input{
  font-size:22px;
  padding:8px;
  width:120px;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin:8px;
}

canvas{
  background:white;
  width:95vw;
  max-width:900px;
  margin-top:15px;
}

#qrTemp{
  display:none;
}

</style>

</head>

<body>

<h2>Gerador de Gabarito</h2>

Questões

<br>

<input id="qtd" type="number" min="1" max="20" value="5">

<br>

<button onclick="gerar()">Gerar</button>
<button onclick="imprimir()">Imprimir</button>

<br>

<canvas id="canvas"></canvas>

<div id="qrTemp"></div>

<script>

/* =========================
PARÂMETROS DO MODELO
========================= */

// deslocamento global (ESSENCIAL)
const offsetX = 200

const inicioX = 420 + offsetX
const inicioY = 200

const dx = 90
const dy = 80

const raio = 12

const TLx = 160 + offsetX
const TLy = 90

const TRx = 760 + offsetX
const TRy = 90

const marcador = 32

const qrSize = 140

/* ========================= */

function gerar(){

let q = parseInt(document.getElementById("qtd").value)

let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

canvas.width = 1300
canvas.height = inicioY + q*dy + 220

ctx.fillStyle="white"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="black"
ctx.lineWidth=2

/* =========================
LETRAS
========================= */

ctx.fillStyle="black"
ctx.font="30px Arial"

let letras=["A","B","C","D"]

for(let c=0;c<4;c++){

  let x = inicioX + c*dx

  ctx.fillText(
    letras[c],
    x-10,
    inicioY-60
  )

}

/* =========================
QUESTÕES
========================= */

ctx.font="24px Arial"

for(let i=0;i<q;i++){

  let y = inicioY + i*dy

  ctx.fillText(
    (i+1)+".",
    inicioX-60,
    y+6
  )

  for(let c=0;c<4;c++){

    let x = inicioX + c*dx

    ctx.beginPath()
    ctx.arc(x,y,raio,0,Math.PI*2)
    ctx.stroke()

  }

}

/* =========================
MARCADORES
========================= */

ctx.fillRect(TLx,TLy,marcador,marcador)
ctx.fillRect(TRx,TRy,marcador,marcador)

let BLy = inicioY + dy*q + 40
let BRy = inicioY + dy*q + 40

ctx.fillRect(160 + offsetX,BLy,marcador,marcador)
ctx.fillRect(760 + offsetX,BRy,marcador,marcador)

/* =========================
GERAR QR
========================= */

let qrDiv = document.getElementById("qrTemp")
qrDiv.innerHTML=""

let dados = "AVALIA+|Q="+q+"|ID="+Date.now()

new QRCode(qrDiv,{
  text:dados,
  width:qrSize,
  height:qrSize
})

let img = qrDiv.querySelector("img")

/* =========================
SEU POSICIONAMENTO (MANTIDO)
========================= */

const margemQR = qrSize
const qrX = margemQR - 100

const topoBloco = inicioY - 80
const baseBloco = inicioY + dy*q + 80
const centroY = (topoBloco + baseBloco) / 2
const qrY = centroY - qrSize / 2

/* ========================= */

img.onload = () => {

  ctx.drawImage(
    img,
    qrX,
    qrY,
    qrSize,
    qrSize
  )

}

}

/* ========================= */

function imprimir(){
  window.print()
}

gerar()

</script>

</body>
</html>
