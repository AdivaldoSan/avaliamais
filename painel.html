function iniciarPagina(){
    criarLayout();

        <h2 style="margin-bottom:20px;">📊 Painel de Aplicações...</h2>
        <div id="listaAplicacoes" class="card">

    carregarAplicacoes();
}

// =============================
// CARREGAR
// =============================
// =============================
// CARREGAR
// =============================
async function carregarAplicacoes(){

    const token = localStorage.getItem("TOKEN");
    if(!token){
        window.location.href = "index.html";
        return;
    }

    const dados =
        await fetchProtegido(API + "?tipo=listarAplicacoes&token=" + token);

    if(!dados) return;

    if(!Array.isArray(dados) || dados.length <= 1){
        document.getElementById("listaAplicacoes").innerHTML =
            "Nenhuma aplicação encontrada.";
        return;
    }

    const contagem =
        await fetchProtegido(API + "?tipo=contarRespostas&token=" + token);

    if(!contagem) return;

    montarTabela(dados, contagem);
}

// =============================
// TABELA
// =============================
function montarTabela(dados, contagem){

    const linhas = dados.slice(1);

    let html = `
        <div class="table-scroll">
        <table class="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Disciplina</th>
                <th>Data</th>
                <th class="text-center">Qtd. Questões</th>
                <th>Turmas</th>
                <th class="text-center">Respostas</th>
                <th class="text-center">Ações</th>
                <th class="text-center">Ativo</th>
            </tr>
        </thead>
        <tbody>
    `;

    linhas.forEach(l=>{

        const id = l[0];

        
         let disciplina = "-";
        
                try {
        
                        const parametros = l[5] ? JSON.parse(l[5]) : null;
        
                            if(Array.isArray(parametros) && parametros.length > 0){
                            disciplina = parametros[0].DISCIPLINA || "-";
                    }
        
        } catch(e){
            disciplina = "-";
        }
        
        const totalRespostas = contagem[id] || 0;
        const turmas = l[6] ? JSON.parse(l[6]) : [];
        const status = l[7];
        const linkRelatorio = l[8];

        const dataFormatada =
            new Date(l[3]).toLocaleDateString("pt-BR");

        const linkAluno =
            window.location.origin +
            window.location.pathname.replace(
                "painel.html",
                "aluno.html?id="+id
            );

        html += `
            <tr>
                <td>${l[1]}</td>
                <td>${disciplina}</td>
                <td>${dataFormatada}</td>
                <td class="text-center">${l[4]}</td>
                <td>${turmas.join(", ")}</td>
                <td class="text-center">${totalRespostas}</td>

                <td class="text-center">
                    <div class="acoes">

                        ${
                            totalRespostas > 0
                            ? `<button class="btn-acao"
                                       title="Relatório"
                                       onclick="abrirResultados('${id}')">
                                       📊
                               </button>`
                            : "—"
                        }

                        <button class="btn-acao"
                                title="Prova"
                                onclick="gerarPDF('${id}')">
                                📄
                        </button>

                        <button class="btn-acao"
                                title="Gabarito"
                                onclick="gerarGabarito('${id}')">
                                📑
                        </button>

                        <button class="btn-acao"
                                title="Copiar link para os alunos"
                                onclick="copiarLink('${linkAluno}')">
                                🔗
                        </button>

                        <button class="btn-acao"
                                title="QR CODE"
                                onclick="abrirQRCode('${id}')">
                                📱
                        </button>

                    </div>
                </td>

                <td class="text-center">
                    <label class="switch">
                        <input type="checkbox"
                               ${status==="SIM"?"checked":""}
                               onchange="alterarStatus('${id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                </td>

            </tr>
        `;
    });

    html += "</tbody></table></div>";

    document.getElementById("listaAplicacoes").innerHTML = html;
}


// =============================
// COPIAR LINK
// =============================
function copiarLink(link){

    navigator.clipboard.writeText(link)
    .then(()=>{
        mostrarToast("Link copiado com sucesso!");
    })
    .catch(()=>{
        mostrarToast("Não foi possível copiar o link.");
    });

}

// GERAR PDF DA PROVA

        return;
    }

    try{

        const resp = await fetch(API+"?tipo=abrirAplicacao&id="+id);
        const dados = await resp.json();

        if(dados.erro){
            novaJanela.close();
            alert("Erro ao carregar aplicação.");
            return;
        }

        novaJanela.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <base href="${window.location.origin}/">
                    <title>Prova</title>
                    <style>
                        body{
                            font-family: Arial;
                            margin: 50px;
                        }
                
                        .cabecalho{
                            display:flex;
                            align-items:center;
                            gap:15px;
                            margin-bottom:30px;
                        }
                
                        .cabecalho img{
                            height:50px;
                        }
                
                        .titulo-sistema{
                            font-size:18px;
                            font-weight:bold;
                        }
                
                        .subtitulo{
                            font-size:14px;
                            color:#555;
                        }
                
                        h2{
                            text-align:center;
                            margin-bottom:20px;
                        }
                
                        .questao{
                            margin-bottom:25px;
                        }
                    </style>
                </head>
                <body>
                
                <div class="cabecalho">
                    <img src="https://avaliamaisedu.com.br/favicon.svg">
                    <div>
                        <div class="titulo-sistema">Avalia+</div>
                        <div class="subtitulo">Plataforma de Avaliação Digital</div>
                    </div>
                </div>
                
                <h2>${dados.nome}</h2>
                <p>Escola ___________________________________________</p>
                <p>Aluno  ___________________________________________</p>
                <p>Série _________Turma_________</p>
                <hr>
                        `);

        dados.questoes.forEach((q,i)=>{

            novaJanela.document.write(`
                <div class="questao">
                    <b>${i+1}) ${q.ENUNCIADO}</b><br><br>
                    A) ${q.ALT_A}<br>
                    B) ${q.ALT_B}<br>
                    C) ${q.ALT_C}<br>

</body>

     novaJanela.document.close();

// =============================
// ABRIR RELATÓRIO
// =============================
// =============================
// ABRIR RELATÓRIO
// =============================
async function abrirRelatorio(id, linkExistente){

    const novaJanela = window.open("", "_blank");

    if(!novaJanela){
        alert("Permita popups para abrir relatório.");
        return;
    }

    try{

        let linkFinal = linkExistente;

        if(!linkFinal || !linkFinal.startsWith("http")){

            const token = localStorage.getItem("TOKEN");

            const dados =
                await fetchProtegido(
                    API + "?tipo=gerarRelatorio&id=" + id + "&token=" + token
                );

            if(!dados){
                novaJanela.close();
                return;
            }

            linkFinal = dados.link;
        }

        novaJanela.location.href = linkFinal;

    }catch(e){
        novaJanela.close();
        alert("Erro ao abrir relatório.");
    }
}

// ALTERAR STATUS
// =============================
// =============================
// ALTERAR STATUS
// =============================
async function alterarStatus(id, status){

    const token = localStorage.getItem("TOKEN");

    const retorno = await fetchProtegido(API, {
        method:"POST",
        body: JSON.stringify({
            tipo:"alterarStatus",
            token: token,
            id: id,
            status: status
        })
    });

    if(!retorno) return;

    if(retorno.erro){
        alert("Erro: " + retorno.erro);
        return;
    }

    carregarAplicacoes();
}

function abrirQRCode(id){

    const link = window.location.origin +
                 window.location.pathname.replace("painel.html","") +
                 "aluno.html?id=" + id;

    const modal = document.createElement("div");
    modal.id = "modalQR";

  modal.innerHTML = `
    <div class="modal-bg" onclick="fecharQR()"></div>
    <div class="modal-box" style="text-align:center;">

        <h3 style="margin-bottom:15px;">Aplicação via QR Code</h3>

        <div id="qrcode" style="margin:10px 0 20px;"></div>

        <input id="inputLinkQR"
               value="${link}"
               readonly
               style="
                   width:100%;
                   padding:8px;
                   margin-bottom:15px;
                   border:1px solid #ccc;
                   border-radius:4px;
               "
               onclick="this.select()">

        <div style="display:flex; justify-content:center; gap:10px;">
            <button onclick="copiarLink(document.getElementById('inputLinkQR').value)">
                Copiar link
            </button>

            <button onclick="fecharQR()">
                Fechar
            </button>
        </div>

    </div>
`;
    document.body.appendChild(modal);

    new QRCode(document.getElementById("qrcode"), {
        text: link,
        width: 180,
        height: 180
    });
}

function fecharQR(){
    const modal = document.getElementById("modalQR");
    if(modal) modal.remove();
}


function mostrarToast(mensagem){

    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = mensagem;

    document.body.appendChild(toast);

    // força reflow para animar
    setTimeout(() => toast.classList.add("show"), 10);

    // remover após 3s
    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

async function abrirResultados(id){
    
    mostrarLoading("Carregando resultados da aplicação...");

    const token = localStorage.getItem("TOKEN");

    const dados = await fetchProtegido(
        API + "?tipo=obterResultados&id=" + id + "&token=" + token
    );

    esconderLoading();

    if(!dados) return;

    const modal = document.createElement("div");
    modal.id = "modalResultados";

    modal.innerHTML = `
    <div class="modal-bg" onclick="fecharResultados()"></div>

    <div class="modal-box resultados-box">
        <button class="modal-fechar" onclick="fecharResultados()">✕</button>

        <h3 style="margin-bottom:15px; text-align:left;">
            Resultados da Aplicação - ${dados.nome}
        </h3>

        <div id="abasTurmas"></div>

        <div id="tabelaResultados" style="margin-top:15px;"></div>

        <div style="margin-top:20px;text-align:right;">
            <button class="btn-excel" onclick="exportarExcel()">
            Baixar Excel
            </button>
        </div>

    </div>
    `;

    document.body.appendChild(modal);

    window.nomeAplicacao = dados.nome;

    montarAbasTurmas(dados.turmas);
} 

function montarAbasTurmas(dados){

    const turmas = Object.keys(dados);

    window.resultadosCache = dados;

    let html = `<div style="display:flex;gap:8px;flex-wrap:wrap;">`;

    turmas.forEach((t,i)=>{

        html += `
            <button class="abaTurma"
                data-turma="${t}"
                style="
                    padding:6px 12px;
                    border:1px solid #ccc;
                    border-radius:4px;
                    cursor:pointer;
                    ${i===0 ? "background:#1976d2;color:white;" : ""}
                ">
                ${t}
            </button>
        `;
    });

    html += `</div>`;

    document.getElementById("abasTurmas").innerHTML = html;

    const botoes = document.querySelectorAll(".abaTurma");

    botoes.forEach(btn=>{

        btn.addEventListener("click",()=>{

            // remove destaque de todas
            botoes.forEach(b=>{
                b.style.background="";
                b.style.color="";
            });

            // destaca a selecionada
            btn.style.background="#1976d2";
            btn.style.color="white";

            mostrarTurma(btn.dataset.turma);

        });

    });

    // abre primeira turma automaticamente
    if(turmas.length > 0){
        mostrarTurma(turmas[0]);
    }

}

    
function mostrarTurma(turma){

    const lista = window.resultadosCache[turma] || [];

    if(lista.length === 0) return;

    const totalQuestoes = lista[0].questoes.length;

    const resumo = gerarResumo(lista);

    let html = `
    <div class="tabela-scroll">
    <table class="tabela">
    <thead>
        <tr>
            <th>Nº</th>
            <th>Aluno</th>
    `;

    for(let i=1;i<=totalQuestoes;i++){
        html += `<th>Q${i}</th>`;
    }

    html += `
            <th>Acertos</th>
            <th>%</th>
        </tr>
    </thead>
    <tbody>
    `;

    lista.forEach(a=>{

        html += `
        <tr>
            <td>${a.numero}</td>
            <td>${a.nome || "-"}</td>
        `;

        a.questoes.forEach(q=>{

            if(!q){
                html += `<td><div class="resposta-circulo resposta-vazio">-</div></td>`;
                return;
            }

            const classe =
                q.marcada === q.correta
                ? "resposta-acerto"
                : "resposta-erro";

            html += `
            <td>
                <div class="resposta-circulo ${classe}">
                    ${q.marcada}
                </div>
            </td>
            `;

        });

        html += `
            <td>${a.acertos}</td>
            <td>${a.percentual}%</td>
        </tr>
        `;
    });

    html += "</tbody></table></div>";

    // 🔥 RESUMO EMBAIXO
    let htmlResumo = "";

    if(resumo){

        htmlResumo = `
        <div class="resumo-linha">
            📊 Média: <b>${resumo.media}%</b>(${resumo.respondentes}) |
            🏆 Maior: <b>${resumo.maior}%</b> |
            📉 Menor: <b>${resumo.menor}%</b> |
            ❌ Mais erro: <b>Q${resumo.questaoMaisErro}</b> |
            ✅ Mais acerto: <b>Q${resumo.questaoMaisAcerto}</b>
        </div>
        `;
    }

    document.getElementById("tabelaResultados").innerHTML =
        html + htmlResumo;
}

function fecharResultados(){
    const modal = document.getElementById("modalResultados");
    if(modal) modal.remove();
}

// fechar modal com ESC
document.addEventListener("keydown", function(e){

    if(e.key !== "Escape") return;

    const modal = document.getElementById("modalResultados");

    if(modal){
        fecharResultados();
    }

}); 


function exportarExcel(){

    const dados = window.resultadosCache;
    const nomeAplicacao = window.nomeAplicacao || "Aplicacao";

    if(!dados) return;

    const wb = XLSX.utils.book_new();

    Object.keys(dados).forEach(turma=>{

        const lista = dados[turma];

        if(!lista || lista.length === 0) return;

        // ORDENAR POR NÚMERO
        lista.sort((a,b)=>a.numero - b.numero);

        const totalQuestoes = lista[0].questoes.length;

        const planilha = [];

        // CABEÇALHO
        planilha.push([nomeAplicacao]);
        planilha.push([`Turma: ${turma}`]);
        planilha.push([]);

        // CABEÇALHO TABELA
        const cab = ["Nº","Aluno"];

        for(let i=1;i<=totalQuestoes;i++){
            cab.push("Q"+i);
        }

        cab.push("Acertos");
        cab.push("%");

        planilha.push(cab);

        // LINHAS
        lista.forEach(a=>{

            const linha = [];

            linha.push(a.numero);
            linha.push(a.nome || "");

            a.questoes.forEach(q=>{
                linha.push(q ? q.marcada : "-");
            });

            linha.push(a.acertos);
            linha.push(a.percentual+"%");

            planilha.push(linha);

        });

        const ws = XLSX.utils.aoa_to_sheet(planilha);

        // 🔥 LARGURA DAS COLUNAS
        ws["!cols"] = [
            {wch:6},
            {wch:30},
            ...Array(totalQuestoes).fill({wch:5}),
            {wch:10},
            {wch:6}
        ];

        const range = XLSX.utils.decode_range(ws['!ref']);

        // 🔥 CENTRALIZAR TUDO (EXCETO NOME)
        for(let R = 4; R <= range.e.r; R++){

            for(let C = 2; C <= range.e.c; C++){

                const cell = XLSX.utils.encode_cell({r:R, c:C});

                if(!ws[cell]) continue;

                ws[cell].s = {
                    alignment:{
                        horizontal:"center",
                        vertical:"center"
                    }
                };

            }

        }

        // 🔥 COLORIR ERROS
        lista.forEach((a,r)=>{

            a.questoes.forEach((q,c)=>{

                if(q && q.marcada !== q.correta){

                    const cell = XLSX.utils.encode_cell({
                        r: r + 4,
                        c: c + 2
                    });

                    if(ws[cell]){

                        ws[cell].s = {
                            fill:{
                                patternType:"solid",
                                fgColor:{rgb:"F8D7DA"}
                            },
                            alignment:{
                                horizontal:"center",
                                vertical:"center"
                            }
                        };

                    }

                }

            });

        });

        XLSX.utils.book_append_sheet(wb, ws, turma);

    });

    // NOME DO ARQUIVO
    const nomeArquivo = nomeAplicacao
        .replace(/[^\w\s]/gi, "")
        .replace(/\s+/g,"_");

    XLSX.writeFile(wb, nomeArquivo + ".xlsx");

}
    
function mostrarLoading(msg="Carregando dados..."){

    const overlay = document.createElement("div");
    overlay.id = "loadingOverlay";

    overlay.innerHTML = `
        <div class="spinner"></div>
        <div class="loading-text">${msg}</div>
    `;

    document.body.appendChild(overlay);
}  

function esconderLoading(){

    const el = document.getElementById("loadingOverlay");
    if(el) el.remove();
}    

function gerarResumo(lista){

    if(lista.length === 0) return null;

    const totalQuestoes = lista[0].questoes.length;

    let soma = 0;
    let maior = -1;
    let menor = 101;

    let respondentes = 0; // 👈 NOVO

    const errosPorQuestao = new Array(totalQuestoes).fill(0);
    const acertosPorQuestao = new Array(totalQuestoes).fill(0);

    lista.forEach(a=>{

        // 👇 IGNORA QUEM NÃO RESPONDEU
        const respondeu = a.questoes.some(q => q !== null);

        if(!respondeu) return;

        respondentes++; // 👈 conta só quem respondeu

        soma += a.percentual;

        if(a.percentual > maior) maior = a.percentual;
        if(a.percentual < menor) menor = a.percentual;

        a.questoes.forEach((q,i)=>{

            if(!q) return;

            if(q.marcada === q.correta){
                acertosPorQuestao[i]++;
            }else{
                errosPorQuestao[i]++;
            }

        });

    });

    // 👇 evita divisão por zero
    const media = respondentes > 0
        ? Math.round(soma / respondentes)
        : 0;

    const questaoMaisErro =
        errosPorQuestao.indexOf(Math.max(...errosPorQuestao)) + 1;

    const questaoMaisAcerto =
        acertosPorQuestao.indexOf(Math.max(...acertosPorQuestao)) + 1;

    return {
        media,
        maior,
        menor,
        questaoMaisErro,
        questaoMaisAcerto,
        respondentes 
    };
}
    
</script>
