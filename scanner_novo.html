<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Final</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:100%;
  max-width:650px;
  margin-top:10px;
}

button{
  padding:15px 25px;
  font-size:18px;
  margin:10px;
}

#status{font-size:20px;}
</style>
</head>

<body>

<h2>Scanner Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Iniciando...</div>

<div id="controles" style="display:none;">
  <button onclick="refazer()">🔄 Refazer</button>
</div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto = false
let capturado = false
let framesOK = 0

cv.onRuntimeInitialized = ()=>{
  pronto = true
  iniciarCamera()
}

function iniciarCamera(){
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  })
  .then(stream=>{
    video.srcObject = stream
    video.onloadedmetadata = ()=>{
      video.play()
      loop()
    }
  })
}

/* ========================= */
function loop(){

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let src = cv.imread(canvas)
  let gray = new cv.Mat()
  let thresh = new cv.Mat()

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray, thresh, 255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11, 2
  )

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(thresh, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let quadrados = []

  let areaMin = canvas.width * canvas.height * 0.002
  let areaMax = canvas.width * canvas.height * 0.05

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)
    let area = cv.contourArea(cnt)

    if(area < areaMin || area > areaMax) continue

    let peri = cv.arcLength(cnt,true)
    let approx = new cv.Mat()

    cv.approxPolyDP(cnt, approx, 0.02*peri, true)

    if(approx.rows === 4){

      let rect = cv.boundingRect(approx)

      let ratio = rect.width / rect.height
      if(ratio < 0.6 || ratio > 1.4) continue

      let fill = area / (rect.width * rect.height)
      if(fill < 0.6) continue

      quadrados.push(rect)
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length === 4){
    framesOK++

    document.getElementById("status").innerText =
      "✔ Estabilizando ("+framesOK+")"

    if(framesOK > 6){
      capturarFrame(quadrados)
    }

  }else{
    framesOK = 0
    document.getElementById("status").innerText =
      "Posicione os 4 marcadores"
  }

  src.delete()
  gray.delete()
  thresh.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

/* ========================= */
function capturarFrame(quadrados){

  capturado = true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura = 600
  let altura = 900

  let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x, p.TL.y,
    p.TR.x+p.TR.width, p.TR.y,
    p.BL.x, p.BL.y+p.BL.height,
    p.BR.x+p.BR.width, p.BR.y+p.BR.height
  ])

  let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M = cv.getPerspectiveTransform(srcTri,dstTri)
  let dst = new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  desenharGrade(largura,altura)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"

  document.getElementById("controles").style.display="block"
}

/* ========================= */
function ordenar(q){

  q.sort((a,b)=>a.y-b.y)

  let top=q.slice(0,2)
  let bottom=q.slice(2,4)

  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)

  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

/* ========================= */
function desenharGrade(w,h){

  ctx.fillStyle="red"

  for(let i=0;i<10;i++){
    for(let j=0;j<4;j++){

      let x=(j+0.5)*(w/4)
      let y=(i+0.5)*(h/10)

      ctx.fillRect(x-4,y-4,8,8)
    }
  }
}

/* ========================= */
function refazer(){
  capturado = false
  framesOK = 0
  document.getElementById("controles").style.display="none"
}

</script>

</body>
</html>
