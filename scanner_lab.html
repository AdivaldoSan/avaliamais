  canvas.width = video.videoWidth

  // desenha frame da câmera
  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

    let cor = brilho < 50 ? 0 : 255

    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  requestAnimationFrame(loop)
}

  function detectarMarcadoresReal(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  // binariza (igual seu código)
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 50 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function floodFill(x,y){

    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx
        let ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h){
          stack.push([nx,ny])
        }
      }}
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=4){
  for(let x=0;x<w;x+=4){

    let idx=y*w+x
    if(visitado[idx]) continue

    let i=idx*4

    if(data[i]===0){
      let b=floodFill(x,y)
      if(b.area>500) blobs.push(b)
    }

  }}

  blobs.sort((a,b)=>b.area-a.area)

  if(blobs.length < 4) return null

  let maiores = blobs.slice(0,4)

  let centros = maiores.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))

  return centros
}
