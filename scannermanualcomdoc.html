<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Inteligente FINAL</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:100%;
  max-width:650px;
}

button{
  padding:10px 16px;
  margin:5px;
}

#qtdBox{
  font-size:22px;
  margin:10px;
}
</style>
</head>

<body>

<h2>Scanner Inteligente</h2>

<div id="qtdBox">
  <span id="qtdLabel">--</span>
</div>

<br>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="overlayQR" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  display:block;
  z-index:10;
">

  <div style="
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
  "></div>

  <div style="
    position:absolute;
    width:220px;
    height:220px;
    border:3px solid red;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
  "></div>

</div>  

<div id="status">Aguardando QR...</div>
  
<div id="uiLeitura" style="display:none;">

  <div id="respostas" style="margin-top:10px;"></div>

  <button onclick="lerNovamente()">Ler novamente</button>
  <button onclick="confirmar()">Confirmar</button>
  <button onclick="refazer()">Refazer</button>

  <div id="resultado"></div>

</div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

// ==============================
// VARIÁVEIS GLOBAIS
// ==============================
let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
cv.onRuntimeInitialized = () => {
  pronto = true
  iniciar()
}

  
let capturado=false
let framesOK=0
let ultimaImagem=null
let respostasLidas=[]
let qrProcessado = false

// 🔥 NOVO CONTROLE
let modo = "qr"
let gabaritoQR = null
let qtdQR = 0
let qrFramesOK = 0
let qrLido = false
  

  function log(msg){
  document.getElementById("status").innerText += "\n" + msg
}
// ==============================
const TEMPLATE = {
  colunas: [0.30, 0.45, 0.58, 0.73],
  questoes: 10
}

// ==============================
function getTopoBase(qtd){

  const pontos = [
    {q:1, topo:0.5307, base:0.5307},
    {q:5, topo:0.3248, base:0.7137},
    {q:6, topo:0.2908, base:0.7396},
    {q:8, topo:0.2508, base:0.7811},
    {q:10, topo:0.2158, base:0.8090},
    {q:15, topo:0.1607, base:0.8563}
  ]

  let exato = pontos.find(p => p.q === qtd)
  if(exato) return exato

  for(let i=0;i<pontos.length-1;i++){
    let p1 = pontos[i]
    let p2 = pontos[i+1]

    if(qtd > p1.q && qtd < p2.q){
      let t = (qtd - p1.q) / (p2.q - p1.q)
      return {
        topo: p1.topo + t*(p2.topo - p1.topo),
        base: p1.base + t*(p2.base - p1.base)
      }
    }
  }

  return pontos[pontos.length-1]
}
function atualizarUI(){

  const overlay = document.getElementById("overlayQR")
  const ui = document.getElementById("uiLeitura")
  const canvasEl = document.getElementById("canvas")

  if(modo === "qr"){
    overlay.style.display = "block"
    ui.style.display = "none"
    //canvasEl.style.visibility = "hidden" // 👈 ESCONDE VISUALMENTE
  }else{
    overlay.style.display = "none"
    ui.style.display = "block"
    canvasEl.style.visibility = "visible"
  }
}

// ==============================
function iniciar(){
  log("Solicitando câmera...")

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(stream=>{
    log("Câmera liberada ✔")

    video.srcObject=stream

    video.onloadedmetadata=()=>{
      log("Metadata carregado ✔")

      video.play()
      loop()
    }
  })
  .catch(err=>{
    log("ERRO câmera: " + err.message)
  })
}

// ==============================
// 🔥 LEITOR QR (ANTES DE TUDO)
// ==============================

  function detectarQR(){

  const overlaySize = 220

  // converte tamanho VISUAL → tamanho REAL do canvas
  const scaleX = canvas.width / canvas.clientWidth
  const scaleY = canvas.height / canvas.clientHeight

  const size = overlaySize * scaleX

  const x = Math.floor((canvas.width - size) / 2)
const y = Math.floor((canvas.height - size) / 2)

log("canvas real: "+canvas.width+"x"+canvas.height)
log("canvas css: "+canvas.clientWidth+"x"+canvas.clientHeight)
log("scaleX: "+scaleX.toFixed(2))
log("size final: "+size)
log("posição: "+x+","+y)

  let imageData = ctx.getImageData(x, y, size, size)
  log("imageData: "+imageData.width+"x"+imageData.height)

  let code = jsQR(
  imageData.data,
  imageData.width,
  imageData.height
)

if(!code){
  log("❌ QR NÃO detectado")
}else{
  log("✅ QR detectado")
  log("conteúdo: "+code.data)
}

  if(code){

    let texto = code.data

    if(texto.includes("AVALIA+")){

      qrFramesOK++

      if(qrFramesOK > 2 && !qrLido){

        qrLido = true

        let partes = texto.split("|")

        qtdQR = parseInt(partes[1].split("=")[1])
        gabaritoQR = partes[2].split("=")[1]

        TEMPLATE.questoes = qtdQR
        document.getElementById("qtdLabel").innerText = qtdQR

        modo = "leitura"
        
        atualizarUI()
        qrFramesOK = 0

        document.getElementById("status").innerText =
          "QR lido ✔ Posicione o gabarito"
      }

    } else {
      qrFramesOK = 0
    }

  } else {
    qrFramesOK = 0
  }
}

// ==============================
function loop(){

  log("Loop ativo | modo: " + modo + 
    " | video: " + video.videoWidth + "x" + video.videoHeight)

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  // 🔥 BLOQUEIO DO OPENCV
  if(modo === "qr"){
    detectarQR()
    requestAnimationFrame(loop)
    return
  }

  // ==============================
  // 🔥 DAQUI PRA BAIXO NÃO FOI ALTERADO
  // ==============================

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){
    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)
    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()
    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      quadrados.push(cv.boundingRect(approx))
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length===4){
    framesOK++
    if(framesOK>6){
      capturarFrame(quadrados)
    }
  }else{
    framesOK=0
  }

  src.delete(); gray.delete(); bin.delete()
  contours.delete(); hierarchy.delete()

  requestAnimationFrame(loop)
}

// ==============================
function capturarFrame(quadrados){

  capturado=true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  ultimaImagem = dst.clone()

  lerRespostas(dst)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"
}

// ==============================
function lerRespostas(mat){

  let qtd = TEMPLATE.questoes
  let tb = getTopoBase(qtd)

  let topo = tb.topo
  let base = tb.base
  let passo = qtd>1 ? (base-topo)/(qtd-1) : 0

  respostasLidas=[]

  for(let i=0;i<qtd;i++){

    let y = (qtd===1)? topo : topo + i*passo

    let valores=[]

    for(let j=0;j<4;j++){

      let x=TEMPLATE.colunas[j]
      let px=Math.floor(x*mat.cols)
      let py=Math.floor(y*mat.rows)

      let roi = mat.roi(new cv.Rect(px-15,py-15,30,30))

      let gray=new cv.Mat()
      cv.cvtColor(roi,gray,cv.COLOR_RGBA2GRAY)

      let t=new cv.Mat()
      cv.threshold(gray,t,0,255,
        cv.THRESH_BINARY_INV+cv.THRESH_OTSU)

      valores.push(cv.countNonZero(t)/(30*30))

      gray.delete(); t.delete(); roi.delete()
    }

    let max=Math.max(...valores)
    let idx=valores.indexOf(max)

    let resp="-"

    let ordenado=[...valores].sort((a,b)=>b-a)

    if(max>0.25 && (ordenado[0]-ordenado[1])>0.08){
      resp=["A","B","C","D"][idx]
    }

    respostasLidas.push(resp)
  }

  document.getElementById("respostas").innerText =
    "Aluno: "+respostasLidas.join(" ")
}

// ==============================
function confirmar(){

  let gabarito = gabaritoQR.split("")

  let html="Aluno: "+respostasLidas.join(" ")+"<br>"
  html+="Gabarito: "+gabarito.join(" ")+"<br><br>"

  let acertos=0

  for(let i=0;i<gabarito.length;i++){
    if(respostasLidas[i]===gabarito[i]){
      html+="✅ "
      acertos++
    }else{
      html+="❌ "
    }
  }

  html+="<br><br>Acertos: "+acertos

  document.getElementById("resultado").innerHTML=html
}

// ==============================
function ordenar(q){
  q.sort((a,b)=>a.y-b.y)
  let top=q.slice(0,2)
  let bottom=q.slice(2,4)
  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)
  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

// ==============================
function refazer(){
  capturado=false
  framesOK=0
  respostasLidas=[]
  document.getElementById("resultado").innerHTML=""

  modo = "qr"
  gabaritoQR = null
  atualizarUI()

  document.getElementById("status").innerText = "Aguardando QR..."

  qrLido = false
  qrFramesOK = 0   // ✅ faltava isso
}

document.addEventListener("DOMContentLoaded", atualizarUI)  

</script>

</body>
</html>
