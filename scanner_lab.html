<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner + Calibração</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:100%;
  max-width:650px;
  border:1px solid #444;
}
button{
  padding:10px 15px;
  margin:5px;
}
textarea{
  width:90%;
  height:120px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner + Calibração</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Iniciando...</div>

<button onclick="refazer()">Refazer</button>
<button onclick="limpar()">Limpar pontos</button>
<button onclick="gerarTemplate()">Gerar Template</button>

<br>
<textarea id="saida" placeholder="Template aparecerá aqui..."></textarea>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
let capturado=false
let framesOK=0

let pontos = []

cv.onRuntimeInitialized=()=>{
  pronto=true
  iniciar()
}

function iniciar(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  }).then(stream=>{
    video.srcObject=stream
    video.onloadedmetadata=()=>{
      video.play()
      loop()
    }
  })
}

/* ========================= */
function loop(){

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){

    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)

    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()

    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      let r=cv.boundingRect(approx)
      quadrados.push(r)
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length===4){
    framesOK++
    if(framesOK>6){
      capturarFrame(quadrados)
    }
  }else{
    framesOK=0
  }

  src.delete()
  gray.delete()
  bin.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

/* ========================= */
function capturarFrame(quadrados){

  capturado=true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  document.getElementById("status").innerText =
    "Clique nas bolhas para calibrar"

  ativarCalibracao()
}

/* ========================= */
/* CALIBRAÇÃO */

function ativarCalibracao(){

  canvas.onclick = function(e){

    const rect = canvas.getBoundingClientRect()

let x = (e.clientX - rect.left) * (canvas.width / rect.width)
let y = (e.clientY - rect.top) * (canvas.height / rect.height)

    let nx = x / canvas.width
    let ny = y / canvas.height

    pontos.push({x:nx,y:ny})

    desenharPontos()
  }
}

function desenharPontos(){

  ctx.fillStyle="red"

  pontos.forEach(p=>{
    ctx.fillRect(
      p.x * canvas.width - 4,
      p.y * canvas.height - 4,
      8,8
    )
  })
}

/* ========================= */
function gerarTemplate(){

  if(pontos.length < 10){
    alert("Clique pelo menos nas linhas ou colunas")
    return
  }

  let xs = pontos.map(p=>p.x)
  let ys = pontos.map(p=>p.y)

  xs.sort((a,b)=>a-b)
  ys.sort((a,b)=>a-b)

  let colunas = agrupar(xs,4)
  let linhas = agrupar(ys,8) //quantidade de linhas?

  let TEMPLATE = {
    colunas,
    linhas
  }

  document.getElementById("saida").value =
    JSON.stringify(TEMPLATE,null,2)
}

/* ========================= */
function agrupar(arr, grupos){

  let tamanho = Math.floor(arr.length / grupos)
  let res = []

  for(let i=0;i<grupos;i++){
    let slice = arr.slice(i*tamanho, (i+1)*tamanho)
    let media = slice.reduce((a,b)=>a+b,0)/slice.length
    res.push(Number(media.toFixed(4)))
  }

  return res
}

/* ========================= */
function limpar(){
  pontos=[]
  ctx.clearRect(0,0,canvas.width,canvas.height)
}

/* ========================= */
function ordenar(q){

  q.sort((a,b)=>a.y-b.y)

  let top=q.slice(0,2)
  let bottom=q.slice(2,4)

  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)

  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

/* ========================= */
function refazer(){
  capturado=false
  framesOK=0
  pontos=[]
  document.getElementById("status").innerText = "Reiniciando..."
}

</script>

</body>
</html>
