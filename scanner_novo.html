<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Híbrido</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:100%;
  max-width:650px;
  margin-top:10px;
  background:#000;
}
button{
  padding:20px;
  margin:10px;
  font-size:18px;
}
#status{font-size:28px;}
#debug{font-size:14px;color:#aaa;}
</style>
</head>

<body>

<h2>Scanner Híbrido</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando...</div>
<div id="debug"></div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let rodando = true
let qr = { questoes:10, colunas:4 }

/* CAMERA */
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
  video.onloadedmetadata = ()=>{
    video.play()
    loop()
  }
})

/* LOOP */
function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

  // binarização
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 80 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  let marcadores = detectarMarcadores(frame)

  document.getElementById("debug").innerText =
    `Blobs: ${window._blobs||0} | Candidatos: ${window._candidatos||0}`

  if(marcadores){
    processarImagem(frame, marcadores)
    rodando = false
    document.getElementById("status").innerText = "🟢 Capturado"
    return
  }

  requestAnimationFrame(loop)
}

/* DETECÇÃO */
function detectarMarcadores(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function flood(x,y){
    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){
      let [px,py]=stack.pop()
      let idx=py*w+px
      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
        for(let dy=-1;dy<=1;dy++){
          let nx=px+dx
          let ny=py+dy
          if(nx>=0&&ny>=0&&nx<w&&ny<h){
            stack.push([nx,ny])
          }
        }
      }
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=4){
    for(let x=0;x<w;x+=4){
      let idx=y*w+x
      if(visitado[idx]) continue
      let i=idx*4
      if(data[i]===0){
        let b=flood(x,y)
        if(b.area>500) blobs.push(b)
      }
    }
  }

  window._blobs = blobs.length

  let candidatos = blobs.map(b=>({
    ...b,
    cx:(b.minX+b.maxX)/2,
    cy:(b.minY+b.maxY)/2
  }))

  candidatos.sort((a,b)=>b.area-a.area)

  if(candidatos.length < 4) return null

  window._candidatos = candidatos.length

  return candidatos.slice(0,4)
}

/* PROCESSAMENTO */
function processarImagem(frame, marcadores){

  // ordenar por posição
  marcadores.sort((a,b)=>a.cy - b.cy)

  let top = marcadores.slice(0,2)
  let bottom = marcadores.slice(2,4)

  top.sort((a,b)=>a.cx - b.cx)
  bottom.sort((a,b)=>a.cx - b.cx)

  let TL = { x: top[0].minX, y: top[0].minY }
  let TR = { x: top[1].maxX, y: top[1].minY }
  let BL = { x: bottom[0].minX, y: bottom[0].maxY }
  let BR = { x: bottom[1].maxX, y: bottom[1].maxY }

  let temp = document.createElement("canvas")
  temp.width = canvas.width
  temp.height = canvas.height
  temp.getContext("2d").putImageData(frame,0,0)

  let warp = warpImagem(temp, TL, TR, BL, BR, 800, 1200)

  ctx.clearRect(0,0,canvas.width,canvas.height)
  ctx.drawImage(warp,0,0)
}

/* WARP */
function warpImagem(src, TL, TR, BL, BR, W, H){

  let dst = document.createElement("canvas")
  dst.width=W
  dst.height=H

  let ctx = dst.getContext("2d")

  ctx.drawImage(src,
    TL.x, TL.y,
    TR.x-TL.x,
    BL.y-TL.y,
    0,0,W,H
  )

  return dst
}

</script>

</body>
</html>
