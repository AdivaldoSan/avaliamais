<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:900px;
  max-width:95vw;
  margin-top:10px;
  background:#000;
}
</style>
</head>

<body>

<h2>Scanner de Gabarito...</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">
<br><br>
<button onclick="processar()">Processar</button>

<canvas id="canvas"></canvas>
  
<div id="resultado" style="margin-top:10px;font-size:20px;"></div>  

<script>

let img = null

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d", { willReadFrequently: true })

/* =========================
CONFIG FIXA (SUA CALIBRAÇÃO)
========================= */

const THRESHOLD = 50

const topo = 0.18
const base = 0.88
const esquerda = 0.22
const direita = 0.83

const linhas = 10
const colunas = 4

/* ========================= */

function carregarImagem(e){

  const file = e.target.files[0]
  if(!file) return

  img = new Image()

  img.onload = () => {
    canvas.width = img.width
    canvas.height = img.height
    ctx.drawImage(img,0,0)
  }

  img.src = URL.createObjectURL(file)
}

/* ========================= */

function processar(){

if(!img) return

ctx.drawImage(img,0,0)

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

/* =========================
THRESHOLD FIXO
========================= */

for(let i=0;i<data.length;i+=4){

  let brilho = (data[i]+data[i+1]+data[i+2])/3
  let cor = brilho < THRESHOLD ? 0 : 255

  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

/* =========================
FLOOD FILL
========================= */

let w = canvas.width
let h = canvas.height

let visitado = new Uint8Array(w*h)
let blobs = []

function floodFill(x,y){

  let stack = [[x,y]]

  let minX=x, maxX=x
  let minY=y, maxY=y
  let area=0

  while(stack.length){

    let [px,py] = stack.pop()
    let idx = py*w + px

    if(visitado[idx]) continue
    visitado[idx]=1

    let i = idx*4
    if(frame.data[i] !== 0) continue

    area++

    minX = Math.min(minX, px)
    maxX = Math.max(maxX, px)
    minY = Math.min(minY, py)
    maxY = Math.max(maxY, py)

    for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){

      let nx=px+dx
      let ny=py+dy

      if(nx>=0 && ny>=0 && nx<w && ny<h){
        stack.push([nx,ny])
      }

    }}
  }

  return {area,minX,maxX,minY,maxY}
}

/* ========================= */

for(let y=0;y<h;y+=2){
for(let x=0;x<w;x+=2){

  let idx = y*w+x
  if(visitado[idx]) continue

  let i = idx*4

  if(frame.data[i]===0){
    let blob = floodFill(x,y)
    if(blob.area > 200) blobs.push(blob)
  }

}}

/* =========================
MARCADORES
========================= */

let maiores = blobs
.sort((a,b)=>b.area-a.area)
.slice(0,4)

if(maiores.length < 4){
  alert("Marcadores não detectados")
  return
}

let centros = maiores.map(b=>({
  x:(b.minX+b.maxX)/2,
  y:(b.minY+b.maxY)/2
}))

centros.sort((a,b)=>a.y-b.y)

let top = centros.slice(0,2)
let bottom = centros.slice(2,4)

top.sort((a,b)=>a.x-b.x)
bottom.sort((a,b)=>a.x-b.x)

let TL = top[0]
let TR = top[1]
let BL = bottom[0]
let BR = bottom[1]

if(!TL || !TR || !BL || !BR){
  alert("Erro na detecção dos cantos")
  return
}

/* =========================
PERSPECTIVA
========================= */

function pontoNaArea(u, v){
  return {
    x: (1-u)*(1-v)*TL.x + u*(1-v)*TR.x + (1-u)*v*BL.x + u*v*BR.x,
    y: (1-u)*(1-v)*TL.y + u*(1-v)*TR.y + (1-u)*v*BL.y + u*v*BR.y
  }
}

/* =========================
LEITURA DAS RESPOSTAS
========================= */

let respostas = []

for(let i=0;i<linhas;i++){

  let linhaResposta = -1
  let maiorArea = 0

  for(let j=0;j<colunas;j++){

    let u = esquerda + (j+0.5)/colunas*(direita-esquerda)
    let v = topo + (i+0.5)/linhas*(base-topo)

    let p = pontoNaArea(u, v)

    let raio = 14
    let soma = 0

    for(let dx=-raio;dx<=raio;dx++){
    for(let dy=-raio;dy<=raio;dy++){

      let x = Math.floor(p.x + dx)
      let y = Math.floor(p.y + dy)

      if(x<0 || y<0 || x>=canvas.width || y>=canvas.height) continue

      let idx = (y*canvas.width + x)*4

      if(frame.data[idx] === 0){
        soma++
      }

    }}

    if(soma > maiorArea){
      maiorArea = soma
      linhaResposta = j
    }

  }

  respostas.push(linhaResposta)
  
}
/* =========================
OVERLAY DE CONFIRMAÇÃO
========================= */

ctx.strokeStyle = "lime"
ctx.lineWidth = 3

for(let i=0;i<linhas;i++){

  let j = respostas[i]
  if(j < 0) continue

  let u = esquerda + (j+0.5)/colunas*(direita-esquerda)
  let v = topo + (i+0.5)/linhas*(base-topo)

  let p = pontoNaArea(u, v)

  ctx.beginPath()
  ctx.arc(p.x, p.y, 28, 0, Math.PI*2)
  ctx.stroke()
  ctx.fillStyle = "rgba(0,255,0,0.3)"
  ctx.fill()
}
  

/* =========================
RESULTADO FINAL
========================= */

let letras = ["A","B","C","D"]

let final = respostas.map(r => letras[r] || "-")

document.getElementById("resultado").innerText =
"Gabarito: " + final.join(" ")

}

</script>

</body>
</html>
