<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#ui{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  width:45%;
  padding:15px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="ui"></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

let modo = "QR"
let capturado = false
let dadosQR = null
let frameCapturado = null

/* =========================
CALIBRAÇÃO DINÂMICA (SEU LAB)
========================= */

const mapa = {
  1:{topo:0.47,base:0.62},
  5:{topo:0.28,base:0.80},
  8:{topo:0.20,base:0.84},
  10:{topo:0.17,base:0.86},
  15:{topo:0.13,base:0.90}
}

function getParams(q){
  let ks = Object.keys(mapa).map(Number).sort((a,b)=>a-b)

  if(mapa[q]) return mapa[q]

  for(let i=0;i<ks.length-1;i++){
    let q1=ks[i], q2=ks[i+1]
    if(q>q1 && q<q2){
      let t=(q-q1)/(q2-q1)
      return {
        topo: mapa[q1].topo + t*(mapa[q2].topo-mapa[q1].topo),
        base: mapa[q1].base + t*(mapa[q2].base-mapa[q1].base)
      }
    }
  }

  return mapa[ks[ks.length-1]]
}

const esquerda = 0.22
const direita = 0.83

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
}).then(stream=>{
  video.srcObject = stream
})

/* =========================
LOOP
========================= */

function loop(){

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    if(!capturado){
      ctx.drawImage(video,0,0)
    }

    let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

    if(modo==="QR"){
      lerQR(frame)
    }

    else if(modo==="OMR" && dadosQR){

      if(!capturado){
        desenharOverlay()
        detectarMarcadores(frame)
      }else{
        ctx.putImageData(frameCapturado,0,0)
      }
    }
  }

  requestAnimationFrame(loop)
}
requestAnimationFrame(loop)

/* =========================
QR
========================= */

function lerQR(frame){
  let code = jsQR(frame.data,frame.width,frame.height)

  if(code){
    let obj = {}
    code.data.split("|").forEach(p=>{
      let [k,v]=p.split("=")
      if(v) obj[k]=v
    })

    if(obj.Q){
      dadosQR=obj
      modo="OMR"
    }
  }
}

/* =========================
OVERLAY
========================= */

function desenharOverlay(){

  let w=canvas.width
  let h=canvas.height

  ctx.fillStyle="rgba(0,0,0,0.6)"
  ctx.fillRect(0,0,w,h)

  let q=parseInt(dadosQR.Q)

  let proporcao = 0.35 + q*0.02
  let boxH = h*proporcao
  let boxW = boxH*0.6

  if(boxH>h*0.8){
    boxH=h*0.8
    boxW=boxH*0.6
  }

  let x=(w-boxW)/2
  let y=(h-boxH)/2

  ctx.clearRect(x,y,boxW,boxH)

  ctx.strokeStyle="#00ff88"
  ctx.lineWidth=3
  ctx.strokeRect(x,y,boxW,boxH)

  window.area={x,y,w:boxW,h:boxH}
}

/* =========================
MARCADORES
========================= */

function detectarMarcadores(frame){

  let data=frame.data
  let blobs=0

  for(let i=0;i<data.length;i+=4){
    if(data[i]<50) blobs++
  }

  if(blobs>5000){
    capturar()
  }
}

/* =========================
CAPTURA
========================= */

function capturar(){

  if(capturado) return
  capturado=true

  ctx.drawImage(video,0,0)
  frameCapturado = ctx.getImageData(0,0,canvas.width,canvas.height)

  let data=frameCapturado.data

  for(let i=0;i<data.length;i+=4){
    let brilho=(data[i]+data[i+1]+data[i+2])/3
    let cor=brilho<50?0:255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frameCapturado,0,0)

  // MOCK marcadores (substituir pela sua detecção real)
  let TL={x:100,y:100}
  let TR={x:500,y:100}
  let BL={x:100,y:800}
  let BR={x:500,y:800}

  processarOMR(TL,TR,BL,BR)

  document.getElementById("ui").innerHTML = `
    <button onclick="confirmar()">Confirmar</button>
    <button onclick="resetar()">Ler novamente</button>
  `
}

/* =========================
OMR (SEU LAB ADAPTADO)
========================= */

function processarOMR(TL,TR,BL,BR){

  let q=parseInt(dadosQR.Q)
  let {topo,base}=getParams(q)

  let linhas=q
  let colunas=4

  let altura = Math.hypot(BL.x-TL.x,BL.y-TL.y)
  let alturaUtil = altura*(base-topo)
  let dy = alturaUtil/linhas

  let raio = dy*0.28
  let raioVisual = raio*2

  function pontoNaArea(u,v){
    return{
      x:(1-u)*(1-v)*TL.x + u*(1-v)*TR.x + (1-u)*v*BL.x + u*v*BR.x,
      y:(1-u)*(1-v)*TL.y + u*(1-v)*TR.y + (1-u)*v*BL.y + u*v*BR.y
    }
  }

  let respostas=[]
  let data=frameCapturado.data

  for(let i=0;i<linhas;i++){

    let melhor=-1
    let maior=0

    for(let j=0;j<colunas;j++){

      let u=esquerda+(j+0.5)/colunas*(direita-esquerda)
      let v=topo+(i+0.5)/linhas*(base-topo)

      let p=pontoNaArea(u,v)

      let soma=0

      for(let dx=-raio;dx<=raio;dx++){
      for(let dy2=-raio;dy2<=raio;dy2++){

        let x=Math.floor(p.x+dx)
        let y=Math.floor(p.y+dy2)

        if(x<0||y<0||x>=canvas.width||y>=canvas.height) continue

        let idx=(y*canvas.width+x)*4

        if(data[idx]===0) soma++
      }}

      if(soma>maior){
        maior=soma
        melhor=j
      }
    }

    respostas.push(melhor)
  }

  ctx.putImageData(frameCapturado,0,0)

  ctx.strokeStyle="lime"
  ctx.lineWidth=3

  for(let i=0;i<linhas;i++){

    let j=respostas[i]
    if(j<0) continue

    let u=esquerda+(j+0.5)/colunas*(direita-esquerda)
    let v=topo+(i+0.5)/linhas*(base-topo)

    let p=pontoNaArea(u,v)

    ctx.beginPath()
    ctx.arc(p.x,p.y,raioVisual,0,Math.PI*2)
    ctx.stroke()

    ctx.fillStyle="rgba(0,255,0,0.3)"
    ctx.fill()
  }

  window.respostas=respostas
}

/* ========================= */

function confirmar(){
  alert("Respostas: "+window.respostas)
}

function resetar(){
  capturado=false
  modo="QR"
  dadosQR=null
  document.getElementById("ui").innerHTML=""
}

</script>

</body>
</html>
