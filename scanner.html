<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner | Avalia+</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg">

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  margin:0;
}

/* ===== MOBILE (scanner style) ===== */
.quiz-header{
  text-align:left;
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:90vw;
  margin:10px auto;
}

.quiz-titulo{
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#00ffcc,#00aaff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.quiz-info{
  font-size:14px;
  opacity:0.7;
}

.quiz-logo-direita{
  height:40px;
}

.container{
  width:90vw;
  max-width:500px;
  margin:40px auto;
  background:#1a1a1a;
  border-radius:16px;
  padding:30px 25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
  text-align:center;
}

.titulo{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.sub{
  opacity:0.6;
  margin-bottom:20px;
}

.texto{
  font-size:15px;
  line-height:1.5;
  opacity:0.85;
}
</style>
</head>

<body>

<script src="./js/config.js"></script>
<script src="js/conexao.js"></script>
<script src="js/layout.js"></script>

<script>

// =============================
// DETECÇÃO MOBILE REAL
// =============================
function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// =============================
// INICIALIZAÇÃO
// =============================
function iniciar(){

  if(isMobile()){
    // 🔥 MODO SCANNER (SEM LAYOUT)
    document.body.innerHTML = `

      <div class="quiz-header">
        <div>
          <div class="quiz-titulo">
            Scanner Avalia+
          </div>
          <div class="quiz-info">
            Leitura automática de gabarito
          </div>
        </div>

        <img src="favicon.svg" class="quiz-logo-direita">
      </div>

      <div class="container">

        <div class="titulo">
          Em produção
        </div>

        <div class="sub">
          Funcionalidade em desenvolvimento
        </div>

        <div class="texto">
          O Scanner Avalia+ permitirá a leitura automática de gabaritos utilizando a câmera do dispositivo.<br><br>

          Funcionalidades previstas:<br><br>

          • Leitura por QR Code<br>
          • Correção automática<br>
          • Cálculo de percentual e nota<br>
          • Feedback visual por questão<br><br>

          O uso será realizado diretamente pelo celular, utilizando a câmera traseira.
        </div>

      </div>
    `
  }
  else{
    // 🔥 DESKTOP NORMAL (COM LAYOUT)
    criarLayout()

    document.getElementById("conteudo").innerHTML = `
      <h2 style="margin-bottom:20px;">📷 Scanner Avalia+</h2>

      <div class="card" style="max-width:600px;">

        <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">
          Em produção
        </div>

        <div style="opacity:0.7; margin-bottom:15px;">
          Esta funcionalidade está sendo desenvolvida
        </div>

        <div style="line-height:1.5;">
          O Scanner permitirá leitura automática de gabaritos via câmera.<br><br>

          O uso será exclusivo em dispositivos móveis.
        </div>

      </div>
    `
  }
}

window.onload = iniciar;

</script>

</body>
</html>
