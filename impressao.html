<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Impressão - Avalia+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="styles.css">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#e5e7eb;
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
}

@media (max-width: 900px){

  .layout{
    flex-direction: column;
  }

  .painel{
    width:100%;
    border-right:none;
    border-bottom:1px solid #ccc;
  }

  .preview{
    width:100%;
    overflow:auto;
    display:flex;
    justify-content:center;
  }

  .pagina{
    width:100%;
    max-width:210mm;
    margin:10px auto;
  }
}
/* ===== PAINEL ===== */
.painel{
  width:360px;
  background:#f3f4f6;
  padding:15px;
  box-sizing:border-box;
  border-right:1px solid #ccc;
  height:100vh;
  overflow:auto;
}

.painel h3{
  margin-top:0;
}

.painel input{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  box-sizing:border-box;
}
.painel label{
  display:block;
  margin-top:8px;
  margin-bottom:3px;
  font-size:13px;
}

.painel input,
.painel select{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  box-sizing:border-box;
  font-size:13px;
}

.painel textarea{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  box-sizing:border-box;
  font-size:13px;
  resize:vertical;
}
/* ===== PREVIEW ===== */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  overflow:auto;
  padding:20px;
}

/* ===== FOLHA A4 ===== */
.pagina{
  width:210mm;
  min-height:297mm;
  background:white;
  padding:12mm;
  margin-bottom:20px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
  box-sizing:border-box;
}

/* ===== CABEÇALHO ===== */
.cabecalho{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #000;
  padding-bottom:6px;
  margin-bottom:10px;
  font-size:12px;
}

	/*=======*/

/* ===== BLOCO OTICO ===== */
.bloco-otico{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:10px 0 20px 0;
  
  width:100%;
  position: relative;   /* 🔥 necessário */
}

.bloco-otico > div{
  flex-shrink:0;
}

.lado-esquerdo{
  display:flex;
  justify-content:center;
  padding-right: 150px;
  
}

.lado-direito{
  position: absolute;
  top: 49px;
  right: 0;
}

.box-nota{
  border:1px solid #000;
  width:90px;
  height:90px;
  display:flex;
  flex-direction:column;
  font-size:12px;
  box-sizing:border-box;
}

.box-nota div:first-child{
  /*border-bottom:1px solid #000;*/
  text-align:center;
  padding:4px;
}

.campo-nota{
  flex:1;
}

/*====Instruções====*/
.instrucoes{
  font-size:12px;
  margin:8px 0;
  line-height:1.4;
}

/* ===== QUESTÕES ===== */
.questoes{
  column-count:2;
  column-gap:30px;
}

.questao{
  break-inside: avoid;
  margin-bottom:12px;
  font-size:12px;
}

.enunciado{
  margin-bottom:4px;
}

.alternativas div{
  margin-left:10px;
}

/* ===== IMAGEM ===== */
.img-container{
  position: relative;
  display: flex;
  justify-content: center;   /* centraliza horizontal */
  margin: 10px 0;
}

.img-container img{
  max-width: 100%;          /* respeita coluna */
  width: auto;
  height: auto;
  display: block;
}

.resizer{
  width:12px;
  height:12px;
  background:#2563EB;
  position:absolute;
  right:0;
  bottom:0;
  cursor:se-resize;
  border-radius:2px;
}

/* ===== BOTÕES ===== */
button{
  width:100%;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
}

/* ===== PRINT ===== */
@media print{

  .painel{
    display:none;
  }

  .pagina{
    box-shadow:none;
    margin:0;
    break-after: page;           /* padrão moderno */
    page-break-after: always;    /* fallback */
	page-break-inside: avoid;
  }

  .pagina:last-child{
    break-after: auto;           /* 🔥 impede página extra */
    page-break-after: auto;      /* fallback */
  }

  body{
    background:white;
  }
}

/* 🔥 ESCALA VISUAL DO CANVAS (NÃO ALTERA GEOMETRIA) */
canvas{
  width:500px;
  height:auto;
}

.linha-divisoria{
  border-bottom:1px solid #000;
  margin:10px 0;
}

.mensagem-inicial{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#666;
  font-size:16px;
}

.msg-centro{
  max-width:300px;
}

</style>
</head>

<body>

<div class="layout">

  <!-- ===== PAINEL ===== -->
  <div class="painel">

    <h3>Configuração</h3>
	<div id="msgErro" class="alerta" style="display:none;"></div>	

	  
	<label>Nome da Prova:</label>
	<input id="nomeProva" placeholder="Ex: Simulado SAERO 1">

    <label>Escola:</label>
    <input id="escola" value="EEEFM Migrantes">

    <label>Disciplina:</label>
    <input id="disciplina" value="Matemática">

    <label>Turma:</label>
	<select id="turmaSelect"></select>
	
	<label>Quantidade:</label>
    <input id="qtd" type="number" value="1" min="1" max="100">	
	  
	<label>Extras:</label>
	<input id="extras" type="number" value="0" min="0" max="5">

	<label>Instruções:</label>
    <textarea id="instrucoes" rows="4" placeholder="Ex: Resolva as questões com atenção..."></textarea>  

    <button onclick="gerarPreview()">Atualizar Preview</button>
    <button onclick="window.print()">Imprimir / PDF</button>

  </div>

  <!-- ===== PREVIEW ===== -->
  <div class="preview">
    <div id="folhas">
   
   <div class="pagina mensagem-inicial">
		<div class="msg-centro">
		  Preencha os dados à esquerda e clique em "Atualizar Preview"
		</div>
  </div>
</div>
  </div>

</div>


<script>
const prova = JSON.parse(localStorage.getItem("provaGerada"))

function carregarPainel(){

  if(!prova) return

  document.getElementById("disciplina").value = prova.disciplina

  const select = document.getElementById("turmaSelect")
select.innerHTML = ""

prova.turmas.forEach((t, i) => {

  const option = document.createElement("option")
  option.value = t
  option.textContent = t

  if(i === 0) option.selected = true

  select.appendChild(option)
})
}	

/* ================= CONFIG LAB (INALTERADO) ================= */

const config = {
  qrOffsetX: 166,
  qrOffsetY: -29,
  gabaritoOffsetX: 189,
  gabaritoOffsetY: 0,
  marcadorOffsetX: 343,
  marcadorOffsetY: -4,
  dy: 35,
  topoLetras: -24
}

const qrSize = 160

/* ================= GERAÇÃO DO CANVAS REAL ================= */

function gerarCanvasReal(canvas, q){

  //const q = 10

  const ctx = canvas.getContext("2d")
  ctx.translate(-100, 0)

  canvas.width = 900
  canvas.height = 300 + config.dy*q

  ctx.fillStyle="white"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  let inicioX = 400 + config.gabaritoOffsetX
  let inicioY = 200 + config.gabaritoOffsetY

  let dx = 40
  let raio = 8

  ctx.fillStyle="black"
  ctx.font="12px Arial"
  ctx.textAlign="center"
  ctx.textBaseline="middle"

  let letras=["A","B","C","D"]

  for(let c=0;c<4;c++){
    let x = inicioX + c*dx
    ctx.fillText(letras[c], x, inicioY + config.topoLetras)
  }

  for(let i=0;i<q;i++){

    let y = inicioY + i*config.dy

    ctx.textAlign="right"
    ctx.fillText((i+1)+"   ", inicioX-10, y+2)

    ctx.textAlign="center"

    for(let c=0;c<4;c++){
      let x = inicioX + c*dx

      ctx.beginPath()
      ctx.setLineDash([2,2])
      ctx.arc(x,y,raio,0,Math.PI*2)
      ctx.stroke()
      ctx.setLineDash([])
    }
  }

  /* MARCADORES */

  let marcador = 30

  const TLx = 160 + config.marcadorOffsetX
  const TRx = TLx + 250

  ctx.fillRect(TLx, 90 + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, 90 + config.marcadorOffsetY, marcador, marcador)

  let baseY = inicioY + config.dy*q + 40

  ctx.fillRect(TLx, baseY + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, baseY + config.marcadorOffsetY, marcador, marcador)

  /* QR */

  const qrDiv = document.createElement("div")

  new QRCode(qrDiv,{
    text:"AVALIA+|Q=10|G=ABCDABCDAB",
    width:qrSize,
    height:qrSize
  })

  setTimeout(()=>{

    const qrCanvas = qrDiv.querySelector("canvas")
    const img = new Image()
    img.src = qrCanvas.toDataURL()

    img.onload = ()=>{

      const topo = inicioY + config.topoLetras - 20
      const base = inicioY + config.dy*q + 60
      const centro = (topo + base)/2

      ctx.drawImage(
        img,
        config.qrOffsetX,
        centro - qrSize/2 + config.qrOffsetY,
        qrSize,
        qrSize
      )
    }

  },100)
}
//========Gerar Versoes=======
function gerarVersoes(questoes, qtdVersoes = 4){

  const versoes = [];

  for(let v = 1; v <= qtdVersoes; v++){

    const embaralhadas = [...questoes]
      .sort(() => Math.random() - 0.5);

    const gabarito = embaralhadas
      .map(q => String(q.GABARITO).trim().toUpperCase())
      .join("");

    versoes.push({
      v,
      ordem: embaralhadas.map(q => q.ID),
      gabarito
    });
  }

  return versoes;
}	

/* ================= GERAR PREVIEW ================= */

function gerarPreview(){
  const msgBox = document.getElementById("msgErro")

	msgBox.style.display = "none"
	msgBox.classList.remove("alerta-erro")
	msgBox.innerHTML = ""
	
	// limpa inputs
	document.querySelectorAll(".painel input, .painel select").forEach(el=>{
	  el.classList.remove("input-erro")
	})

	let erros = []

		const nomeProva = document.getElementById("nomeProva")
		const escolaInput = document.getElementById("escola")
		const qtdInput = document.getElementById("qtd")
		
		if(!nomeProva.value.trim()){
		  erros.push("Nome da prova é obrigatório")
		  nomeProva.classList.add("input-erro")
		}
		
		if(!escolaInput.value.trim()){
		  erros.push("Escola é obrigatória")
		  escolaInput.classList.add("input-erro")
		}
		
	
  const escola = document.getElementById("escola").value
  const disciplina = document.getElementById("disciplina").value
	
  const turma = document.getElementById("turmaSelect").value

  let qtd = parseInt(qtdInput.value)

		if(isNaN(qtd) || qtd < 1){
			
		  erros.push("Quantidade mínima é 1")
		  qtd = 1
		  qtdInput.classList.add("input-erro")
		}
		
		if(qtd > 100){
		  erros.push("Quantidade máxima é 100")
		  qtd = 100
		  qtdInput.classList.add("input-erro")
		}
		
		qtdInput.value = qtd

		
		if(erros.length > 0){
		
		  msgBox.innerHTML = erros.map(e => `• ${e}`).join("<br>")
		  msgBox.style.display = "block"
		  msgBox.classList.add("alerta-erro")
		
		  return
		}
	  
        // 🔥 INICIALIZA ID DA PROVA (UMA VEZ)
if(!prova.id){
  prova.id = "PRV_" + Date.now();
}

// 🔥 GERA VERSÕES (UMA VEZ)
if(!prova.versoes){
  prova.versoes = gerarVersoes(prova.questoes, 4);
}

// 🔥 DEBUG (CONFIRMAR)
console.log("ID PROVA:", prova.id);
console.log("VERSÕES:", prova.versoes);

		  const extrasInput = document.getElementById("extras")
		let extras = parseInt(extrasInput.value)
		
		if(isNaN(extras) || extras < 0){
		  extras = 0
		}
		
		if(extras > 5){
		  erros.push("Extras máximo é 5")
		  extras = 5
		  extrasInput.classList.add("input-erro")
		}
		
		extrasInput.value = extras
		
		  const total = qtd + extras

  const folhas = document.getElementById("folhas")
  folhas.innerHTML = ""

  const textoInstrucoes = document.getElementById("instrucoes").value.trim()

  let instrucoesHTML = ""
	
	if(textoInstrucoes){
	  const linhas = textoInstrucoes.split("\n").filter(l => l.trim() !== "")
	
	  instrucoesHTML = `
	    <div class="instrucoes">
	      <strong>Instruções:</strong>
	      ${linhas.map(l => `<div>${l}</div>`).join("")}
	    </div>
	    <div class="linha-divisoria"></div>
	  `
	}	

  for(let i=1;i<=total;i++){

    const pagina = document.createElement("div")
    pagina.className = "pagina"

    pagina.innerHTML = `
      <div class="cabecalho">
        <div>
          <strong>${escola}</strong><br>
          ${disciplina}<br>
          Turma: ${turma}
        </div>

        <div style="text-align:right">
          Nº: ${i}<br>
          Nome: ________________________
        </div>
      </div>

      <div class="bloco-otico">

        <div class="lado-esquerdo">
          <canvas class="canvasGabarito"></canvas>
        </div>

        <div class="lado-direito">
          <div class="box-nota">
            <div>Nota</div>
            <div class="campo-nota"></div>
          </div>
        </div>

      </div>
	  
	  <div class="linha-divisoria"></div>

      ${instrucoesHTML}

      <div class="questoes">
        ${gerarQuestoesHTML()}
      </div>
    `

    folhas.appendChild(pagina)

    const canvas = pagina.querySelector(".canvasGabarito")
    gerarCanvasReal(canvas, prova.questoes.length)
  }

  ativarResize()
}

function gerarQuestoesHTML(){

  if(!prova || !prova.questoes) return ""

  return prova.questoes.map((q, i) => {

    const temImagem = q.IMAGEM && q.IMAGEM.trim() !== ""

    return `
      <div class="questao">

        <div class="enunciado">
          <strong>Q${i+1} - Peso ${Number(q.PESO || 1).toFixed(1)}</strong> - ${q.ENUNCIADO}
        </div>

        ${temImagem ? `
          <div class="img-container">
            <img src="${q.IMAGEM}" loading="lazy">
            <div class="resizer"></div>
          </div>
        ` : ""}

        <div class="alternativas">
          <div>A) ${String(q.ALT_A)}</div>
          <div>B) ${String(q.ALT_B)}</div>
          <div>C) ${String(q.ALT_C)}</div>
          <div>D) ${String(q.ALT_D)}</div>
        </div>

      </div>
    `
  }).join("")
}	
/* ===== RESIZE IMAGEM ===== */

function ativarResize(){

  document.querySelectorAll(".resizer").forEach(resizer => {

    const img = resizer.previousElementSibling

    let startX, startWidth

    // ===== MOUSE =====
    resizer.onmousedown = (e)=>{
      startX = e.clientX
      startWidth = img.offsetWidth

      document.onmousemove = (e)=>{
        let newWidth = startWidth + (e.clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.onmouseup = ()=>{
        document.onmousemove = null
      }
    }

    // ===== TOUCH (CELULAR) =====
    resizer.ontouchstart = (e)=>{
      startX = e.touches[0].clientX
      startWidth = img.offsetWidth

      document.ontouchmove = (e)=>{
        let newWidth = startWidth + (e.touches[0].clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.ontouchend = ()=>{
        document.ontouchmove = null
      }
    }

  })
}

/* INIT */
//gerarPreview()
window.onload = carregarPainel

</script>

</body>
</html>
