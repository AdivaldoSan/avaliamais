<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Final Inteligente</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:100%;
  max-width:650px;
}
button{
  padding:12px 20px;
  margin:10px;
}
</style>
</head>

<body>

<h2>Scanner Inteligente</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Iniciando...</div>
<button onclick="refazer()">Refazer</button>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
let capturado=false
let framesOK=0

cv.onRuntimeInitialized=()=>{
  pronto=true
  iniciar()
}

function iniciar(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  }).then(stream=>{
    video.srcObject=stream
    video.onloadedmetadata=()=>{
      video.play()
      loop()
    }
  })
}

/* ========================= */
function loop(){

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){

    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)

    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()

    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      let r=cv.boundingRect(approx)
      quadrados.push(r)
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length===4){
    framesOK++

    if(framesOK>6){
      capturarFrame(quadrados)
    }

  }else{
    framesOK=0
  }

  src.delete()
  gray.delete()
  bin.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

/* ========================= */
function capturarFrame(quadrados){

  capturado=true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  // 🔥 AGORA SIM: DETECTAR GRADE (APÓS WARP)
  detectarGrade(dst)

  document.getElementById("status").innerText =
    "Conferir leitura"
}

/* ========================= */
function detectarGrade(mat){

  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(mat,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    15,2
  )

  let linhas=[]
  let cols=[]

  for(let y=0;y<bin.rows;y++){
    let soma=0
    for(let x=0;x<bin.cols;x++){
      soma+=bin.ucharPtr(y,x)[0]
    }
    linhas.push(soma)
  }

  for(let x=0;x<bin.cols;x++){
    let soma=0
    for(let y=0;y<bin.rows;y++){
      soma+=bin.ucharPtr(y,x)[0]
    }
    cols.push(soma)
  }

  function picos(arr){
    let res=[]
    let lim=Math.max(...arr)*0.5

    for(let i=1;i<arr.length-1;i++){
      if(arr[i]>lim && arr[i]>arr[i-1] && arr[i]>arr[i+1]){
        res.push(i)
      }
    }
    return res
  }

  let ys=picos(linhas).slice(0,10)
  let xs=picos(cols).slice(0,4)

  ctx.fillStyle="red"

  ys.forEach(y=>{
    xs.forEach(x=>{
      ctx.fillRect(x-4,y-4,8,8)
    })
  })

  gray.delete()
  bin.delete()
}

/* ========================= */
function ordenar(q){

  q.sort((a,b)=>a.y-b.y)

  let top=q.slice(0,2)
  let bottom=q.slice(2,4)

  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)

  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

/* ========================= */
function refazer(){
  capturado=false
  framesOK=0
}

</script>

</body>
</html>
