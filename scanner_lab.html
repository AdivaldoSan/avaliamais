<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Profissional</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* 🔥 VISOR MAIOR */
canvas{
  width:125vw;
  max-width:650px;
  margin-top:10px;
  background:#000;
}

/* 🔥 BOTÕES MAIORES */
button{
  padding:15px 25px;
  margin:10px;
  font-size:20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#confirmar{
  background:#2ecc71;
}

#refazer{
  background:#e74c3c;
}

#gabarito{
  margin-top:15px;
  font-size:18px;
  color:#00ffcc;
}

</style>
</head>

<body>

<h2>Scanner de Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando câmera...</div>

<div id="botoes" style="display:none;">
  <button id="confirmar" onclick="confirmar()">✔ Confirmar</button>
  <button id="refazer" onclick="refazer()">❌ Refazer</button>
</div>

<div id="gabarito"></div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let rodando = true
let framesEstaveis = 0
let ultimoCentro = null

/* CAMERA TRASEIRA */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream=>{
  video.srcObject = stream
  loop()
})

/* LOOP */
function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

  // threshold
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 50 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  let marcadores = detectarMarcadores(frame)

  if(marcadores){

    let centro = centroMedio(marcadores)

    if(ultimoCentro){

      let dist = Math.hypot(
        centro.x - ultimoCentro.x,
        centro.y - ultimoCentro.y
      )

      if(dist < 2){
        framesEstaveis++
      }else{
        framesEstaveis = 0
      }
    }

    ultimoCentro = centro

    document.getElementById("status").innerText =
      `🟡 Estabilizando... (${framesEstaveis})`

    if(framesEstaveis > 8){
      capturar(frame)
      return
    }

  }else{
    document.getElementById("status").innerText =
      "🔴 Posicione o gabarito"
  }

  requestAnimationFrame(loop)
}

/* CAPTURA */
function capturar(frame){

  rodando = false

  ctx.putImageData(frame,0,0)

  processarImagem(frame)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"

  document.getElementById("botoes").style.display = "block"
}

/* BOTÕES */
function confirmar(){
  alert("Leitura confirmada")
}

function refazer(){
  rodando = true
  framesEstaveis = 0
  ultimoCentro = null
  document.getElementById("botoes").style.display = "none"
  document.getElementById("gabarito").innerText = ""
  loop()
}

/* DETECTAR MARCADORES */
function detectarMarcadores(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function floodFill(x,y){

    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx
        let ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h){
          stack.push([nx,ny])
        }
      }}
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=4){
  for(let x=0;x<w;x+=4){

    let idx=y*w+x
    if(visitado[idx]) continue

    let i=idx*4

    if(data[i]===0){
      let b=floodFill(x,y)
      if(b.area>500) blobs.push(b)
    }

  }}

  blobs.sort((a,b)=>b.area-a.area)

  if(blobs.length < 4) return null

  let maiores = blobs.slice(0,4)

  return maiores.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))
}

/* CENTRO */
function centroMedio(centros){

  let x=0,y=0

  centros.forEach(c=>{
    x+=c.x
    y+=c.y
  })

  return {x:x/centros.length, y:y/centros.length}
}

/* PROCESSAMENTO */
function processarImagem(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function floodFill(x,y){
    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){
      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx
        let ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h){
          stack.push([nx,ny])
        }
      }}
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=2){
  for(let x=0;x<w;x+=2){

    let idx=y*w+x
    if(visitado[idx]) continue

    let i=idx*4

    if(data[i]===0){
      let b=floodFill(x,y)
      if(b.area>200) blobs.push(b)
    }

  }}

  blobs.sort((a,b)=>b.area-a.area)

  let candidatos = blobs.slice(4)

  let areas = candidatos.map(b=>b.area).sort((a,b)=>a-b)
  let mediana = areas[Math.floor(areas.length/2)]

  let bolhas = candidatos.filter(b =>
    b.area > mediana*0.5 && b.area < mediana*1.8
  )

  let pontos = bolhas.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))

  pontos.sort((a,b)=>a.y-b.y)

  let linhas=[]
  let tolY=20

  pontos.forEach(p=>{
    let linha = linhas.find(l=>Math.abs(l.y-p.y)<tolY)
    if(linha) linha.pontos.push(p)
    else linhas.push({y:p.y,pontos:[p]})
  })

  linhas.forEach(l=>l.pontos.sort((a,b)=>a.x-b.x))

  let todos = pontos.slice().sort((a,b)=>a.x-b.x)

  let colunas=[]
  let tolX=25

  todos.forEach(p=>{
    let col = colunas.find(c=>Math.abs(c.x-p.x)<tolX)
    if(col) col.pontos.push(p)
    else colunas.push({x:p.x,pontos:[p]})
  })

  colunas.sort((a,b)=>a.x-b.x)

  let respostas=[]
  let raio=15

  linhas.forEach((linha,i)=>{

    respostas[i]=[]

    linha.pontos.forEach(p=>{

      let colIndex = colunas.findIndex(c =>
        Math.abs(c.x - p.x) < tolX
      )

      if(colIndex === -1) return

      let soma=0, cont=0

      for(let dx=-raio;dx<=raio;dx++){
      for(let dy=-raio;dy<=raio;dy++){

        if(Math.sqrt(dx*dx+dy*dy)>raio*0.7) continue

        let x=Math.floor(p.x+dx)
        let y=Math.floor(p.y+dy)

        if(x<0||y<0||x>=canvas.width||y>=canvas.height) continue

        let idx=(y*canvas.width+x)*4
        cont++

        if(data[idx]===0) soma++

      }}

      let dens=soma/cont

      if(dens>0.18){

        respostas[i].push(colIndex)

        ctx.fillStyle="rgba(0,255,0,0.5)"
        ctx.beginPath()
        ctx.arc(p.x,p.y,raio,0,Math.PI*2)
        ctx.fill()
      }

      ctx.fillStyle="red"
      ctx.fillRect(p.x-2,p.y-2,4,4)

    })
  })

  let letras=["A","B","C","D"]

  let txt = respostas.map((r,i)=>{
    if(!r.length) return `${i+1}: -`
    return `${i+1}: ${r.map(j=>letras[j]).join(",")}`
  })

  document.getElementById("gabarito").innerText =
    txt.join(" | ")
}

</script>

</body>
</html>
