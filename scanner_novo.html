<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Inteligente</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
}
canvas{
  width:100%;
  max-width:650px;
}
</style>
</head>

<body>

<h2>Scanner Inteligente</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false

cv.onRuntimeInitialized=()=>{
  pronto=true
  iniciar()
}

function iniciar(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  }).then(stream=>{
    video.srcObject=stream
    video.onloadedmetadata=()=>{
      video.play()
      loop()
    }
  })
}

function loop(){

  if(!pronto){
    requestAnimationFrame(loop)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    15,2
  )

  // =========================
  // PROJEÇÃO HORIZONTAL
  // =========================

  let linhas=[]

  for(let y=0;y<bin.rows;y++){
    let soma=0
    for(let x=0;x<bin.cols;x++){
      soma+=bin.ucharPtr(y,x)[0]
    }
    linhas.push(soma)
  }

  // =========================
  // PROJEÇÃO VERTICAL
  // =========================

  let colunas=[]

  for(let x=0;x<bin.cols;x++){
    let soma=0
    for(let y=0;y<bin.rows;y++){
      soma+=bin.ucharPtr(y,x)[0]
    }
    colunas.push(soma)
  }

  // =========================
  // PEGAR PICOS (simples)
  // =========================

  function pegarPicos(arr, limite){

    let picos=[]

    for(let i=1;i<arr.length-1;i++){
      if(arr[i] > limite &&
         arr[i] > arr[i-1] &&
         arr[i] > arr[i+1]){
        picos.push(i)
      }
    }

    return picos
  }

  let limL = Math.max(...linhas)*0.5
  let limC = Math.max(...colunas)*0.5

  let ys = pegarPicos(linhas, limL)
  let xs = pegarPicos(colunas, limC)

  // =========================
  // DESENHAR GRADE REAL
  // =========================

  ctx.fillStyle="red"

  ys.slice(0,10).forEach(y=>{
    xs.slice(0,4).forEach(x=>{
      ctx.fillRect(x-4,y-4,8,8)
    })
  })

  src.delete()
  gray.delete()
  bin.delete()

  requestAnimationFrame(loop)
}

</script>

</body>
</html>
