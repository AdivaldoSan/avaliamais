<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#ui{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;   /* 🔥 margem lateral */
  box-sizing:border-box;
  gap:10px;
}

#ui button{
  flex:1;   /* 🔥 ocupa metade da tela */
  font-size:27px;
  padding:27px 0;
  border:none;
  border-radius:12px;
  background:#cc3333;
  color:white;
  font-weight:bold;
}

#ui button:last-child{
  background:#00aa66;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui"></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

let modo = "QR"
let capturado = false

let dadosQR = null

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
}).then(stream=>{
  video.srcObject = stream
})

/* =========================
LOOP
========================= */

function loop(){

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

  if(!capturado){
    ctx.drawImage(video,0,0)
  }
      let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

    if(modo === "QR"){
      lerQR(frame)
      desenharOverlayQR()
    }

    else if(modo === "OMR"){

  desenharOverlayOMR()

  if(!capturado){
    detectarMarcadores(frame)
  }
}
  }

  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)

/* =========================
QR
========================= */

function lerQR(frame){

  let code = jsQR(frame.data, frame.width, frame.height)

  if(code){

    let dados = parseQR(code.data)

    if(dados){
      dadosQR = dados
      modo = "OMR"
    }
  }
}

function parseQR(text){

  if(!text.startsWith("AVALIA+")) return null

  let obj = {}

  text.split("|").forEach(p=>{
    let [k,v] = p.split("=")
    if(v) obj[k] = v
  })

  return obj
}

/* =========================
OVERLAY QR
========================= */
function desenharOverlayQR(){

  let w = canvas.width
  let h = canvas.height

  ctx.fillStyle = "rgba(0,0,0,0.6)"
  ctx.fillRect(0,0,w,h)

  let size = Math.min(w,h) * 0.5

  let x = (w - size)/2
  let y = (h - size)/2

  ctx.clearRect(x,y,size,size)
}




/* =========================
OVERLAY OMR
========================= */
function desenharOverlayOMR(){

 let w = canvas.width
 let h = canvas.height

  // 🔥 reserva espaço inferior para botões (em px)
  let areaUI = 120
  
  // área útil real
  let hUtil = h - areaUI
  let margemTop = 80  // espaço para instrução no topo

  ctx.fillStyle = "rgba(0,0,0,0.5)"
  ctx.fillRect(0,0,w,h)

  if(!dadosQR) return

  let q = parseInt(dadosQR.Q)

  // 🔥 MODELO REAL (medido no gerador)
  let alturaReal = 150 + (35 * q)
  let larguraReal = 250

  let proporcao = alturaReal / larguraReal

  // 🔥 largura base na tela
  let margemTela = 0.75  // 🔥 ajuste fino aqui (0.7 a 0.85)

  let boxW = w * margemTela
  let boxH = boxW * proporcao

  // 🔥 limite mínimo e máximo (ESSENCIAL)
  let maxW = w * 0.85
  let minW = w * 0.45

  boxW = Math.max(minW, Math.min(boxW, maxW))

  // 🔥 ajuste para não estourar tela
  let limiteAltura = 0.75  // 🔥 margem segura (ajuste fino aqui)

  if(boxH > hUtil * limiteAltura){
    boxH = hUtil * limiteAltura
    boxW = boxH / proporcao
  }

  let x = (w - boxW)/2
  let y = margemTop + (hUtil - margemTop - boxH)/2

  // recorte (furo)
  ctx.clearRect(x,y,boxW,boxH)
  
  ctx.fillStyle = "white"
  ctx.font = "22px Arial"
  ctx.textAlign = "center"
  
  ctx.fillStyle = "white"
  ctx.font = "16px Arial"   // 🔥 menor
  ctx.textAlign = "center"
  
  // 🔥 quebra manual simples
  ctx.fillText("Centralize os 4 marcadores", canvas.width/2, 30)
  ctx.fillText("dentro da área", canvas.width/2, 50)
  
  

  // 🔥 borda visual (ajuda no alinhamento)
  ctx.strokeStyle = "#00ff88"
  ctx.lineWidth = 3
  ctx.strokeRect(x,y,boxW,boxH)

  // 🔥 debug visual (remover depois)
  ctx.fillStyle = "white"
  ctx.font = "28px Arial"
  ctx.fillText("Q="+q, 30, 50)

  // salva área estimada
  window.areaOMR = {
    x, y, w: boxW, h: boxH
  }

  // 🔥 posiciona UI logo abaixo do retângulo
  let ui = document.getElementById("ui")
  
}



/* =========================
DETECÇÃO DE MARCADORES
========================= */

function detectarMarcadores(frame){

  let w = frame.width
  let h = frame.height
  let data = frame.data

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function flood(x,y){

    let stack = [[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py] = stack.pop()
      let idx = py*w + px

      if(visitado[idx]) continue
      visitado[idx] = 1

      let i = idx*4
      if(data[i] > 80) continue // preto

      area++

      minX = Math.min(minX,px)
      maxX = Math.max(maxX,px)
      minY = Math.min(minY,py)
      maxY = Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx, ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h){
          stack.push([nx,ny])
        }
      }}
    }

    return {area,minX,maxX,minY,maxY}
  }

  // varredura
  for(let y=0;y<h;y+=3){
  for(let x=0;x<w;x+=3){

    let idx = y*w + x
    if(visitado[idx]) continue

    let i = idx*4
    if(data[i] < 80){

      let b = flood(x,y)
      if(b.area > 400) blobs.push(b)
    }

  }}

  if(blobs.length < 4) return

  // pega 4 maiores
  let m = blobs.sort((a,b)=>b.area-a.area).slice(0,4)

  let c = m.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))

  // ordenar
  c.sort((a,b)=>a.y-b.y)

  let top = c.slice(0,2).sort((a,b)=>a.x-b.x)
  let bot = c.slice(2,4).sort((a,b)=>a.x-b.x)

  let TL = top[0]
  let TR = top[1]
  let BL = bot[0]
  let BR = bot[1]

  // 🔥 DEBUG VISUAL
  ctx.fillStyle = "red"
  ;[TL,TR,BL,BR].forEach(p=>{
    ctx.beginPath()
    ctx.arc(p.x,p.y,8,0,Math.PI*2)
    ctx.fill()
  })

  // 🔥 validação real
  validarMarcadores(TL,TR,BL,BR)
}

/* =========================
CAPTURA
========================= */

function capturarFrame(){

  capturado = true
  modo = "OMR"

  document.getElementById("ui").innerHTML = `
    <button onclick="resetar()">Ler novamente</button>
    <button onclick="confirmar()">Confirmar</button>
    
  `
}

function confirmar(){
  alert("Aqui entra leitura OMR + correção")
}

function resetar(){
  modo = "QR"
  capturado = false
  dadosQR = null
  document.getElementById("ui").innerHTML = ""
}

function dist(a,b){
  return Math.hypot(a.x - b.x, a.y - b.y)
}

function validarMarcadores(TL,TR,BL,BR){

  if(!window.areaOMR) return

  let a = window.areaOMR

  let cantoTL = {x:a.x, y:a.y}
  let cantoTR = {x:a.x+a.w, y:a.y}
  let cantoBL = {x:a.x, y:a.y+a.h}
  let cantoBR = {x:a.x+a.w, y:a.y+a.h}

  let tol = a.w * 0.12

  let ok =
    dist(TL,cantoTL) < tol &&
    dist(TR,cantoTR) < tol &&
    dist(BL,cantoBL) < tol &&
    dist(BR,cantoBR) < tol

  ctx.strokeStyle = ok ? "#00ff88" : "#ff4444"
  ctx.lineWidth = 4
  ctx.strokeRect(a.x,a.y,a.w,a.h)

  if(ok){
    capturarFrame()
  }
}  
  
</script>

</body>
</html>
