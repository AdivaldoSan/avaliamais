<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAB - Ajuste de Gabarito</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin:10px;
}

.control{
  background:#222;
  padding:10px;
  border-radius:8px;
}

label{
  font-size:14px;
}

canvas{
  background:white;
  margin-top:10px;
  max-width:95vw;
}
</style>
</head>

<body>

<h2>LAB Ajuste Gabarito</h2>
<button onclick="exportar()">Exportar Config</button>
<div class="controls">

<div class="control">
<label>QR X</label><br>
<input type="range" id="qrX" min="0" max="300" value="40">
</div>

<div class="control">
<label>QR Y</label><br>
<input type="range" id="qrY" min="-100" max="100" value="0">
</div>

<div class="control">
<label>Gabarito X</label><br>
<input type="range" id="gX" min="0" max="400" value="200">
</div>

<div class="control">
<label>Gabarito Y</label><br>
<input type="range" id="gY" min="-100" max="100" value="0">
</div>

<div class="control">
<label>Marcador X</label><br>
<input type="range" id="mX" min="0" max="400" value="200">
</div>

<div class="control">
<label>Marcador Y</label><br>
<input type="range" id="mY" min="-100" max="100" value="0">
</div>

<div class="control">
<label>Espaçamento (dy)</label><br>
<input type="range" id="dy" min="20" max="40" value="40">
</div>

<div class="control">
<label>Topo Letras</label><br>
<input type="range" id="topo" min="-120" max="-20" value="-60">
</div>

<div class="control">
<label>Questões</label><br>
<input type="number" id="qtd" value="10" min="1" max="30">
</div>

</div>

<canvas id="canvas"></canvas>
<div id="qrTemp" style="display:none"></div>

<script>

const qrSize = 140

function draw(){

let q = parseInt(document.getElementById("qtd").value)

let qrOffsetX = parseInt(qrX.value)
let qrOffsetY = parseInt(qrY.value)

let gOffsetX = parseInt(gX.value)
let gOffsetY = parseInt(gY.value)

let mOffsetX = parseInt(mX.value)
let mOffsetY = parseInt(mY.value)

let dy = parseInt(document.getElementById("dy").value)
let offsetLetrasY = parseInt(document.getElementById("topo").value)

let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

canvas.width = 1300
canvas.height = 300 + dy*q

ctx.fillStyle="white"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* =========================
GABARITO BASE
========================= */

let inicioX = 400 + gOffsetX
let inicioY = 200 + gOffsetY
let dx = 40
let raio = 8

/* =========================
LETRAS ABCD
========================= */

ctx.fillStyle="black"
ctx.font="12px Arial"

let letras = ["A","B","C","D"]

for(let c=0;c<4;c++){

  let x = inicioX + c*dx

 ctx.fillText(letras[c], x, inicioY + offsetLetrasY)
}

/* =========================
QUESTÕES + BOLHAS
========================= */

ctx.font="12px Arial"
ctx.textBaseline = "middle"
ctx.textAlign = "center"

for(let i=0;i<q;i++){

  let y = inicioY + i*dy

    ctx.textAlign = "right"
    
    ctx.fillText((i+1), inicioX - 25, y)

  for(let c=0;c<4;c++){

    let x = inicioX + c*dx

    ctx.beginPath()

    ctx.setLineDash([2,2])   // tracejado leve
    ctx.lineWidth = 1        // linha fina
    ctx.strokeStyle = "#000"
    
    ctx.arc(x,y,raio,0,Math.PI*2)
    ctx.stroke()
    
    ctx.setLineDash([])      // reset (IMPORTANTE)
    
      }
    }

/* =========================
MARCADORES
========================= */

let marcador = 30

ctx.fillRect(160 + mOffsetX, 90 + mOffsetY, marcador, marcador)
ctx.fillRect(410 + mOffsetX, 90 + mOffsetY, marcador, marcador)

let baseY = inicioY + dy*q + 40

ctx.fillRect(160 + mOffsetX, baseY + mOffsetY, marcador, marcador)
ctx.fillRect(410 + mOffsetX, baseY + mOffsetY, marcador, marcador)

/* =========================
QR CODE
========================= */

let qrDiv = document.getElementById("qrTemp")
qrDiv.innerHTML=""

new QRCode(qrDiv,{
  text:"TESTE",
  width:qrSize,
  height:qrSize
})

let img = qrDiv.querySelector("img")

/* =========================
CENTRALIZAÇÃO REAL (COM ABCD)
========================= */

const topo = inicioY + offsetLetrasY - 20
const base = inicioY + dy*q + 60
const centro = (topo + base)/2

img.onload = () => {

  ctx.drawImage(
    img,
    qrOffsetX,
    centro - qrSize/2 + qrOffsetY,
    qrSize,
    qrSize
  )

}

}

/* =========================
ATUALIZAÇÃO EM TEMPO REAL
========================= */

document.querySelectorAll("input").forEach(el=>{
  el.addEventListener("input", draw)
})
function exportar(){

const config = {

  qrOffsetX: parseInt(document.getElementById("qrX").value),
  qrOffsetY: parseInt(document.getElementById("qrY").value),

  gabaritoOffsetX: parseInt(document.getElementById("gX").value),
  gabaritoOffsetY: parseInt(document.getElementById("gY").value),

  marcadorOffsetX: parseInt(document.getElementById("mX").value),
  marcadorOffsetY: parseInt(document.getElementById("mY").value),

  dy: parseInt(document.getElementById("dy").value),
  topoLetras: parseInt(document.getElementById("topo").value)

}

console.log(JSON.stringify(config, null, 2))

alert("Configuração gerada no console (F12)")

}
draw()

</script>

</body>
</html>
