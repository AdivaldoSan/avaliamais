<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#ui{
  position:absolute;
  bottom:20px;
  width:100%;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui"></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

let modo = "QR"
let capturado = false

let dadosQR = null

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
}).then(stream=>{
  video.srcObject = stream
})

/* =========================
LOOP
========================= */

function loop(){

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

  if(!capturado){
    ctx.drawImage(video,0,0)
  }
      let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

    if(modo === "QR"){
      lerQR(frame)
      desenharOverlayQR()
    }

    else if(modo === "OMR"){

  desenharOverlayOMR()

  if(!capturado){
    detectarMarcadores(frame)
  }
}
  }

  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)

/* =========================
QR
========================= */

function lerQR(frame){

  let code = jsQR(frame.data, frame.width, frame.height)

  if(code){

    let dados = parseQR(code.data)

    if(dados){
      dadosQR = dados
      modo = "OMR"
    }
  }
}

function parseQR(text){

  if(!text.startsWith("AVALIA+")) return null

  let obj = {}

  text.split("|").forEach(p=>{
    let [k,v] = p.split("=")
    if(v) obj[k] = v
  })

  return obj
}

/* =========================
OVERLAY QR
========================= */

function desenharOverlayOMR(){

  let w = canvas.width
  let h = canvas.height

  ctx.fillStyle = "rgba(0,0,0,0.5)"
  ctx.fillRect(0,0,w,h)

  if(!dadosQR) return

  let q = parseInt(dadosQR.Q)

  // 🔥 largura fixa proporcional à tela
  let boxW = w * 0.6

  // 🔥 altura baseada no número de questões
  // referência: 10 questões = proporção base
  let baseQ = 10
  let escala = q / baseQ

  let boxH = h * 0.5 * escala

  // 🔥 limites (não deixar sair da tela)
  boxH = Math.min(boxH, h * 0.85)

  let x = (w - boxW)/2
  let y = (h - boxH)/2

  // recorte (furo)
  ctx.clearRect(x,y,boxW,boxH)

  // 🔥 salvar área estimada (IMPORTANTE PRO PRÓXIMO PASSO)
  window.areaOMR = {
    x, y, w: boxW, h: boxH
  }
}
/* =========================
OVERLAY OMR
========================= */

function desenharOverlayOMR(){

  let w = canvas.width
  let h = canvas.height

  ctx.fillStyle = "rgba(0,0,0,0.5)"
  ctx.fillRect(0,0,w,h)

  let boxW = w*0.6
  let boxH = h*0.7

  let x = (w-boxW)/2
  let y = (h-boxH)/2

  ctx.clearRect(x,y,boxW,boxH)

  ctx.strokeStyle = "#00ff88"
  ctx.lineWidth = 3
  ctx.strokeRect(x,y,boxW,boxH)
}

/* =========================
DETECÇÃO DE MARCADORES
========================= */

function detectarMarcadores(frame){

  // versão simplificada só para validar captura

  let blobsPretos = 0

  for(let i=0;i<frame.data.length;i+=4){
    if(frame.data[i] < 50) blobsPretos++
  }

  // condição fake só para teste inicial
  if(blobsPretos > 5000){

    capturarFrame()
  }
}

/* =========================
CAPTURA
========================= */

function capturarFrame(){

  capturado = true
  modo = "OMR"

  document.getElementById("ui").innerHTML = `
    <button onclick="confirmar()">Confirmar</button>
    <button onclick="resetar()">Ler novamente</button>
  `
}

function confirmar(){
  alert("Aqui entra leitura OMR + correção")
}

function resetar(){
  modo = "QR"
  capturado = false
  dadosQR = null
  document.getElementById("ui").innerHTML = ""
}

</script>

</body>
</html>
