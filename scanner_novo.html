<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:95vw;
  max-width:650px;
}
</style>
</head>

<body>

<h2>Scanner Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Carregando OpenCV...</div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto = false
let rodando = true

// ================= AGUARDAR OPENCV =================
cv['onRuntimeInitialized'] = () => {
  pronto = true
  document.getElementById("status").innerText = "🟡 Iniciando câmera..."
  iniciarCamera()
}

// ================= CAMERA =================
function iniciarCamera(){

  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:"environment" } }
  })
  .then(stream=>{
    video.srcObject = stream
    video.onloadedmetadata = ()=>{
      video.play()
      loop()
    }
  })
  .catch(err=>{
    status.innerText = "Erro câmera: " + err.message
  })
}

// ================= LOOP =================
function loop(){

  if(!pronto || !rodando){
    requestAnimationFrame(loop)
    return
  }

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let src = cv.imread(canvas)

  let marcadores = detectarMarcadores(src)

  if(marcadores){

    // 🔥 DESENHAR RETÂNGULOS
    ctx.strokeStyle="yellow"
    ctx.lineWidth=4

    marcadores.forEach(r=>{
      ctx.strokeRect(r.x,r.y,r.width,r.height)
    })

    document.getElementById("status").innerText = "🟢 4 marcadores detectados"

    let warp = aplicarWarp(src, marcadores)

    cv.imshow(canvas, warp)

    rodando = false
    src.delete()
    return
  }

  document.getElementById("status").innerText = "🔴 Procurando marcadores..."

  src.delete()

  requestAnimationFrame(loop)
}

// ================= DETECTAR MARCADORES =================
function detectarMarcadores(src){

  let gray = new cv.Mat()
  let thresh = new cv.Mat()

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)

  cv.threshold(gray, thresh, 120,255, cv.THRESH_BINARY_INV)

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(thresh, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let candidatos = []

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)

    let rect = cv.boundingRect(cnt)

    let area = rect.width * rect.height
    let ratio = rect.width / rect.height

    if(area > 1500 && area < 20000 && ratio > 0.8 && ratio < 1.2){
      candidatos.push(rect)
    }
  }

  gray.delete()
  thresh.delete()
  contours.delete()
  hierarchy.delete()

  if(candidatos.length < 4) return null

  candidatos.sort((a,b)=>b.width*b.height - a.width*a.height)

  return candidatos.slice(0,4)
}

// ================= WARP =================
function aplicarWarp(src, m){

  m.sort((a,b)=>a.y - b.y)

  let top = m.slice(0,2)
  let bottom = m.slice(2,4)

  top.sort((a,b)=>a.x - b.x)
  bottom.sort((a,b)=>a.x - b.x)

  let TL = top[0]
  let TR = top[1]
  let BL = bottom[0]
  let BR = bottom[1]

  let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    TL.x,TL.y,
    TR.x+TR.width,TR.y,
    BL.x,BL.y+BL.height,
    BR.x+BR.width,BR.y+BR.height
  ])

  let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0,
    800,0,
    0,1200,
    800,1200
  ])

  let M = cv.getPerspectiveTransform(srcTri, dstTri)

  let dst = new cv.Mat()
  cv.warpPerspective(src, dst, M, new cv.Size(800,1200))

  srcTri.delete()
  dstTri.delete()
  M.delete()

  return dst
}

</script>

</body>
</html>
