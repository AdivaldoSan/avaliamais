<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:95vw;
  max-width:650px;
  margin-top:10px;
}
#status{
  font-size:22px;
}
</style>
</head>

<body>

<h2>Scanner Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Carregando...</div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto = false
let rodando = true

// ================= OPEN CV =================
cv['onRuntimeInitialized'] = () => {
  pronto = true
  iniciarCamera()
}

// ================= CAMERA =================
function iniciarCamera(){

  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:"environment" } }
  })
  .then(stream=>{
    video.srcObject = stream
    video.onloadedmetadata = ()=>{
      video.play()
      loop()
    }
  })
}

// ================= LOOP =================
function loop(){

  if(!pronto || !rodando){
    requestAnimationFrame(loop)
    return
  }

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

  // ================= THRESHOLD ORIGINAL =================
  let data = frame.data

  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 50 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  let marcadores = detectarMarcadores(frame)

  if(marcadores){

    // desenhar marcadores
    ctx.strokeStyle="yellow"
    ctx.lineWidth=3

    marcadores.forEach(m=>{
      ctx.strokeRect(
        m.minX,
        m.minY,
        m.maxX - m.minX,
        m.maxY - m.minY
      )
    })

    document.getElementById("status").innerText = "🟢 Detectado"

    capturar(frame, marcadores)
    return
  }

  document.getElementById("status").innerText = "🔴 Posicione o gabarito"

  requestAnimationFrame(loop)
}

// ================= CAPTURA =================
function capturar(frame, marcadores){

  rodando = false

  processarImagem(frame, marcadores)
}

// ================= DETECTOR ORIGINAL =================
function detectarMarcadores(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function flood(x,y){

    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
        for(let dy=-1;dy<=1;dy++){
          let nx=px+dx
          let ny=py+dy
          if(nx>=0&&ny>=0&&nx<w&&ny<h){
            stack.push([nx,ny])
          }
        }
      }
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=4){
    for(let x=0;x<w;x+=4){

      let idx=y*w+x
      if(visitado[idx]) continue

      let i=idx*4

      if(data[i]===0){
        let b=flood(x,y)
        if(b.area>500 && b.area<20000){
          blobs.push(b)
        }
      }
    }
  }

  let cantos = blobs.filter(b=>{
    let cx=(b.minX+b.maxX)/2
    let cy=(b.minY+b.maxY)/2

    return (
      (cx < w*0.3 && cy < h*0.3) ||
      (cx > w*0.7 && cy < h*0.3) ||
      (cx < w*0.3 && cy > h*0.7) ||
      (cx > w*0.7 && cy > h*0.7)
    )
  })

  if(cantos.length < 4) return null

  cantos.sort((a,b)=>b.area-a.area)

  return cantos.slice(0,4)
}

// ================= PROCESSAR (SEU WARP) =================
function processarImagem(frame, marcadores){

  // ordenar
  marcadores.sort((a,b)=>a.minY - b.minY)

  let top = marcadores.slice(0,2)
  let bottom = marcadores.slice(2,4)

  top.sort((a,b)=>a.minX - b.minX)
  bottom.sort((a,b)=>a.minX - b.minX)

  let TL = { x: top[0].minX, y: top[0].minY }
  let TR = { x: top[1].maxX, y: top[1].minY }
  let BL = { x: bottom[0].minX, y: bottom[0].maxY }
  let BR = { x: bottom[1].maxX, y: bottom[1].maxY }

  let temp = document.createElement("canvas")
  temp.width = canvas.width
  temp.height = canvas.height

  let tctx = temp.getContext("2d")
  tctx.putImageData(frame,0,0)

  let warp = warpImagem(temp, TL, TR, BL, BR)

  ctx.clearRect(0,0,canvas.width,canvas.height)
  ctx.drawImage(warp,0,0)

  document.getElementById("status").innerText = "🟢 Warp OK"
}

// ================= WARP =================
function warpImagem(srcCanvas, TL, TR, BL, BR){

  let W=800, H=1200

  let dest = document.createElement("canvas")
  dest.width=W
  dest.height=H

  let ctx=dest.getContext("2d")

  function tri(sx1,sy1,sx2,sy2,sx3,sy3,dx1,dy1,dx2,dy2,dx3,dy3){

    ctx.save()
    ctx.beginPath()
    ctx.moveTo(dx1,dy1)
    ctx.lineTo(dx2,dy2)
    ctx.lineTo(dx3,dy3)
    ctx.closePath()
    ctx.clip()

    let denom=(sx1*(sy2-sy3)+sx2*(sy3-sy1)+sx3*(sy1-sy2))

    let a=(dx1*(sy2-sy3)+dx2*(sy3-sy1)+dx3*(sy1-sy2))/denom
    let b=(dx1*(sx3-sx2)+dx2*(sx1-sx3)+dx3*(sx2-sx1))/denom
    let c=(dx1*(sx2*sy3-sx3*sy2)+dx2*(sx3*sy1-sx1*sy3)+dx3*(sx1*sy2-sx2*sy1))/denom

    let d=(dy1*(sy2-sy3)+dy2*(sy3-sy1)+dy3*(sy1-sy2))/denom
    let e=(dy1*(sx3-sx2)+dy2*(sx1-sx3)+dy3*(sx2-sx1))/denom
    let f=(dy1*(sx2*sy3-sx3*sy2)+dy2*(sx3*sy1-sx1*sy3)+dy3*(sx1*sy2-sx2*sy1))/denom

    ctx.transform(a,d,b,e,c,f)
    ctx.drawImage(srcCanvas,0,0)
    ctx.restore()
  }

  tri(TL.x,TL.y,TR.x,TR.y,BL.x,BL.y,0,0,W,0,0,H)
  tri(BR.x,BR.y,TR.x,TR.y,BL.x,BL.y,W,H,W,0,0,H)

  return dest
}

</script>

</body>
</html>
