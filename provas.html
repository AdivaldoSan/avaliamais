<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Avalia+ | Gerador de Provas</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<script src="./js/config.js"></script>    
<script src="./js/conexao.js"></script>
<script src="./js/layout.js"></script>

<script>

let banco = [];
let descritoresBanco = [];
let mapaDescritores = {};
let modoGeracao = null;

// ================= INICIAR =================
function iniciarPagina(){

    criarLayout();

    document.getElementById("conteudo").innerHTML = `
        <h2>🧾 Gerador de Provas</h2>

        <div class="card form-card">

            <div class="form-group">
                <label>Disciplina</label>
                <select id="disciplina"></select>
            </div>

            <div class="form-group">
                <label>Nível</label>
                <select id="nivel">
                    <option value="">Selecione</option>
                    <option value="EF1">EF1</option>
                    <option value="EF2">EF2</option>
                    <option value="EM">EM</option>
                </select>
            </div>

            <div class="form-group">
                <label>Turmas</label>
                <div id="listaTurmas" class="turmas-grid"></div>
            </div>

            <div class="form-group">
                <label>Modo</label>
                <label><input type="radio" name="modo" value="ASSUNTO"> Assunto</label>
                <label><input type="radio" name="modo" value="DESCRITOR"> Descritor</label>
            </div>

            <div id="filtro"></div>

            <hr style="margin:20px 0;">

            <div id="areaQuestoes"></div>

            <div style="margin-top:20px;">
                <button class="btn-primary" onclick="gerarProva()">Gerar Prova</button>
            </div>

        </div>
    `;

    iniciar();
}

window.onload = iniciarPagina;


// ================= CARREGAR =================
async function iniciar(){

    const dados = await carregarBancoCompleto();

    banco = dados.questoes.filter(q =>
        String(q.ATIVO).trim().toUpperCase() === "SIM"
    );

    descritoresBanco = dados.descritores;

    preencherSelect("disciplina",
        [...new Set(banco.map(q=>q.DISCIPLINA))]
    );

    document.getElementById("disciplina")
        .addEventListener("change", atualizarFiltros);

    document.getElementById("nivel")
        .addEventListener("change", atualizarFiltros);

    document.querySelectorAll("input[name='modo']")
        .forEach(r=>{
            r.addEventListener("change", e=>{
                modoGeracao = e.target.value;
                atualizarFiltros();
            });
        });

    await carregarTurmas();
}


// ================= FILTROS =================
function atualizarFiltros(){

    if(!disciplina.value || !nivel.value || !modoGeracao) return;

    const filtrado = banco.filter(q =>
        q.DISCIPLINA === disciplina.value &&
        q.NIVEL_ENSINO === nivel.value
    );

    const filtroDiv = document.getElementById("filtro");
    filtroDiv.innerHTML = "";

    if(modoGeracao === "ASSUNTO"){

        const lista =
            [...new Set(filtrado.map(q=>q.ASSUNTO))];

        lista.forEach(a=>{
            const el = document.createElement("div");
            el.className = "multi-item";
            el.innerText = a;
            el.onclick = ()=>{
                el.classList.toggle("selected");
                mostrarQuestoes();
            };
            filtroDiv.appendChild(el);
        });
    }

    if(modoGeracao === "DESCRITOR"){

        const lista =
            [...new Set(filtrado.map(q=>q.DESCRITOR))];

        lista.forEach(d=>{
            const el = document.createElement("div");
            el.className = "multi-item";
            el.innerText = d;
            el.onclick = ()=>{
                el.classList.toggle("selected");
                mostrarQuestoes();
            };
            filtroDiv.appendChild(el);
        });
    }
}


// ================= QUESTÕES =================
function mostrarQuestoes(){

    const selecionados =
        [...document.querySelectorAll("#filtro .selected")]
        .map(el=>el.innerText);

    const filtradas = banco.filter(q => {

        if(q.DISCIPLINA !== disciplina.value) return false;
        if(q.NIVEL_ENSINO !== nivel.value) return false;

        if(modoGeracao === "ASSUNTO")
            return selecionados.includes(q.ASSUNTO);

        if(modoGeracao === "DESCRITOR")
            return selecionados.includes(q.DESCRITOR);

        return false;
    });

    const area = document.getElementById("areaQuestoes");
    area.innerHTML = "";

    filtradas.forEach(q => {

        const div = document.createElement("div");
        div.className = "preview-questao";

        div.innerHTML = `
            <label>
                <input type="checkbox" class="chkQuestao" value="${q.ID}">
                <strong>${q.ENUNCIADO}</strong>
            </label>
        `;

        area.appendChild(div);
    });

    document.querySelectorAll(".chkQuestao")
        .forEach(cb=>{
            cb.addEventListener("change", atualizarPreview);
        });
}


// ================= PREVIEW =================
function atualizarPreview(){

    const ids =
        [...document.querySelectorAll(".chkQuestao:checked")]
        .map(el=>el.value);

    const selecionadas =
        banco.filter(q => ids.includes(q.ID));

    let preview = document.getElementById("preview");

    if(!preview){
        preview = document.createElement("div");
        preview.id = "preview";
        document.getElementById("areaQuestoes").appendChild(preview);
    }

    preview.innerHTML = "<hr><h3>Pré-visualização</h3>";

    selecionadas.forEach((q,i)=>{

        const div = document.createElement("div");
        div.className = "preview-questao";

        div.innerHTML = `
            <strong>${i+1}) ${q.ENUNCIADO}</strong>

            <div>A) ${q.ALT_A}</div>
            <div>B) ${q.ALT_B}</div>
            <div>C) ${q.ALT_C}</div>
            <div>D) ${q.ALT_D}</div>

            <label>Peso:
                <input type="number" class="peso"
                       value="1" step="0.1" min="0.1" max="10">
            </label>
        `;

        preview.appendChild(div);
    });
}


// ================= GERAR =================
function gerarProva(){

    const ids =
        [...document.querySelectorAll(".chkQuestao:checked")]
        .map(el=>el.value);

    if(ids.length === 0){
        alert("Selecione ao menos uma questão");
        return;
    }

    const pesos =
        [...document.querySelectorAll(".peso")]
        .map(el=>parseFloat(el.value));

    const questoes =
        banco.filter(q => ids.includes(q.ID));

    const prova = questoes.map((q,i)=>({
        ...q,
        PESO: pesos[i] || 1
    }));

    const turmas =
        [...document.querySelectorAll(".chkTurma:checked")]
        .map(el=>el.value);

    localStorage.setItem("provaGerada", JSON.stringify({
        questoes: prova,
        turmas: turmas
    }));

    alert("Prova pronta. Próximo passo: preview.");
}


// ================= AUX =================
function preencherSelect(id, lista){

    const sel=document.getElementById(id);
    sel.innerHTML="<option value=''>Selecione</option>";

    lista.forEach(v=>{
        let op=document.createElement("option");
        op.value=v;
        op.textContent=v;
        sel.appendChild(op);
    });
}

async function carregarTurmas(){

    const token=localStorage.getItem("TOKEN");

    const linhas =
        await fetchProtegido(API+"?tipo=turmas&token="+token);

    if(!linhas) return;

    const div=document.getElementById("listaTurmas");
    div.innerHTML="";

    linhas.slice(1).forEach(l=>{

        const nome=l[2];

        const label=document.createElement("label");

        label.innerHTML=`
            <input type="checkbox"
                   value="${nome}"
                   class="chkTurma">
            <span>${nome}</span>
        `;

        div.appendChild(label);
    });
}

</script>

</body>
</html>
