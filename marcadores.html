<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner - Teste Marcadores</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  margin-top:10px;
  max-width:95vw;
  background:#000;
}
</style>
</head>

<body>

<h2>Teste de Reconhecimento de Marcadores</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">

<br>

<canvas id="canvas"></canvas>

<script>

function processar(img){

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

/* =========================
PEGAR PIXELS
========================= */

let imgData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imgData.data

/* =========================
CONVERTER PARA CINZA
========================= */

let gray = []

for(let i=0;i<data.length;i+=4){

  let g = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11
  gray.push(g)
}

/* =========================
NORMALIZAÇÃO DE ILUMINAÇÃO
(remove sombras)
========================= */

let media = gray.reduce((a,b)=>a+b,0) / gray.length

for(let i=0;i<gray.length;i++){

  // puxa tudo para média
  gray[i] = gray[i] * (128 / media)
}

/* =========================
THRESHOLD ADAPTATIVO SIMPLES
========================= */

let resultado = new Uint8ClampedArray(data.length)

for(let i=0;i<gray.length;i++){

  let v = gray[i]

  // threshold mais inteligente
  const THRESHOLD = 112

let cor = v < THRESHOLD ? 0 : 255

  let idx = i*4

  resultado[idx] = resultado[idx+1] = resultado[idx+2] = cor
  resultado[idx+3] = 255
}

let novaImagem = new ImageData(resultado, canvas.width)

ctx.putImageData(novaImagem,0,0)

/* =========================
DETECTAR MARCADORES
========================= */

detectarMarcadores(canvas, ctx)

}

/* ========================= */

function detectarMarcadores(canvas, ctx){

let imgData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imgData.data

let blocos = []

for(let y=0; y<canvas.height; y+=6){
  for(let x=0; x<canvas.width; x+=6){

    let i = (y * canvas.width + x) * 4

    if(data[i] === 0){

      let largura = 0
      let altura = 0

      while(x+largura < canvas.width){
        let idx = (y * canvas.width + (x+largura)) * 4
        if(data[idx] !== 0) break
        largura++
      }

      while(y+altura < canvas.height){
        let idx = ((y+altura) * canvas.width + x) * 4
        if(data[idx] !== 0) break
        altura++
      }

      if(largura > 25 && altura > 25 && Math.abs(largura-altura) < 10){
        blocos.push({x,y,largura,altura})
      }
    }
  }
}

/* pegar os 4 maiores */

blocos.sort((a,b)=> (b.largura*b.altura) - (a.largura*a.altura))

let marcadores = blocos.slice(0,4)

/* desenhar */

ctx.strokeStyle = "red"
ctx.lineWidth = 4

marcadores.forEach(m => {
  ctx.strokeRect(m.x, m.y, m.largura, m.altura)
})

console.log("Marcadores:", marcadores)

}

</script>

</body>
</html>
