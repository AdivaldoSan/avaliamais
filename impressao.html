/* ================= CONFIG LAB (INALTERADO) ================= */

const config = {
  qrOffsetX: 166,
  qrOffsetY: -29,
  gabaritoOffsetX: 189,
  gabaritoOffsetY: 0,
  marcadorOffsetX: 343,
  marcadorOffsetY: -4,
  dy: 35,
  topoLetras: -24
}

const qrSize = 160

/* ================= GERAÇÃO DO CANVAS REAL ================= */

function gerarCanvasReal(canvas, q, qrData){

  //const q = 10

  const ctx = canvas.getContext("2d")
  ctx.translate(-100, 0)

  canvas.width = 900
  canvas.height = 300 + config.dy*q

  ctx.fillStyle="white"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  let inicioX = 400 + config.gabaritoOffsetX
  let inicioY = 200 + config.gabaritoOffsetY

  let dx = 40
  let raio = 8

  ctx.fillStyle="black"
  ctx.font="12px Arial"
  ctx.textAlign="center"
  ctx.textBaseline="middle"

  let letras=["A","B","C","D"]

  for(let c=0;c<4;c++){
    let x = inicioX + c*dx
    ctx.fillText(letras[c], x, inicioY + config.topoLetras)
  }

  for(let i=0;i<q;i++){

    let y = inicioY + i*config.dy

    ctx.textAlign="right"
    ctx.fillText((i+1)+"   ", inicioX-10, y+2)

    ctx.textAlign="center"

    for(let c=0;c<4;c++){
      let x = inicioX + c*dx

      ctx.beginPath()
      ctx.setLineDash([2,2])
      ctx.arc(x,y,raio,0,Math.PI*2)
      ctx.stroke()
      ctx.setLineDash([])
    }
  }

  /* MARCADORES */

  let marcador = 30

  const TLx = 160 + config.marcadorOffsetX
  const TRx = TLx + 250

  ctx.fillRect(TLx, 90 + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, 90 + config.marcadorOffsetY, marcador, marcador)

  let baseY = inicioY + config.dy*q + 40

  ctx.fillRect(TLx, baseY + config.marcadorOffsetY, marcador, marcador)
  ctx.fillRect(TRx, baseY + config.marcadorOffsetY, marcador, marcador)

  /* QR */

  const qrDiv = document.createElement("div")

new QRCode(qrDiv,{
  text: qrData,
  width: qrSize,
  height: qrSize
})

function renderQR(){

  const qrCanvas = qrDiv.querySelector("canvas")

  if(!qrCanvas){
    requestAnimationFrame(renderQR)
    return
  }

  const img = new Image()
  img.src = qrCanvas.toDataURL()

  img.onload = ()=>{

    const topo = inicioY + config.topoLetras - 20
    const base = inicioY + config.dy*q + 60
    const centro = (topo + base)/2

    ctx.drawImage(
      img,
      config.qrOffsetX,
      centro - qrSize/2 + config.qrOffsetY,
      qrSize,
      qrSize
    )
  }
}

renderQR()
}
	
function gerarImagemGabarito(imgEl, q, qrData){

  const canvas = document.createElement("canvas")

  // reutiliza sua função atual
  gerarCanvasReal(canvas, q, qrData)

  // 🔥 espera o QR desenhar
  setTimeout(() => {
    imgEl.src = canvas.toDataURL("image/png")
  }, 500)
}

	
//========Gerar Versoes=======
function gerarVersoes(questoes, qtdVersoes = 4){

  const versoes = [];

  for(let v = 1; v <= qtdVersoes; v++){

    // 🔀 embaralha ordem das questões
    const questoesEmbaralhadas = [...questoes]
      .sort(() => Math.random() - 0.5);

    const questoesProcessadas = [];

    questoesEmbaralhadas.forEach(q => {

      const alternativas = [
        { letra: "A", texto: q.ALT_A },
        { letra: "B", texto: q.ALT_B },
        { letra: "C", texto: q.ALT_C },
        { letra: "D", texto: q.ALT_D }
      ];

      // identifica correta original
      const corretaOriginal = String(q.GABARITO).trim().toUpperCase();

      // marca correta
      alternativas.forEach(alt => {
        alt.correta = (alt.letra === corretaOriginal);
      });

      // 🔀 embaralha alternativas
      const embaralhadas = [...alternativas]
        .sort(() => Math.random() - 0.5);

      // redefine letras (A,B,C,D)
      const letras = ["A","B","C","D"];

      embaralhadas.forEach((alt, i) => {
        alt.novaLetra = letras[i];
      });

      // encontra nova correta
      const novaCorreta = embaralhadas.find(a => a.correta).novaLetra;

      questoesProcessadas.push({
        ID: q.ID,
        ENUNCIADO: q.ENUNCIADO,
        IMAGEM: q.IMAGEM,
        PESO: q.PESO,

        alternativas: embaralhadas,
        resposta: novaCorreta
      });

    });

    // monta gabarito da versão
    const gabarito = questoesProcessadas
      .map(q => q.resposta)
      .join("");

    versoes.push({
      v,
      questoes: questoesProcessadas,
      gabarito
    });
  }

  return versoes;
}

/*======Medir Questao======*/

/*================PREPARAR QUESTOES====================*/
async function prepararQuestoesParaLayout(questoes, larguraColuna){

  const resultado = []

  for(const q of questoes){

    const temp = document.createElement("div")

    temp.style.position = "absolute"
    temp.style.visibility = "hidden"
    temp.style.width = larguraColuna + "px"

    const bloco = criarQuestaoHTML(q, 0)

    temp.appendChild(bloco)
    document.body.appendChild(temp)

    // 🔥 esperar imagens (CRÍTICO)
    const imgs = temp.querySelectorAll("img")

    await Promise.all([...imgs].map(img => {
      return new Promise(res => {
        if(img.complete) res()
        else img.onload = res
      })
    }))

    const altura = temp.offsetHeight

    document.body.removeChild(temp)

    resultado.push({
      ...q,
      altura
    })
  }

  return resultado
}
	
/*==========MOTOR DE DISTRIBUIÇÃO DE QUESTOES==========*/
function distribuirQuestoes(pagina, questoes, folhas){

  let colEsq = pagina.querySelector(".col-esq")
  let colDir = pagina.querySelector(".col-dir")

  let alturaEsq = 0
  let alturaDir = 0

  const areaQuestoes = pagina.querySelector(".questoes")

  // 🔥 FORÇA RENDER
  pagina.offsetHeight

  // ================= CÁLCULO ÁREA ÚTIL =================
  const cabecalho = pagina.querySelector(".cabecalho")
  const blocoOtico = pagina.querySelector(".bloco-otico")
  const instrucoes = pagina.querySelector(".instrucoes")
  const linhaDivisoria = pagina.querySelector(".linha-divisoria")

  let alturaOcupada = 0

  if(cabecalho) alturaOcupada += cabecalho.offsetHeight
  if(blocoOtico) alturaOcupada += blocoOtico.offsetHeight
  if(linhaDivisoria) alturaOcupada += linhaDivisoria.offsetHeight
  if(instrucoes) alturaOcupada += instrucoes.offsetHeight

  const margemInferior = 50

  const estilo = getComputedStyle(pagina)
  const paddingTop = parseFloat(estilo.paddingTop)
  const paddingBottom = parseFloat(estilo.paddingBottom)

  const alturaPagina = pagina.clientHeight - paddingTop - paddingBottom
  const alturaDisponivel = alturaPagina - alturaOcupada - margemInferior

  // 🔥 TRAVA VISUAL
  areaQuestoes.style.height = alturaDisponivel + "px"
  areaQuestoes.style.overflow = "hidden"

  let limite = alturaDisponivel

  console.log("Área disponível:", limite)

  // ================= DISTRIBUIÇÃO =================
  questoes.forEach((q, index)=>{

    const altura = q.altura + 12

    // ===== TENTA ESQUERDA =====
    if(alturaEsq + altura <= limite){

      const bloco = criarQuestaoHTML(q, index)
      colEsq.appendChild(bloco)
      alturaEsq += altura
      return
    }

    // ===== TENTA DIREITA =====
    if(alturaDir + altura <= limite){

      const bloco = criarQuestaoHTML(q, index)
      colDir.appendChild(bloco)
      alturaDir += altura
      return
    }

    // ===== NOVA PÁGINA =====
    const nova = criarPaginaContinua(pagina.dataset.folha)
    folhas.appendChild(nova)

    nova.offsetHeight

    colEsq = nova.querySelector(".col-esq")
    colDir = nova.querySelector(".col-dir")

    const areaNova = nova.querySelector(".questoes")

    // 🔥 cálculo REAL da nova página
    const rectPagina = nova.getBoundingClientRect()
    const rectQuestoes = areaNova.getBoundingClientRect()

    const topoReal = rectQuestoes.top - rectPagina.top
    const margemInferiorNova = 30

    const alturaNova = nova.clientHeight - topoReal - margemInferiorNova

    areaNova.style.height = alturaNova + "px"
    areaNova.style.overflow = "hidden"

    limite = alturaNova

    alturaEsq = 0
    alturaDir = 0

    // 🔥 INSERE NA NOVA PÁGINA
    const bloco = criarQuestaoHTML(q, index)
    colEsq.appendChild(bloco)
    alturaEsq += altura
  })
}

/*==============================================*/
function esperarRenderCompleto(pagina){
  return new Promise(resolve => {

    const img = pagina.querySelector(".imgGabarito")

    function check(){
      const bloco = pagina.querySelector(".bloco-otico")

      if(img && img.complete && bloco.offsetHeight > 100){
        resolve()
      }else{
        requestAnimationFrame(check)
      }
    }

    check()
  })
}

/*==================================================*/
function esperarImagem(img){
  return new Promise(resolve => {
    if(img.complete){
      resolve()
    }else{
      img.onload = () => resolve()
    }
  })
}
/* ================= GERAR PREVIEW ================= */
async function gerarPreview(){

  const msgBox = document.getElementById("msgErro")

  msgBox.style.display = "none"
  msgBox.innerHTML = ""

  const nomeProva = document.getElementById("nomeProva")
  const escolaInput = document.getElementById("escola")
  const qtdInput = document.getElementById("qtd")

  let erros = []

  if(!nomeProva.value.trim()){
    erros.push("Nome da prova é obrigatório")
  }

  if(!escolaInput.value.trim()){
    erros.push("Escola é obrigatória")
  }

  let qtd = parseInt(qtdInput.value)

  if(isNaN(qtd) || qtd < 1){
    qtd = 1
  }

  if(qtd > 100){
    qtd = 100
  }

  qtdInput.value = qtd

  if(erros.length > 0){
    msgBox.innerHTML = erros.join("<br>")
    msgBox.style.display = "block"
    return
  }

  const escola = escolaInput.value
  const disciplina = document.getElementById("disciplina").value
  const turma = document.getElementById("turmaSelect").value

  // 🔥 ID fixo
  if(!prova.id){
    prova.id = "PRV_" + Date.now()
  }

  prova.nome = nomeProva.value

  // 🔥 mapa de turmas
  if(!prova.mapaTurmas){
    const turmasOrdenadas = [...prova.turmas].sort()
    prova.mapaTurmas = {}

    turmasOrdenadas.forEach((t, i)=>{
      prova.mapaTurmas[t] = i + 1
    })
  }

  const turmaCodigo = prova.mapaTurmas[turma]

  // 🔥 versões
  prova.versoes = gerarVersoes(prova.questoes, 4)

  const extrasInput = document.getElementById("extras")
  let extras = parseInt(extrasInput.value)

  if(isNaN(extras) || extras < 0){
    extras = 0
  }

  if(extras > 5){
    extras = 5
  }

  extrasInput.value = extras

  const total = qtd + extras

  const folhas = document.getElementById("folhas")
  folhas.innerHTML = ""

  const textoInstrucoes = document.getElementById("instrucoes").value.trim()

  let instrucoesHTML = ""

  if(textoInstrucoes){
    const linhas = textoInstrucoes.split("\n").filter(l => l.trim() !== "")

    instrucoesHTML = `
      <div class="instrucoes">
        <strong>Instruções:</strong>
        ${linhas.map(l => `<div>${l}</div>`).join("")}
      </div>
      <div class="linha-divisoria"></div>
    `
  }

  // ================= LOOP DAS PROVAS =================
  for(let i=1;i<=total;i++){

    const versaoAtual = prova.versoes[(i-1) % prova.versoes.length]
    const questoesVersao = versaoAtual.questoes

    const pagina = criarPaginaCompleta(
      escola,
      disciplina,
      turma,
      i,
      instrucoesHTML
    )

    folhas.appendChild(pagina)

    // 🔥 QR
    const img = pagina.querySelector(".imgGabarito")
    const qrData = `ID=${prova.id}|T=${turmaCodigo}|V=${versaoAtual.v}|F=${i}`

    gerarImagemGabarito(img, questoesVersao.length, qrData)

    // 🔥 espera layout real
    await esperarRenderCompleto(pagina)

    pagina.offsetHeight

    // 🔥 largura real
    const larguraColuna = pagina.querySelector(".col-esq").clientWidth

    // 🔥 mede questões
    const questoesComAltura = await prepararQuestoesParaLayout(
      questoesVersao,
      larguraColuna
    )

    // 🔥 distribuição
    distribuirQuestoes(pagina, questoesComAltura, folhas)

    // ================= PAGINAÇÃO CORRETA =================
    const paginasDaFolha = Array.from(folhas.children)
      .filter(p => p.dataset.folha == i)

    const totalPaginas = paginasDaFolha.length

    paginasDaFolha.forEach((pag, index) => {

      const idEl = pag.querySelector(".id-prova")
      const pagEl = pag.querySelector(".num-pagina")

      if(idEl){
        idEl.textContent = `${prova.id}.${i}`
      }

      if(pagEl){
        pagEl.textContent = `Página ${index + 1} de ${totalPaginas}`
      }
    })
  }

  localStorage.setItem("provaGerada", JSON.stringify(prova))
  document.getElementById("btnPDF").style.display = "block"
}

  /*=====Criar Questoes no  HTML =====*/
function criarQuestaoHTML(q, i){

  const div = document.createElement("div")
  div.className = "questao"

  const temImagem = q.IMAGEM && q.IMAGEM.trim() !== ""

  div.innerHTML = `
    <div class="enunciado">
      <strong>Q${i+1} - Peso ${Number(q.PESO || 1).toFixed(1)}</strong> - ${q.ENUNCIADO}
    </div>

    ${temImagem ? `
      <div class="img-container">
        <img src="${q.IMAGEM}">
      </div>
    ` : ""}

    <div class="alternativas">
      ${q.alternativas.map(a => `
        <div>${a.novaLetra}) ${a.texto}</div>
      `).join("")}
    </div>
  `

  return div
}	

/* ===== RESIZE IMAGEM ===== */

function ativarResize(){

  document.querySelectorAll(".resizer").forEach(resizer => {

    const img = resizer.previousElementSibling

    let startX, startWidth

    // ===== MOUSE =====
    resizer.onmousedown = (e)=>{
      startX = e.clientX
      startWidth = img.offsetWidth

      document.onmousemove = (e)=>{
        let newWidth = startWidth + (e.clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.onmouseup = ()=>{
        document.onmousemove = null
      }
    }

    // ===== TOUCH (CELULAR) =====
    resizer.ontouchstart = (e)=>{
      startX = e.touches[0].clientX
      startWidth = img.offsetWidth

      document.ontouchmove = (e)=>{
        let newWidth = startWidth + (e.touches[0].clientX - startX)
        if(newWidth > 80 && newWidth < 400){
          img.style.width = newWidth + "px"
        }
      }

      document.ontouchend = ()=>{
        document.ontouchmove = null
      }
    }

  })
}
