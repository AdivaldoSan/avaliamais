<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Profissional</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;

video, canvas{
  width:95vw;
  max-width:500px;

  padding:10px;
  margin:5px;

<body>

<h2>Scanner de Gabarito</h2>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Aguardando...</div>

<div id="botoes" style="display:none;">
  <button onclick="confirmar()">✔ Confirmar</button>
  <button onclick="refazer()">❌ Refazer</button>
</div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let estado = "AO_VIVO" // AO_VIVO | CAPTURADO

let ultimoFrame = null

/* =========================
INICIAR CAMERA
========================= */

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  video.srcObject = stream
  loop()
})

/* =========================
LOOP PRINCIPAL
========================= */

let framesEstaveis = 0
let ultimoCentro = null

function loop(){

  if(estado === "AO_VIVO"){

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    ctx.drawImage(video,0,0)

    let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

    let marcadores = detectarMarcadores(frame)

    if(marcadores){

      let centro = centroMedio(marcadores)

      if(ultimoCentro){
        let dist = Math.hypot(
          centro.x - ultimoCentro.x,
          centro.y - ultimoCentro.y
        )

        if(dist < 2){
          framesEstaveis++
        }else{
          framesEstaveis = 0
        }
      }

      ultimoCentro = centro

      if(framesEstaveis > 8){
        capturar(frame)
        return
      }

      document.getElementById("status").innerText = "🟡 Estabilizando..."

    }else{
      document.getElementById("status").innerText = "🔴 Ajuste o enquadramento"
    }
  }

  requestAnimationFrame(loop)
}

/* =========================
CAPTURA
========================= */

function capturar(frame){

  estado = "CAPTURADO"

  ultimoFrame = frame

  // processa usando seu algoritmo
  processarImagem(frame)

  document.getElementById("status").innerText = "🟢 Conferir leitura"
  document.getElementById("botoes").style.display = "block"
}

/* =========================
CONFIRMAR / REFAZER
========================= */

function confirmar(){
  alert("Leitura confirmada")
  // aqui você salva / envia / integra QR
}

function refazer(){
  estado = "AO_VIVO"
  framesEstaveis = 0
  document.getElementById("botoes").style.display = "none"
}

/* =========================
FUNÇÕES BASE (SIMPLIFICADAS)
========================= */

  return true // placeholder
}

  return {x:200,y:200}
}

}

</script>

</body>
</html>
