<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:95vw;
  max-width:650px;
  margin-top:10px;
  background:#000;
}

button{
  padding:20px 30px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:8px;
}

#status{
  font-size:28px;
  margin-top:10px;
}

#resultado{
  margin-top:10px;
  font-size:18px;
  color:#00ffcc;
}
</style>
</head>

<body>

<h2>Scanner Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando...</div>
<div id="resultado"></div>

<button onclick="refazer()">🔄 Refazer</button>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let rodando = true

// ================= CAMERA =================
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:{ ideal:"environment" } }
})
.then(stream=>{
  video.srcObject = stream
  video.onloadedmetadata = ()=>{
    video.play()
    loop()
  }
})
.catch(err=>{
  status.innerText = "Erro câmera"
})

// ================= LOOP =================
function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let src = cv.imread(canvas)

  let marcadores = detectarMarcadores(src)

  if(marcadores){

    document.getElementById("status").innerText = "🟡 Detectado"

    let warp = aplicarWarp(src, marcadores)

    processar(warp)

    rodando = false
    return
  }

  document.getElementById("status").innerText = "🔴 Aguardando marcadores"

  src.delete()

  requestAnimationFrame(loop)
}

// ================= DETECTAR MARCADORES =================
function detectarMarcadores(src){

  let gray = new cv.Mat()
  let thresh = new cv.Mat()

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)
  cv.threshold(gray, thresh, 100,255, cv.THRESH_BINARY_INV)

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(thresh, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let candidatos = []

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)
    let rect = cv.boundingRect(cnt)

    let area = rect.width * rect.height
    let ratio = rect.width / rect.height

    if(area > 2000 && ratio > 0.8 && ratio < 1.2){
      candidatos.push(rect)
    }
  }

  if(candidatos.length < 4){
    gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete()
    return null
  }

  candidatos.sort((a,b)=>b.width*b.height - a.width*a.height)

  let m = candidatos.slice(0,4)

  gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete()

  return m
}

// ================= WARP =================
function aplicarWarp(src, m){

  m.sort((a,b)=>a.y - b.y)

  let top = m.slice(0,2)
  let bottom = m.slice(2,4)

  top.sort((a,b)=>a.x - b.x)
  bottom.sort((a,b)=>a.x - b.x)

  let TL = top[0]
  let TR = top[1]
  let BL = bottom[0]
  let BR = bottom[1]

  let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    TL.x,TL.y,
    TR.x+TR.width,TR.y,
    BL.x,BL.y+BL.height,
    BR.x+BR.width,BR.y+BR.height
  ])

  let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0,
    800,0,
    0,1200,
    800,1200
  ])

  let M = cv.getPerspectiveTransform(srcTri, dstTri)

  let dst = new cv.Mat()
  cv.warpPerspective(src, dst, M, new cv.Size(800,1200))

  srcTri.delete(); dstTri.delete(); M.delete()

  return dst
}

// ================= DETECTAR BOLHAS =================
function detectarBolhas(mat){

  let gray = new cv.Mat()
  let blur = new cv.Mat()
  let thresh = new cv.Mat()

  cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY)
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0)

  cv.adaptiveThreshold(
    blur, thresh, 255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11, 2
  )

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(thresh, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let bolhas = []

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)
    let area = cv.contourArea(cnt)

    if(area < 100 || area > 2000) continue

    let rect = cv.boundingRect(cnt)
    let ratio = rect.width / rect.height

    if(ratio < 0.7 || ratio > 1.3) continue

    bolhas.push({
      x: rect.x + rect.width/2,
      y: rect.y + rect.height/2,
      w: rect.width,
      h: rect.height
    })
  }

  gray.delete(); blur.delete(); thresh.delete()
  contours.delete(); hierarchy.delete()

  return bolhas
}

// ================= INTENSIDADE =================
function intensidade(mat, b){

  let margem = 0.2

  let x = Math.floor(b.x - b.w/2 + b.w*margem)
  let y = Math.floor(b.y - b.h/2 + b.h*margem)
  let w = Math.floor(b.w*(1-2*margem))
  let h = Math.floor(b.h*(1-2*margem))

  let roi = mat.roi(new cv.Rect(x,y,w,h))

  let gray = new cv.Mat()
  cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY)

  let bin = new cv.Mat()
  cv.threshold(gray, bin, 0,255,
    cv.THRESH_BINARY_INV + cv.THRESH_OTSU)

  let total = w*h
  let pretos = cv.countNonZero(bin)

  gray.delete(); bin.delete(); roi.delete()

  return pretos / total
}

// ================= PROCESSAR =================
function processar(mat){

  cv.imshow(canvas, mat)

  let bolhas = detectarBolhas(mat)

  bolhas.sort((a,b)=>a.y - b.y)

  let linhas = []
  let tol = 20

  bolhas.forEach(b=>{
    let found = false

    for(let l of linhas){
      if(Math.abs(l[0].y - b.y) < tol){
        l.push(b)
        found = true
        break
      }
    }

    if(!found) linhas.push([b])
  })

  linhas.forEach(l=>l.sort((a,b)=>a.x - b.x))

  let respostas = []

  linhas.forEach((linha,i)=>{

    let melhor = -1
    let maior = 0

    linha.forEach((b,j)=>{
      let score = intensidade(mat,b)

      if(score > maior){
        maior = score
        melhor = j
      }
    })

    if(maior < 0.15){
      respostas.push("-")
    }else{
      respostas.push(["A","B","C","D"][melhor])
    }

    // desenhar
    linha.forEach((b,j)=>{
      ctx.fillStyle = (j===melhor && maior>=0.15) ? "lime" : "red"
      ctx.fillRect(b.x-4, b.y-4, 8, 8)
    })

  })

  document.getElementById("status").innerText = "🟢 Leitura concluída"
  document.getElementById("resultado").innerText =
    respostas.join(" ")
}

// ================= RESET =================
function refazer(){
  rodando = true
  document.getElementById("status").innerText = "🔴 Reiniciando..."
  document.getElementById("resultado").innerText = ""
  loop()
}

</script>

</body>
</html>
