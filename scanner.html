<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OMR Scanner - Camera</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

video, canvas{
  max-width:95vw;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner OMR - Camera</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="capturar()">Capturar Frame</button>

<br>

<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

/* =========================
ABRIR CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
})

/* =========================
CAPTURAR FRAME
========================= */

function capturar(){

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

processar()

}

/* =========================
PROCESSAR IMAGEM
========================= */

function processar(){

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

/* THRESHOLD FIXO (SEU) */

const THRESHOLD = 60

for(let i=0;i<data.length;i+=4){

  let brilho = (data[i]+data[i+1]+data[i+2])/3

  let cor = brilho < THRESHOLD ? 0 : 255

  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

detectar(frame)

}

/* =========================
DETECTAR BOLHAS (SEU ALGORITMO)
========================= */

function detectar(frame){

let largura=frame.width
let altura=frame.height

let pontos=[]

for(let y=0;y<altura;y+=4){
for(let x=0;x<largura;x+=4){

let idx=(y*largura+x)*4

if(frame.data[idx]==0){
pontos.push({x,y})
}

}
}

let grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break
}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* FILTRO DE ÁREA (SEUS PARÂMETROS) */

const area_min = 20
const area_max = 800

let bolhas = grupos.filter(g=>{

  if(g.count < area_min || g.count > area_max) return false

  // estimativa de "raio"
  let raio = Math.sqrt(g.count)

  // rejeitar objetos grandes (laterais / manchas)
  if(raio > 25) return false

  // densidade (evita ruído espalhado)
  let densidade = g.count / (raio * raio)

  if(densidade < 0.3) return false

  return true
})

/* DESENHAR */

ctx.fillStyle="red"

bolhas.forEach(b=>{
  ctx.beginPath()
  ctx.arc(b.cx,b.cy,8,0,Math.PI*2)
  ctx.fill()
})

console.log("Bolhas:", bolhas)

}

</script>

</body>
</html>
