<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Avalia+</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#ui{
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;   /* 🔥 igual ao areaUI */
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui"></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

let modo = "QR"
let capturado = false

let dadosQR = null

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
}).then(stream=>{
  video.srcObject = stream
})

/* =========================
LOOP
========================= */

function loop(){

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

  if(!capturado){
    ctx.drawImage(video,0,0)
  }
      let frame = ctx.getImageData(0,0,canvas.width,canvas.height)

    if(modo === "QR"){
      lerQR(frame)
      desenharOverlayQR()
    }

    else if(modo === "OMR"){

  desenharOverlayOMR()

  if(!capturado){
    detectarMarcadores(frame)
  }
}
  }

  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)

/* =========================
QR
========================= */

function lerQR(frame){

  let code = jsQR(frame.data, frame.width, frame.height)

  if(code){

    let dados = parseQR(code.data)

    if(dados){
      dadosQR = dados
      modo = "OMR"
    }
  }
}

function parseQR(text){

  if(!text.startsWith("AVALIA+")) return null

  let obj = {}

  text.split("|").forEach(p=>{
    let [k,v] = p.split("=")
    if(v) obj[k] = v
  })

  return obj
}

/* =========================
OVERLAY QR
========================= */
function desenharOverlayQR(){

  let w = canvas.width
  let h = canvas.height

  ctx.fillStyle = "rgba(0,0,0,0.6)"
  ctx.fillRect(0,0,w,h)

  let size = Math.min(w,h) * 0.5

  let x = (w - size)/2
  let y = (h - size)/2

  ctx.clearRect(x,y,size,size)
}




/* =========================
OVERLAY OMR
========================= */
function desenharOverlayOMR(){

 let w = canvas.width
 let h = canvas.height

  // 🔥 reserva espaço inferior para botões (em px)
  let areaUI = 120
  
  // área útil real
  let hUtil = h - areaUI

  ctx.fillStyle = "rgba(0,0,0,0.5)"
  ctx.fillRect(0,0,w,h)

  if(!dadosQR) return

  let q = parseInt(dadosQR.Q)

  // 🔥 MODELO REAL (medido no gerador)
  let alturaReal = 150 + (35 * q)
  let larguraReal = 250

  let proporcao = alturaReal / larguraReal

  // 🔥 largura base na tela
  let margemTela = 0.75  // 🔥 ajuste fino aqui (0.7 a 0.85)

  let boxW = w * margemTela
  let boxH = boxW * proporcao

  // 🔥 ajuste para não estourar tela
  let limiteAltura = 0.75  // 🔥 margem segura (ajuste fino aqui)

  if(boxH > hUtil * limiteAltura){
    boxH = hUtil * limiteAltura
    boxW = boxH / proporcao
  }

  let x = (w - boxW)/2
  let y = (hUtil - boxH)/2

  // recorte (furo)
  ctx.clearRect(x,y,boxW,boxH)

  // 🔥 borda visual (ajuda no alinhamento)
  ctx.strokeStyle = "#00ff88"
  ctx.lineWidth = 3
  ctx.strokeRect(x,y,boxW,boxH)

  // 🔥 debug visual (remover depois)
  ctx.fillStyle = "white"
  ctx.font = "28px Arial"
  ctx.fillText("Q="+q, 30, 50)

  // salva área estimada
  window.areaOMR = {
    x, y, w: boxW, h: boxH
  }
}



/* =========================
DETECÇÃO DE MARCADORES
========================= */

function detectarMarcadores(frame){

  // versão simplificada só para validar captura

  let blobsPretos = 0

  for(let i=0;i<frame.data.length;i+=4){
    if(frame.data[i] < 50) blobsPretos++
  }

  // condição fake só para teste inicial
  if(blobsPretos > 5000){

    capturarFrame()
  }
}

/* =========================
CAPTURA
========================= */

function capturarFrame(){

  capturado = true
  modo = "OMR"

  document.getElementById("ui").innerHTML = `
    <button onclick="confirmar()">Confirmar</button>
    <button onclick="resetar()">Ler novamente</button>
  `
}

function confirmar(){
  alert("Aqui entra leitura OMR + correção")
}

function resetar(){
  modo = "QR"
  capturado = false
  dadosQR = null
  document.getElementById("ui").innerHTML = ""
}

</script>

</body>
</html>
