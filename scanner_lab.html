<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Profissional</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:95vw;
  max-width:500px;
  margin-top:10px;
  background:#000;
}

button{
  padding:10px;
  margin:5px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>Scanner de Gabarito</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">🔴 Iniciando câmera...</div>

<div id="botoes" style="display:none;">
  <button onclick="confirmar()">✔ Confirmar</button>
  <button onclick="refazer()">❌ Refazer</button>
</div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let rodando = true
let framesEstaveis = 0
let ultimoCentro = null

/* =========================
INICIAR CAMERA (TRASEIRA)
========================= */

navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: { ideal: "environment" }
  }
})
.then(stream=>{
  video.srcObject = stream
  loop()
})

/* =========================
LOOP PRINCIPAL
========================= */

function loop(){

  if(!rodando) return

  if(video.videoWidth === 0){
    requestAnimationFrame(loop)
    return
  }

  canvas.width = video.videoWidth
  canvas.height = video.videoHeight

  ctx.drawImage(video,0,0)

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let data = frame.data

  // 🔥 THRESHOLD AO VIVO
  for(let i=0;i<data.length;i+=4){
    let brilho = (data[i]+data[i+1]+data[i+2])/3
    let cor = brilho < 50 ? 0 : 255
    data[i]=data[i+1]=data[i+2]=cor
  }

  ctx.putImageData(frame,0,0)

  let marcadores = detectarMarcadores(frame)

  if(marcadores){

    let centro = centroMedio(marcadores)

    if(ultimoCentro){

      let dist = Math.hypot(
        centro.x - ultimoCentro.x,
        centro.y - ultimoCentro.y
      )

      if(dist < 2){
        framesEstaveis++
      }else{
        framesEstaveis = 0
      }

    }

    ultimoCentro = centro

    document.getElementById("status").innerText =
      `🟡 Estabilizando... (${framesEstaveis})`

    if(framesEstaveis > 8){
      capturar(frame)
      return
    }

  }else{
    document.getElementById("status").innerText =
      "🔴 Posicione o gabarito"
  }

  requestAnimationFrame(loop)
}

/* =========================
CAPTURA
========================= */

function capturar(frame){

  rodando = false

  ctx.putImageData(frame,0,0)

  processarImagem(frame)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"

  document.getElementById("botoes").style.display = "block"
}

/* =========================
BOTOES
========================= */

function confirmar(){
  alert("Leitura confirmada")
}

function refazer(){
  rodando = true
  framesEstaveis = 0
  ultimoCentro = null
  document.getElementById("botoes").style.display = "none"
  loop()
}

/* =========================
DETECÇÃO MARCADORES
========================= */

function detectarMarcadores(frame){

  let data = frame.data
  let w = canvas.width
  let h = canvas.height

  let visitado = new Uint8Array(w*h)
  let blobs = []

  function floodFill(x,y){

    let stack=[[x,y]]
    let minX=x,maxX=x,minY=y,maxY=y,area=0

    while(stack.length){

      let [px,py]=stack.pop()
      let idx=py*w+px

      if(visitado[idx]) continue
      visitado[idx]=1

      let i=idx*4
      if(data[i]!==0) continue

      area++

      minX=Math.min(minX,px)
      maxX=Math.max(maxX,px)
      minY=Math.min(minY,py)
      maxY=Math.max(maxY,py)

      for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        let nx=px+dx
        let ny=py+dy
        if(nx>=0&&ny>=0&&nx<w&&ny<h){
          stack.push([nx,ny])
        }
      }}
    }

    return {area,minX,maxX,minY,maxY}
  }

  for(let y=0;y<h;y+=4){
  for(let x=0;x<w;x+=4){

    let idx=y*w+x
    if(visitado[idx]) continue

    let i=idx*4

    if(data[i]===0){
      let b=floodFill(x,y)
      if(b.area>500) blobs.push(b)
    }

  }}

  blobs.sort((a,b)=>b.area-a.area)

  if(blobs.length < 4) return null

  let maiores = blobs.slice(0,4)

  return maiores.map(b=>({
    x:(b.minX+b.maxX)/2,
    y:(b.minY+b.maxY)/2
  }))
}

/* =========================
CENTRO MÉDIO
========================= */

function centroMedio(centros){

  let x=0,y=0

  centros.forEach(c=>{
    x+=c.x
    y+=c.y
  })

  return {
    x:x/centros.length,
    y:y/centros.length
  }
}

/* =========================
PROCESSAMENTO FINAL
========================= */

function processarImagem(frame){

  // 👉 aqui você cola seu algoritmo COMPLETO de leitura de bolhas
  console.log("Processando leitura...")

}

</script>

</body>
</html>
