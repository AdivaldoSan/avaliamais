<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OMR Scanner - Camera</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

video, canvas{
  max-width:95vw;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner OMR - Camera</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="capturar()">Capturar Frame</button>

<br>

<canvas id="canvas"></canvas>


<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

/* =========================
ABRIR CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
})

/* =========================
CAPTURAR FRAME
========================= */

function capturar(){

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

processar()

}

/* =========================
PROCESSAMENTO
========================= */

function processar(){

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

const THRESHOLD = 85

for(let i=0;i<data.length;i+=4){

  let brilho = (data[i]+data[i+1]+data[i+2])/3

  let cor = brilho < THRESHOLD ? 0 : 255

  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

detectar(frame)

}

/* =========================
DETECTAR
========================= */

function detectar(frame){

let largura = frame.width
let altura = frame.height

let pontos = []

/* varredura */

for(let y=0;y<altura;y+=2){
for(let x=0;x<largura;x+=2){

let idx = (y*largura+x)*4

if(frame.data[idx] === 0){
  pontos.push({x,y})
}

}
}

/* clusterização */

let grupos = []

pontos.forEach(p=>{

let achou = false

for(let g of grupos){

let dx = p.x - g.cx
let dy = p.y - g.cy

if(Math.sqrt(dx*dx+dy*dy) < 20){

g.x += p.x
g.y += p.y
g.count++

g.cx = g.x / g.count
g.cy = g.y / g.count

achou = true
break
}

}

if(!achou){

grupos.push({
x:p.x,
y:p.y,
cx:p.x,
cy:p.y,
count:1
})

}

})

/* =========================
SEPARAR MARCADORES E BOLHAS
========================= */

let marcadores = grupos
  .sort((a,b)=>b.count-a.count)
  .slice(0,4)

const area_min = 30
const area_max = 500

let bolhas = grupos.filter(g=>{
  return g.count > area_min && g.count < area_max
})

/* =========================
DESENHAR BOLHAS
========================= */

ctx.fillStyle = "red"

bolhas.forEach(b=>{
  ctx.beginPath()
  ctx.arc(b.cx,b.cy,8,0,Math.PI*2)
  ctx.fill()
})

/* =========================
CLASSIFICAR MARCADORES
========================= */

let centros = marcadores.map(m=>({
  x:m.cx,
  y:m.cy
}))

let TL, TR, BL, BR

centros.forEach(p=>{

if(p.x < largura/2 && p.y < altura/2) TL = p
if(p.x > largura/2 && p.y < altura/2) TR = p
if(p.x < largura/2 && p.y > altura/2) BL = p
if(p.x > largura/2 && p.y > altura/2) BR = p

})

if(!TL || !TR || !BL || !BR){
  console.log("Falha na classificação")
  return
}

/* =========================
DESENHAR MARCADORES
========================= */

ctx.fillStyle = "cyan"

[TL,TR,BL,BR].forEach(p=>{
  ctx.beginPath()
  ctx.arc(p.x,p.y,6,0,Math.PI*2)
  ctx.fill()
})

/* =========================
DESENHAR CONTORNO
========================= */

ctx.strokeStyle = "yellow"
ctx.lineWidth = 3

ctx.beginPath()
ctx.moveTo(TL.x, TL.y)
ctx.lineTo(TR.x, TR.y)
ctx.lineTo(BR.x, BR.y)
ctx.lineTo(BL.x, BL.y)
ctx.closePath()
ctx.stroke()

console.log("TL,TR,BL,BR:", TL, TR, BL, BR)

}

</script>
</body>
</html>
