<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avalia+ | Scanner</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>

<script src="./js/config.js"></script>
<script src="js/conexao.js"></script>
<script src="js/layout.js"></script>

<script>

function iniciarPagina(){

  criarLayout();

  const isMobile = window.innerWidth <= 900;

  // ============================
  // 🔴 DESKTOP (mantém simples e limpo)
  // ============================
  if(!isMobile){

    document.getElementById("conteudo").innerHTML = `
      <h2 style="margin-bottom:20px;">📷 Scanner Inteligente</h2>

      <div class="card" style="
        text-align:center;
        color:#eaeaea;
      ">

        <p style="
          font-size:18px;
          margin-bottom:15px;
          color:#ff5a5a;
          font-weight:bold;
        ">
          ⚠️ Funcionalidade exclusiva para celular
        </p>

        <p style="
          opacity:0.85;
          line-height:1.6;
          color:#ddd;
        ">
          O scanner utiliza a câmera do dispositivo para leitura automática
          de gabaritos.
        </p>

        <br>

        <p style="
          opacity:0.6;
          color:#aaa;
        ">
          Acesse esta página pelo seu smartphone para utilizar.
        </p>

      </div>
    `;

    return;
  }

  // ============================
  // 🟢 MOBILE (ajustado)
  // ============================
  document.getElementById("conteudo").innerHTML = `

    <h2 style="
      margin-bottom:15px;
      padding:0 10px;
    ">📷 Scanner Inteligente</h2>

    <div style="
      width:100%;
      max-width:500px;
      margin:0 auto;
      padding:18px 15px;
      background:#1a1a1a;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,0.5);
      color:#eaeaea;
    ">

      <div style="
        font-size:18px;
        font-weight:bold;
        margin-bottom:10px;
        color:#00ffcc;
        text-align:center;
      ">
        🚧 Em desenvolvimento
      </div>

      <p style="
        font-size:14px;
        line-height:1.5;
        opacity:0.9;
        text-align:center;
        margin-bottom:15px;
        color:#ddd;
      ">
        Este módulo permitirá leitura automática de gabaritos
        utilizando a câmera do celular.
      </p>

      <div style="
        background:#0f0f0f;
        border-radius:10px;
        padding:12px 14px;
        font-size:14px;
        line-height:1.6;
        color:#e0e0e0;
      ">
        ✔ Leitura via QR Code<br>
        ✔ Correção automática<br>
        ✔ Identificação de respostas<br>
        ✔ Integração com Avalia+<br>
        ✔ Uso em sala de aula
      </div>

      <div style="
        margin-top:15px;
        font-size:12px;
        opacity:0.6;
        text-align:center;
        color:#aaa;
      ">
        Em breve disponível.
      </div>

    </div>
  `;
}

window.onload = iniciarPagina;

</script>

</body>
</html>
