<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner OMR</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

video, canvas{
  max-width:95vw;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner OMR</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
})

/* =========================
LOOP CONTÍNUO
========================= */

function loop(){

if(video.videoWidth === 0){
  requestAnimationFrame(loop)
  return
}

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

processar()

requestAnimationFrame(loop)

}

video.onloadeddata = () => {
  loop()
}

/* =========================
PROCESSAMENTO
========================= */

function processar(){

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

const THRESHOLD = 85

for(let i=0;i<data.length;i+=4){

let brilho = (data[i]+data[i+1]+data[i+2])/3
let cor = brilho < THRESHOLD ? 0 : 255

data[i]=data[i+1]=data[i+2]=cor
}

detectar(frame)

}

/* =========================
DETECÇÃO
========================= */

function detectar(frame){

let largura = frame.width
let altura = frame.height

let pontos=[]

for(let y=0;y<altura;y+=3){
for(let x=0;x<largura;x+=3){

let i=(y*largura+x)*4

if(frame.data[i]===0){
pontos.push({x,y})
}

}
}

let grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break
}

}

if(!achou){
grupos.push({x:p.x,y:p.y,cx:p.x,cy:p.y,count:1})
}

})

/* =========================
MARCADORES (4 MAIORES)
========================= */

let marcadores = grupos
.sort((a,b)=>b.count-a.count)
.slice(0,4)

if(marcadores.length < 4) return

let centros = marcadores.map(m=>({x:m.cx,y:m.cy}))

/* =========================
CLASSIFICAÇÃO ROBUSTA
========================= */

centros.sort((a,b)=>a.y-b.y)

let top = centros.slice(0,2)
let bottom = centros.slice(2,4)

top.sort((a,b)=>a.x-b.x)
bottom.sort((a,b)=>a.x-b.x)

let TL = top[0]
let TR = top[1]
let BL = bottom[0]
let BR = bottom[1]

/* =========================
VALIDAÇÃO DE ALINHAMENTO
========================= */

let alinhado = Math.abs(TL.y - TR.y) < 15

/* =========================
GUIA VISUAL (SUA IDENTIDADE)
========================= */

let larguraTopo = TR.x - TL.x
let margem = larguraTopo * 0.15

// faixa dinâmica
ctx.fillStyle = alinhado 
  ? "rgba(0,255,0,0.15)" 
  : "rgba(255,0,0,0.15)"

ctx.fillRect(
  TL.x - margem,
  TL.y - 40,
  larguraTopo + margem*2,
  80
)

// linha central
ctx.strokeStyle = alinhado ? "lime" : "red"
ctx.lineWidth = 3

ctx.beginPath()
ctx.moveTo(TL.x, TL.y)
ctx.lineTo(TR.x, TR.y)
ctx.stroke()

/* =========================
CONTORNO DO GABARITO
========================= */

ctx.strokeStyle = "yellow"
ctx.lineWidth = 2

ctx.beginPath()
ctx.moveTo(TL.x, TL.y)
ctx.lineTo(TR.x, TR.y)
ctx.lineTo(BR.x, BR.y)
ctx.lineTo(BL.x, BL.y)
ctx.closePath()
ctx.stroke()

/* =========================
PONTOS (DEBUG)
========================= */

ctx.fillStyle = "cyan"

[TL,TR,BL,BR].forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fill()
})

}

</script>

</body>
</html>
