<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Gabarito</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  background:white;
  margin-top:10px;
  max-width:95vw;
}
</style>
</head>

<body>

<h2>Gerador de Gabarito</h2>

Questões:
<input id="qtd" type="number" value="10" min="1" max="30">

<br><br>

<button onclick="gerar()">Gerar</button>
<button onclick="window.print()">Imprimir</button>

<br>

<canvas id="canvas"></canvas>
<div id="qrTemp" style="display:none"></div>

<script>

/* =========================
CONFIG FIXA (DO LAB)
========================= */

const config = {
  qrOffsetX: 166,
  qrOffsetY: -29,
  gabaritoOffsetX: 189,
  gabaritoOffsetY: 0,
  marcadorOffsetX: 343,
  marcadorOffsetY: -4,
  dy: 35,
  topoLetras: -24
}

const qrSize = 140

/* ========================= */

function gerar(){

let q = parseInt(document.getElementById("qtd").value)

let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

canvas.width = 1300
canvas.height = 300 + config.dy*q

ctx.fillStyle="white"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* BASE */

let inicioX = 400 + config.gabaritoOffsetX
let inicioY = 200 + config.gabaritoOffsetY

let dx = 40
let raio = 8

/* =========================
LETRAS
========================= */

ctx.fillStyle="black"
ctx.font="12px Arial"
ctx.textAlign = "center"
ctx.textBaseline = "middle"

let letras = ["A","B","C","D"]

for(let c=0;c<4;c++){
  let x = inicioX + c*dx
  ctx.fillText(letras[c], x, inicioY + config.topoLetras)
}

/* =========================
QUESTÕES
========================= */

ctx.font="12px Arial"
ctx.textBaseline = "middle"

const ajusteNumeroY = 3
const espaco = 10

for(let i=0;i<q;i++){

  let y = inicioY + i*config.dy

  // números
  ctx.textAlign = "right"
  ctx.fillText((i+1)+espaco, inicioX - 10, y + ajusteNumeroY)

  // bolhas
  ctx.textAlign = "center"

  for(let c=0;c<4;c++){

    let x = inicioX + c*dx

    ctx.beginPath()
    ctx.setLineDash([2,2])
    ctx.lineWidth = 1
    ctx.strokeStyle = "#000"

    ctx.arc(x,y,raio,0,Math.PI*2)
    ctx.stroke()

    ctx.setLineDash([])
  }
}

/* =========================
MARCADORES
========================= */

let marcador = 30

const TLx = 160 + config.marcadorOffsetX
const TRx = TLx + 250

ctx.fillRect(TLx, 90 + config.marcadorOffsetY, marcador, marcador)
ctx.fillRect(TRx, 90 + config.marcadorOffsetY, marcador, marcador)

let baseY = inicioY + config.dy*q + 40

ctx.fillRect(TLx, baseY + config.marcadorOffsetY, marcador, marcador)
ctx.fillRect(TRx, baseY + config.marcadorOffsetY, marcador, marcador)

/* =========================
QR CODE
========================= */

let qrDiv = document.getElementById("qrTemp")
qrDiv.innerHTML=""

new QRCode(qrDiv,{
  text:"AVALIA+|Q="+q+"|ID="+Date.now(),
  width:qrSize,
  height:qrSize
})

let img = qrDiv.querySelector("img")

/* CENTRALIZAÇÃO */

const topo = inicioY + config.topoLetras - 20
const base = inicioY + config.dy*q + 60
const centro = (topo + base)/2

img.onload = () => {

  ctx.drawImage(
    img,
    config.qrOffsetX,
    centro - qrSize/2 + config.qrOffsetY,
    qrSize,
    qrSize
  )

}

}

/* ========================= */

gerar()

</script>

</body>
</html>
