<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Gabarito (Validação)</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:900px;
  max-width:95vw;
  margin-top:10px;
  background:#000;
}
</style>
</head>

<body>

<h2>Scanner de Gabarito</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">
<br><br>

Questões:
<input type="number" id="qtd" value="10" min="1" max="20">

<br><br>

<button onclick="processar()">Processar</button>

<canvas id="canvas"></canvas>
<div id="resultado" style="margin-top:10px;font-size:20px;"></div>

<script>

let img = null

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d",{willReadFrequently:true})

const THRESHOLD = 50
const colunas = 4

const esq = 0.22
const dir = 0.83

/* =========================
CALIBRAÇÃO
========================= */

const calibracao = [
  {q:1, topo:0.47, base:0.62},
  {q:5, topo:0.28, base:0.80},
  {q:8, topo:0.20, base:0.84},
  {q:10, topo:0.17, base:0.86},
  {q:15, topo:0.13, base:0.90}
]

function interpolar(q){

  if(q <= calibracao[0].q) return calibracao[0]
  if(q >= calibracao[calibracao.length-1].q) return calibracao[calibracao.length-1]

  for(let i=0;i<calibracao.length-1;i++){
    let a = calibracao[i]
    let b = calibracao[i+1]

    if(q >= a.q && q <= b.q){
      let t = (q - a.q)/(b.q - a.q)

      return {
        topo: a.topo + t*(b.topo - a.topo),
        base: a.base + t*(b.base - a.base)
      }
    }
  }
}

/* ========================= */

function carregarImagem(e){

  const file = e.target.files[0]
  if(!file) return

  img = new Image()

  img.onload = ()=>{
    canvas.width = img.width
    canvas.height = img.height
    ctx.drawImage(img,0,0)
  }

  img.src = URL.createObjectURL(file)
}

/* ========================= */

function processar(){

if(!img) return

ctx.drawImage(img,0,0)

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

/* =========================
THRESHOLD
========================= */

for(let i=0;i<data.length;i+=4){
  let brilho = (data[i]+data[i+1]+data[i+2])/3
  let cor = brilho < THRESHOLD ? 0 : 255
  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

/* =========================
FLOOD FILL
========================= */

let w=canvas.width,h=canvas.height
let visitado=new Uint8Array(w*h)
let blobs=[]

function flood(x,y){
  let stack=[[x,y]]
  let minX=x,maxX=x,minY=y,maxY=y,area=0

  while(stack.length){
    let [px,py]=stack.pop()
    let idx=py*w+px
    if(visitado[idx])continue
    visitado[idx]=1

    let i=idx*4
    if(frame.data[i]!==0)continue

    area++

    minX=Math.min(minX,px)
    maxX=Math.max(maxX,px)
    minY=Math.min(minY,py)
    maxY=Math.max(maxY,py)

    for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){
      let nx=px+dx, ny=py+dy
      if(nx>=0&&ny>=0&&nx<w&&ny<h){
        stack.push([nx,ny])
      }
    }}
  }

  return {area,minX,maxX,minY,maxY}
}

for(let y=0;y<h;y+=2){
for(let x=0;x<w;x+=2){

  let idx=y*w+x
  if(visitado[idx])continue

  let i=idx*4
  if(frame.data[i]===0){
    let b=flood(x,y)
    if(b.area>200) blobs.push(b)
  }

}}

/* =========================
MARCADORES
========================= */

let m = blobs.sort((a,b)=>b.area-a.area).slice(0,4)
if(m.length<4){
  alert("Marcadores não detectados")
  return
}

let c = m.map(b=>({
  x:(b.minX+b.maxX)/2,
  y:(b.minY+b.maxY)/2
}))

c.sort((a,b)=>a.y-b.y)

let top=c.slice(0,2).sort((a,b)=>a.x-b.x)
let bot=c.slice(2,4).sort((a,b)=>a.x-b.x)

let TL=top[0], TR=top[1], BL=bot[0], BR=bot[1]

/* =========================
CONFIG DINÂMICA
========================= */

let q = parseInt(document.getElementById("qtd").value)
let {topo, base} = interpolar(q)

let linhas = q

/* =========================
PERSPECTIVA
========================= */

function p(u,v){
  return {
    x:(1-u)*(1-v)*TL.x + u*(1-v)*TR.x + (1-u)*v*BL.x + u*v*BR.x,
    y:(1-u)*(1-v)*TL.y + u*(1-v)*TR.y + (1-u)*v*BL.y + u*v*BR.y
  }
}

/* =========================
LEITURA + OVERLAY
========================= */

let respostas = []
let letras = ["A","B","C","D"]

ctx.strokeStyle="lime"
ctx.lineWidth=2

for(let i=0;i<linhas;i++){

  let areas=[]

  for(let j=0;j<colunas;j++){

    let u = esq + (j+0.5)/colunas*(dir-esq)
    let v = topo + (i+0.5)/linhas*(base-topo)

    let pt = p(u,v)

    let raio=14
    let soma=0

    for(let dx=-raio;dx<=raio;dx++){
    for(let dy=-raio;dy<=raio;dy++){

      let x=Math.floor(pt.x+dx)
      let y=Math.floor(pt.y+dy)

      if(x<0||y<0||x>=canvas.width||y>=canvas.height) continue

      let idx=(y*canvas.width+x)*4

      if(frame.data[idx]===0) soma++

    }}

    areas.push(soma)
  }

  let max = Math.max(...areas)
  let segundo = [...areas].sort((a,b)=>b-a)[1]

  let resposta = -1

  if(max > segundo * 1.5){
    resposta = areas.indexOf(max)
  }

  respostas.push(resposta)

  // overlay
  if(resposta >= 0){

    let u = esq + (resposta+0.5)/colunas*(dir-esq)
    let v = topo + (i+0.5)/linhas*(base-topo)

    let pt = p(u,v)

    ctx.beginPath()
    ctx.arc(pt.x, pt.y, 20, 0, Math.PI*2)
    ctx.stroke()
    ctx.fillStyle="rgba(0,255,0,0.3)"
    ctx.fill()
  }
}

/* =========================
RESULTADO
========================= */

let final = respostas.map(r=> letras[r] || "-")

document.getElementById("resultado").innerText =
"Gabarito: " + final.join(" ")

}

</script>

</body>
</html>
