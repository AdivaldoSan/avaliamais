<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner OMR</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

video, canvas{
  max-width:95vw;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner OMR</h2>

<video id="video" autoplay playsinline></video>
  <br><br>
<button onclick="capturar()">Capturar</button>
<br>
<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

/* =========================
CAMERA
========================= */

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream
})

/* =========================
CAPTURA
========================= */

function capturar(){

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

processar()

}

/* =========================
PROCESSAMENTO
========================= */

function processar(){

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

const THRESHOLD = 65

for(let i=0;i<data.length;i+=4){

let brilho = (data[i]+data[i+1]+data[i+2])/3
let cor = brilho < THRESHOLD ? 0 : 255

data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

detectarMarcadores(frame)

}

/* =========================
DETECTAR MARCADORES
========================= */

function detectarMarcadores(frame){

let largura = frame.width
let altura = frame.height

let pontos=[]

for(let y=0;y<altura;y+=3){
for(let x=0;x<largura;x+=3){

let i=(y*largura+x)*4

if(frame.data[i]===0){
pontos.push({x,y})
}

}
}

let grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break
}

}

if(!achou){
grupos.push({x:p.x,y:p.y,cx:p.x,cy:p.y,count:1})
}

})

/* =========================
PEGAR MARCADORES (GRANDES)
========================= */

let marcadores = grupos
.filter(g=>g.count > 300)
.sort((a,b)=>b.count-a.count)
.slice(0,4)

if(marcadores.length < 4){
  console.log("Marcadores não encontrados")
  return
}

/* =========================
CLASSIFICAR
========================= */

let centros = marcadores.map(m=>({x:m.cx,y:m.cy}))

centros.sort((a,b)=>a.y-b.y)

let top = centros.slice(0,2)
let bottom = centros.slice(2,4)

top.sort((a,b)=>a.x-b.x)
bottom.sort((a,b)=>a.x-b.x)

let TL = top[0]
let TR = top[1]
let BL = bottom[0]
let BR = bottom[1]

/* =========================
DESENHAR CONTORNO
========================= */

ctx.strokeStyle = "yellow"
ctx.lineWidth = 3

ctx.beginPath()
ctx.moveTo(TL.x, TL.y)
ctx.lineTo(TR.x, TR.y)
ctx.lineTo(BR.x, BR.y)
ctx.lineTo(BL.x, BL.y)
ctx.closePath()
ctx.stroke()

/* =========================
DEFINIR ROI
========================= */

let margem = 20

let minX = Math.min(TL.x, BL.x) + margem
let maxX = Math.max(TR.x, BR.x) - margem

let minY = Math.min(TL.y, TR.y) + margem
let maxY = Math.max(BL.y, BR.y) - margem

/* desenhar ROI */

ctx.strokeStyle = "lime"
ctx.lineWidth = 2

ctx.strokeRect(minX, minY, maxX-minX, maxY-minY)

console.log("ROI:", {minX,maxX,minY,maxY})

}

</script>

</body>
</html>
