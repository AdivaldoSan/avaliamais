<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner Final Inteligente</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  width:100%;
  max-width:650px;
}
button{
  padding:12px 20px;
  margin:10px;
}
</style>
</head>

<body>

<h2>Scanner Inteligente</h2>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="status">Iniciando...</div>
<button onclick="refazer()">Refazer</button>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let pronto=false
let capturado=false
let framesOK=0

cv.onRuntimeInitialized=()=>{
  pronto=true
  iniciar()
}

function iniciar(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  }).then(stream=>{
    video.srcObject=stream
    video.onloadedmetadata=()=>{
      video.play()
      loop()
    }
  })
}

/* ========================= */
function loop(){

  if(!pronto || capturado){
    requestAnimationFrame(loop)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  let src=cv.imread(canvas)
  let gray=new cv.Mat()
  let bin=new cv.Mat()

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

  cv.adaptiveThreshold(
    gray,bin,255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11,2
  )

  let contours=new cv.MatVector()
  let hierarchy=new cv.Mat()

  cv.findContours(bin,contours,hierarchy,
    cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

  let quadrados=[]

  for(let i=0;i<contours.size();i++){

    let cnt=contours.get(i)
    let area=cv.contourArea(cnt)

    if(area<500) continue

    let peri=cv.arcLength(cnt,true)
    let approx=new cv.Mat()

    cv.approxPolyDP(cnt,approx,0.02*peri,true)

    if(approx.rows===4){
      let r=cv.boundingRect(approx)
      quadrados.push(r)
    }
  }

  quadrados.forEach(r=>{
    ctx.strokeStyle="yellow"
    ctx.strokeRect(r.x,r.y,r.width,r.height)
  })

  if(quadrados.length===4){
    framesOK++

    if(framesOK>6){
      capturarFrame(quadrados)
    }

  }else{
    framesOK=0
  }

  src.delete()
  gray.delete()
  bin.delete()
  contours.delete()
  hierarchy.delete()

  requestAnimationFrame(loop)
}

/* ========================= */
function capturarFrame(quadrados){

  capturado=true

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
  let src = cv.matFromImageData(frame)

  let p = ordenar(quadrados)

  let largura=600
  let altura=900

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    p.TL.x,p.TL.y,
    p.TR.x+p.TR.width,p.TR.y,
    p.BL.x,p.BL.y+p.BL.height,
    p.BR.x+p.BR.width,p.BR.y+p.BR.height
  ])

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0, largura,0, 0,altura, largura,altura
  ])

  let M=cv.getPerspectiveTransform(srcTri,dstTri)
  let dst=new cv.Mat()

  cv.warpPerspective(src,dst,M,new cv.Size(largura,altura))

  cv.imshow(canvas,dst)

  // 🔥 NOVO: DETECTAR BOLHAS
  detectarBolhas(dst)

  document.getElementById("status").innerText =
    "🟢 Conferir leitura"
}

/* ========================= */
function detectarBolhas(mat){

  let gray = new cv.Mat()
  let blur = new cv.Mat()
  let bin = new cv.Mat()

  cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY)
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0)

  cv.adaptiveThreshold(
    blur, bin, 255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    11, 2
  )

  let contours = new cv.MatVector()
  let hierarchy = new cv.Mat()

  cv.findContours(bin, contours, hierarchy,
    cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE)

  let bolhas = []

  for(let i=0;i<contours.size();i++){

    let cnt = contours.get(i)
    let area = cv.contourArea(cnt)

    if(area < 80 || area > 2000) continue

    let rect = cv.boundingRect(cnt)
    let ratio = rect.width / rect.height

    if(ratio < 0.7 || ratio > 1.3) continue

    bolhas.push({
      x: rect.x + rect.width/2,
      y: rect.y + rect.height/2,
      w: rect.width,
      h: rect.height
    })
  }

  // ===== AGRUPAR LINHAS =====
  bolhas.sort((a,b)=>a.y - b.y)

  let linhas = []
  let tol = 20

  bolhas.forEach(b=>{

    let achou = false

    for(let l of linhas){
      if(Math.abs(l[0].y - b.y) < tol){
        l.push(b)
        achou = true
        break
      }
    }

    if(!achou) linhas.push([b])
  })

  linhas.forEach(l=>l.sort((a,b)=>a.x - b.x))

  // ===== INTENSIDADE =====
  function intensidade(b){

    let margem = 0.25

    let x = Math.floor(b.x - b.w/2 + b.w*margem)
    let y = Math.floor(b.y - b.h/2 + b.h*margem)
    let w = Math.floor(b.w*(1-2*margem))
    let h = Math.floor(b.h*(1-2*margem))

    let roi = mat.roi(new cv.Rect(x,y,w,h))

    let g = new cv.Mat()
    cv.cvtColor(roi, g, cv.COLOR_RGBA2GRAY)

    let t = new cv.Mat()
    cv.threshold(g, t, 0,255,
      cv.THRESH_BINARY_INV + cv.THRESH_OTSU)

    let total = w*h
    let pretos = cv.countNonZero(t)

    g.delete()
    t.delete()
    roi.delete()

    return pretos / total
  }

  let respostas = []

  linhas.forEach((linha,i)=>{

  // calcula intensidade de cada bolha
  let dados = linha.map((b,j)=>({
    index: j,
    val: intensidade(b),
    b: b
  }))

  // ordena da mais forte pra mais fraca
  dados.sort((a,b)=>b.val - a.val)

  let melhor = dados[0]
  let segundo = dados[1]

  let resposta = "-"

  // validação mais robusta
  if(
    melhor.val >= 0.25 && 
    (melhor.val - segundo.val) >= 0.08
  ){
    resposta = ["A","B","C","D"][melhor.index]
  }

  respostas.push(resposta)

  // debug visual
  dados.forEach(d=>{
    ctx.fillStyle = (d.index === melhor.index && resposta !== "-")
      ? "lime"
      : "red"

    ctx.fillRect(d.b.x-4, d.b.y-4, 8, 8)
  })

})

  console.log("Respostas:", respostas.join(" "))

  gray.delete()
  blur.delete()
  bin.delete()
  contours.delete()
  hierarchy.delete()
}

/* ========================= */
function ordenar(q){

  q.sort((a,b)=>a.y-b.y)

  let top=q.slice(0,2)
  let bottom=q.slice(2,4)

  top.sort((a,b)=>a.x-b.x)
  bottom.sort((a,b)=>a.x-b.x)

  return {TL:top[0],TR:top[1],BL:bottom[0],BR:bottom[1]}
}

/* ========================= */
function refazer(){
  capturado=false
  framesOK=0
  document.getElementById("status").innerText = "Reiniciando..."
}

</script>

</body>
</html>
