<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAB Marcadores</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas{
  width:900px;
  max-width:95vw;
  margin-top:10px;
  background:#000;
}
</style>
</head>

<body>

<h2>LAB - Marcadores (Retângulo Forçado)</h2>

<input type="file" accept="image/*" onchange="carregarImagem(event)">

<br><br>

Threshold:
<input type="range" id="threshold" min="30" max="150" value="65">
<span id="tVal">65</span>

<br>

<button onclick="processar()">Processar</button>

<canvas id="canvas"></canvas>

<script>

let img = null

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const tSlider = document.getElementById("threshold")
const tVal = document.getElementById("tVal")

tSlider.oninput = () => tVal.innerText = tSlider.value

function carregarImagem(e){

  img = new Image()

  img.onload = () => {

    // mantém resolução real
    canvas.width = img.width
    canvas.height = img.height

    ctx.drawImage(img,0,0)
  }

  img.src = URL.createObjectURL(e.target.files[0])
}

/* ========================= */

function processar(){

if(!img) return alert("Carregue imagem")

ctx.drawImage(img,0,0)

let frame = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = frame.data

let THRESHOLD = parseInt(tSlider.value)

/* =========================
THRESHOLD
========================= */

for(let i=0;i<data.length;i+=4){

  let brilho = (data[i]+data[i+1]+data[i+2])/3
  let cor = brilho < THRESHOLD ? 0 : 255

  data[i]=data[i+1]=data[i+2]=cor
}

ctx.putImageData(frame,0,0)

/* =========================
DETECÇÃO
========================= */

let pontos=[]

for(let y=0;y<canvas.height;y+=2){
for(let x=0;x<canvas.width;x+=2){

let i=(y*canvas.width+x)*4

if(frame.data[i]===0){
pontos.push({x,y})
}

}
}

let grupos=[]

pontos.forEach(p=>{

let achou=false

for(let g of grupos){

let dx=p.x-g.cx
let dy=p.y-g.cy

if(Math.sqrt(dx*dx+dy*dy)<20){

g.x+=p.x
g.y+=p.y
g.count++

g.cx=g.x/g.count
g.cy=g.y/g.count

achou=true
break
}

}

if(!achou){
grupos.push({x:p.x,y:p.y,cx:p.x,cy:p.y,count:1})
}

})

console.log("Total grupos:", grupos.length)

/* =========================
DESENHAR TODOS (DEBUG)
========================= */

ctx.strokeStyle = "gray"

grupos.forEach(g=>{
  ctx.strokeRect(g.cx-3,g.cy-3,6,6)
})

/* =========================
PEGAR 4 MAIORES (FORÇADO)
========================= */

let maiores = grupos
.sort((a,b)=>b.count-a.count)
.slice(0,4)

console.log("Top 4 areas:", maiores.map(m=>m.count))

if(maiores.length < 4){
  alert("Não encontrou 4 regiões grandes")
  return
}

/* =========================
CENTROS
========================= */

let centros = maiores.map(m=>({x:m.cx,y:m.cy}))

/* =========================
CLASSIFICAÇÃO ROBUSTA
========================= */

centros.sort((a,b)=>a.y-b.y)

let top = centros.slice(0,2)
let bottom = centros.slice(2,4)

top.sort((a,b)=>a.x-b.x)
bottom.sort((a,b)=>a.x-b.x)

let TL = top[0]
let TR = top[1]
let BL = bottom[0]
let BR = bottom[1]

/* =========================
DESENHAR PONTOS
========================= */

ctx.fillStyle = "cyan"

[TL,TR,BL,BR].forEach(p=>{
  ctx.beginPath()
  ctx.arc(p.x,p.y,6,0,Math.PI*2)
  ctx.fill()
})

/* =========================
RETÂNGULO (SEMPRE VAI APARECER)
========================= */

ctx.strokeStyle = "yellow"
ctx.lineWidth = 3

ctx.beginPath()
ctx.moveTo(TL.x, TL.y)
ctx.lineTo(TR.x, TR.y)
ctx.lineTo(BR.x, BR.y)
ctx.lineTo(BL.x, BL.y)
ctx.closePath()
ctx.stroke()

console.log("Retângulo:", {TL,TR,BL,BR})

}

</script>

</body>
</html>
